activities:

  spiritual_worship:
    description: Core acts of worship performed at Masjid al-Haram and surroundings
    items:
      - name: Tawaf
        description: Circumambulating the Kaaba seven times counterclockwise
        location:
          name: Masjid al-Haram
          area: Al Haram district, Mekka 24231
          coordinates: "21.4225° N, 39.8262° E"
        duration: 30–60 minutes
        notes: Mandatory for Hajj and Umrah; can also be performed voluntarily (Nafl Tawaf)

      - name: Sa'i
        description: Walking seven times between the hills of Safa and Marwa
        location:
          name: Al-Mas'a Corridor
          area: Inside Masjid al-Haram, ground and upper floors
          coordinates: "21.4234° N, 39.8271° E"
        duration: 30–45 minutes
        notes: Commemorates Hajar's search for water for her son Ismail

      - name: Salah at Masjid al-Haram
        description: Performing the five daily prayers inside the Grand Mosque
        location:
          name: Masjid al-Haram
          area: Al Haram district, Mekka 24231
          coordinates: "21.4225° N, 39.8262° E"
        duration: 10–20 minutes per prayer
        notes: One prayer here equals 100,000 prayers elsewhere (hadith)

      - name: Drinking Zamzam Water
        description: Drinking from the blessed well of Zamzam
        location:
          name: Zamzam Water Stations
          area: Throughout Masjid al-Haram (basement, mataf level, corridors)
        notes: Available free of charge 24/7 throughout the mosque

      - name: Touching the Hajar al-Aswad
        description: Kissing or gesturing toward the Black Stone embedded in the Kaaba corner
        location:
          name: Eastern Corner of the Kaaba
          area: Mataf (Tawaf area), Masjid al-Haram
          coordinates: "21.4225° N, 39.8262° E"
        notes: Sunnah; gesture from a distance is acceptable during crowds

      - name: Standing at Maqam Ibrahim
        description: Praying two rak'ahs behind the station of Ibrahim after Tawaf
        location:
          name: Maqam Ibrahim
          area: Inside Masjid al-Haram, few meters from the Kaaba
        notes: Quranic instruction (2:125)

      - name: Tahajjud (Night Prayer)
        description: Voluntary night prayer in the last third of the night
        location:
          name: Masjid al-Haram or any hotel prayer room
          area: Al Haram district
        duration: Variable
        notes: Especially blessed during Ramadan; mosque is open 24/7

      - name: Dhikr and Supplication at Multazam
        description: Clinging to the wall between the Kaaba door and the Black Stone for du'a
        location:
          name: Multazam
          area: Kaaba wall, Masjid al-Haram
        notes: Highly recommended spot for heartfelt supplication

  hajj_rites:
    description: Rituals performed exclusively during the Hajj season (Dhul Hijjah 8–13)
    items:
      - name: Entering Ihram at Miqat
        description: Donning the white seamless garments and making the intention for Hajj
        location:
          name: Miqat stations (varies by origin)
          landmarks:
            - "Dhul Hulayfah (Abyar Ali) — for pilgrims coming from Medina"
            - "Al-Juhfah (Rabigh) — for pilgrims from Syria/Egypt direction"
            - "Qarn al-Manazil — for pilgrims from Najd/Gulf"
            - "Yalamlam — for pilgrims from Yemen/South Asia"
            - "Dhat Irq — for pilgrims from Iraq"
        notes: Marks the beginning of Hajj; specific rules of conduct apply

      - name: Wuquf at Arafat
        description: Standing in supplication on the plains of Arafat
        location:
          name: Plain of Arafat
          area: Approx. 20 km east of Masjid al-Haram
          coordinates: "21.3549° N, 39.9845° E"
          landmark: Jabal al-Rahmah (Mount of Mercy) is the central hill
        date: 9th Dhul Hijjah (afternoon to sunset)
        duration: Several hours
        notes: The pinnacle of Hajj; missing this invalidates the entire Hajj

      - name: Muzdalifah Overnight Stay
        description: Spending the night under the open sky and collecting pebbles
        location:
          name: Muzdalifah
          area: Between Arafat and Mina, approx. 9 km from Mekka
          coordinates: "21.3797° N, 39.9358° E"
          landmark: Masjid al-Mash'ar al-Haram is the central mosque here
        date: Night of 9th–10th Dhul Hijjah
        notes: Pebbles collected here for Rami; elderly and ill may leave after midnight

      - name: Rami al-Jamarat (Stoning the Devil)
        description: Throwing pebbles at three pillars symbolizing Satan's temptation
        location:
          name: Jamarat Bridge (Jisr al-Jamarat)
          area: Mina, approx. 5 km from Masjid al-Haram
          coordinates: "21.3926° N, 39.8731° E"
          address: King Fahd Road, Mina, Mekka
        date: 10th–13th Dhul Hijjah
        notes: Multi-level bridge built to manage crowd; follow time slots assigned by authorities

      - name: Nahr (Animal Sacrifice / Qurbani)
        description: Slaughtering an animal as a religious offering
        location:
          name: Islamic Development Bank Abattoir (official)
          area: Mina slaughterhouse complex, Mekka
        date: 10th Dhul Hijjah (Eid al-Adha)
        notes: Can be arranged through the Saudi Hajj Ministry online portal; meat distributed to the poor

      - name: Halq or Taqsir
        description: Shaving the head (men) or cutting a portion of hair (women)
        location:
          name: Mina barber tents or Mekka barber shops
          area: Mina and Al-Aziziyah district
        date: After Nahr on 10th Dhul Hijjah
        notes: Marks partial exit from Ihram

      - name: Stay in Mina
        description: Spending the Tashreeq nights in the tent city of Mina
        location:
          name: Mina Tent City
          area: Mina, Mekka — the world's largest tent city
          coordinates: "21.4133° N, 39.8924° E"
        date: 11th–13th Dhul Hijjah
        notes: Pilgrims are assigned designated tent zones by nationality/group

  umrah_rites:
    description: Rituals of the lesser pilgrimage, performable year-round
    items:
      - name: Entering Ihram at Miqat
        description: Putting on Ihram garments and making intention for Umrah
        location:
          name: Masjid Aisha (Tan'eem) — closest Miqat for those already in Mekka
          area: Tan'eem district, approx. 7.5 km from Masjid al-Haram
          coordinates: "21.4629° N, 39.8200° E"
          address: Al-Hijrah Road, Tan'eem, Mekka
        notes: Ghusl and 2 rak'ahs of Ihram prayer recommended beforehand

      - name: Tawaf al-Umrah
        description: Seven circuits around the Kaaba
        location:
          name: Mataf (Tawaf Area), Masjid al-Haram
          area: Al Haram district, Mekka
        notes: Begin from the Black Stone corner; Raml (light jog) in first three rounds for men

      - name: Sa'i al-Umrah
        description: Seven walks between Safa and Marwa
        location:
          name: Al-Mas'a Corridor
          area: Inside Masjid al-Haram
        notes: Starts at Safa and ends at Marwa; escalators available on upper floors

      - name: Halq or Taqsir
        description: Cutting or shaving hair to exit Ihram
        location:
          name: Any barber shop in Mekka
          businesses:
            - name: Barber shops in Ajyad Street
              area: Ajyad, near Masjid al-Haram
            - name: Al-Noor Barber (cluster of shops)
              area: Al-Aziziyah district
        notes: Completes the Umrah; widely available shops near the mosque

  historical_sites:
    description: Significant historical and religious landmarks in and around Mekka
    items:
      - name: Jabal al-Nour (Mountain of Light)
        description: Mountain housing the Cave of Hira where the first Quranic revelation descended
        location:
          name: Jabal al-Nour
          area: Al-Nour district, approx. 4 km northeast of Masjid al-Haram
          coordinates: "21.4572° N, 39.8586° E"
          address: Al Nour Mountain Road, Mekka
        duration: 1.5–2 hours (hike up and down)
        notes: 1,294 steps to the top; best visited early morning to avoid heat

      - name: Jabal Thawr (Mount Thawr)
        description: Mountain containing the cave where the Prophet took refuge during the Hijra
        location:
          name: Jabal Thawr
          area: Approx. 4.7 km south of Masjid al-Haram
          coordinates: "21.3856° N, 39.8192° E"
        duration: 2–3 hours
        notes: Steeper and harder than Jabal al-Nour; sturdy footwear recommended

      - name: Masjid al-Jinn
        description: Mosque marking the spot where a group of jinn pledged allegiance to Islam
        location:
          name: Masjid al-Jinn
          area: Al-Mu'alla district, near Jannat al-Mu'alla cemetery
          coordinates: "21.4317° N, 39.8314° E"
          address: Al-Jinn Street, Al Mu'alla, Mekka
        notes: Mentioned in Surah al-Jinn (72); small but historically significant

      - name: Masjid Aisha (Tan'eem)
        description: Mosque where pilgrims enter Ihram for additional Umrahs
        location:
          name: Masjid Aisha
          area: Tan'eem, approx. 7.5 km from Masjid al-Haram
          coordinates: "21.4629° N, 39.8200° E"
          address: Al-Hijrah Road, Tan'eem, Mekka
        notes: Accessible by taxi, bus (Mekka Metro Line 2), or Uber/Careem

      - name: Jannat al-Mu'alla Cemetery
        description: Ancient cemetery where many relatives and companions of the Prophet are buried
        location:
          name: Jannat al-Mu'alla (Al-Hajoon Cemetery)
          area: Al-Mu'alla district, few hundred meters from Masjid al-Haram
          coordinates: "21.4331° N, 39.8283° E"
          address: Al Mu'alla Street, Mekka
        notes: Includes the graves of Khadijah (RA), Abu Talib, and other family members of the Prophet

      - name: Masjid al-Haram Architecture Tour
        description: Exploring the mosque's minarets, gates, clocks, and historical sections
        location:
          name: Masjid al-Haram (various gates)
          key_gates:
            - "King Abdulaziz Gate (Gate 1) — main ceremonial entrance"
            - "King Fahd Gate (Gate 79) — facing Abraj Al-Bait"
            - "Bab al-Salam (Gate of Peace)"
            - "Bab Umrah"
        duration: 1–2 hours
        notes: Guided tours by licensed agencies available; best done outside peak prayer times

      - name: Makkah Museum (Al-Zaher Palace)
        description: Royal palace turned museum covering the history of Mekka and the Hajj
        location:
          name: Al-Zaher Palace Museum
          area: Al-Zaher district, Mekka
          address: Al-Zaher Road, Mekka
        notes: Displays Ottoman-era artifacts, old maps, and Hajj documentation

  educational_cultural:
    description: Learning and enrichment activities for spiritual growth
    items:
      - name: Islamic History Lectures
        description: Attending scholarly talks held regularly in the mosque
        location:
          name: Masjid al-Haram lecture halls and gate areas
          area: Al Haram district
        businesses:
          - name: Dar al-Hadith al-Khayriyyah
            area: Near Masjid al-Haram, Mekka
            notes: Historic Islamic educational institution offering courses
          - name: Umm al-Qura University Islamic Studies Faculty
            area: Al-Abdiyah district, Mekka
            notes: Public lectures occasionally open to pilgrims
        notes: Topics include Seerah, Aqeedah, Fiqh; schedules posted at mosque entrances

      - name: Quranic Recitation Circles (Halaqat)
        description: Joining Quran learning circles inside the mosque
        location:
          name: Masjid al-Haram — King Fahd expansion section
          area: Al Haram district
        notes: Available for all levels; often led by certified reciters; free to join

      - name: Zamzam Well Exhibition
        description: Learning about the history and hydrology of the Zamzam well
        location:
          name: Zamzam Well Area
          area: Masjid al-Haram basement (accessible from Mataf level)
          coordinates: "21.4227° N, 39.8264° E"
        notes: The well itself is enclosed but the surrounding area has informational displays

  food_and_hospitality:
    description: Culinary experiences and local hospitality
    items:
      - name: Al Baik
        description: Iconic Saudi fast-food chain famous for crispy fried chicken and shrimp
        location:
          area: Multiple branches throughout Mekka
          branches:
            - address: Ajyad Street, near Masjid al-Haram
            - address: Ibrahim Al Khalil Street, Al Haram
            - address: Abraj Al-Bait Mall food court
        notes: A must-try; expect queues; open 24 hours during Hajj and Ramadan seasons

      - name: Al Romansiah
        description: Popular Saudi restaurant chain serving traditional Kabsa and grills
        location:
          area: Multiple branches in Mekka
          branches:
            - address: Al-Aziziyah district, Mekka
            - address: Al-Naseem district, Mekka
        notes: Family-friendly seating; halal-certified; ideal for group dining

      - name: Mataam Al Kabsa Al Asli
        description: Traditional restaurant serving authentic Kabsa (spiced rice with meat)
        location:
          name: Mataam Al Kabsa Al Asli
          area: Al-Aziziyah district, Mekka
        notes: Affordable and popular with locals; communal table seating

      - name: Saffron Restaurant (Fairmont Makkah)
        description: Upscale buffet restaurant in the Fairmont Clock Tower with Kaaba views
        location:
          name: Fairmont Makkah Clock Royal Tower — Saffron Restaurant
          address: Abraj Al-Bait Complex, Ibrahim Al Khalil Street, Mekka
          floor: Level 3
        notes: Spectacular views of the Haram; international and Arabic cuisine; reservations recommended

      - name: Al Nafoura (Le Méridien Towers)
        description: All-day dining with Arabic and international buffet
        location:
          name: Le Méridien Towers Makkah — Al Nafoura Restaurant
          address: Ajyad Street, Al Haram district, Mekka
        notes: Convenient for pilgrims staying in Ajyad area; popular for Suhoor during Ramadan

      - name: Herfy
        description: Saudi fast-food chain offering burgers, chicken, and Arabic staples
        location:
          area: Multiple branches throughout Mekka
          branches:
            - address: Abraj Al-Bait Mall
            - address: Al-Aziziyah district
        notes: Budget-friendly; good for a quick meal between worship sessions

      - name: Tandoor Express
        description: Affordable South Asian-style restaurant popular with pilgrims
        location:
          name: Tandoor Express
          area: Ajyad Street, near Masjid al-Haram, Mekka
        notes: Popular with South Asian pilgrims; serves biryani, naan, and curries

      - name: Nando's Makkah
        description: Flame-grilled peri-peri chicken restaurant
        location:
          name: Nando's
          address: Abraj Al-Bait Mall, Level 2, Ibrahim Al Khalil Street, Mekka
        notes: Familiar international option; halal-certified

      - name: Local Date Shops & Cafes
        description: Buying and tasting various varieties of Saudi dates with Arabic coffee
        location:
          businesses:
            - name: Bateel Dates Boutique
              address: Abraj Al-Bait Mall, Mekka
              notes: Premium Saudi dates and gourmet gifts
            - name: Al-Madinah Date Market stalls
              area: Souq area near Masjid al-Haram
              notes: Fresh and dried dates in bulk; Ajwa, Medjool, Sukkari varieties

  shopping:
    description: Popular places to buy souvenirs, clothing, and Islamic goods
    items:
      - name: Abraj Al-Bait Mall (Clock Tower Mall)
        description: Largest mall in Mekka, directly adjacent to Masjid al-Haram
        location:
          name: Abraj Al-Bait Mall
          address: Ibrahim Al Khalil Street, Al Haram district, Mekka 24231
          coordinates: "21.4196° N, 39.8262° E"
        hours: "10:00–00:00 daily (extended during Ramadan)"
        notes: Houses Hyper Panda supermarket, Bateel, international fashion brands, and a food court

      - name: Ajyad Mall
        description: Mid-range mall popular with pilgrims for Islamic goods and clothing
        location:
          name: Ajyad Mall
          address: Ajyad Street, Al Haram district, Mekka
          coordinates: "21.4179° N, 39.8241° E"
        notes: Good selection of Ihram garments, prayer items, and souvenirs at competitive prices

      - name: Al Hijaz Mall
        description: Shopping mall offering a mix of local and international brands
        location:
          name: Al Hijaz Mall
          address: King Abdulaziz Road, Al-Aziziyah, Mekka
        notes: Less crowded than Abraj Al-Bait; good for clothing and electronics

      - name: Souq Al-Zal
        description: Traditional open-air market for antiques, local handicrafts, and vintage items
        location:
          name: Souq Al-Zal
          area: Old Mekka, near Al-Mu'alla district
          address: Al-Zaher Road, Al Mu'alla, Mekka
        notes: Bargaining expected; best visited in the evening; authentic local atmosphere

      - name: Abdul Samad Al Qurashi Perfumes
        description: Renowned Saudi perfumery selling high-quality Oud, musk, and Attar blends
        location:
          name: Abdul Samad Al Qurashi
          branches:
            - address: Abraj Al-Bait Mall, Mekka
            - address: Ajyad Street, near Masjid al-Haram
        notes: One of the most prestigious perfume houses in the Arab world; alcohol-free

      - name: Haramain Perfumes
        description: Affordable perfume shop popular for Bakhoor (incense) and oil perfumes
        location:
          name: Haramain Perfumes
          area: Multiple shops near Masjid al-Haram souq area
          address: Al Haram district, Mekka
        notes: Great for buying gifts; reasonable prices; wide variety

      - name: Maktabat Dar al-Salam (Islamic Bookstore)
        description: Large Islamic bookstore selling Qurans, hadith books, and Islamic literature
        location:
          name: Dar al-Salam Bookstore
          area: Near Masjid al-Haram, Al Haram district, Mekka
        notes: Books available in Arabic, English, Urdu, French, and more; competitive prices

      - name: Bin Dawood Supermarket
        description: Large Saudi supermarket chain for food, supplies, and everyday items
        location:
          name: Bin Dawood
          branches:
            - address: Al-Aziziyah district, Mekka
            - address: Near Abraj Al-Bait, Mekka
        notes: Stocks Zamzam water bottles, halal snacks, and pilgrim essentials

  accommodation:
    description: Notable hotels and stays near Masjid al-Haram
    items:
      - name: Fairmont Makkah Clock Royal Tower
        description: Luxury 5-star hotel in the iconic Clock Tower with direct views of the Kaaba
        location:
          address: Abraj Al-Bait Complex, Ibrahim Al Khalil Street, Mekka 24231
          coordinates: "21.4196° N, 39.8260° E"
        distance_to_haram: Directly adjacent (2–3 minute walk)
        notes: Premium option; multiple restaurants, spa, rooftop views; reservations months in advance

      - name: Swissôtel Makkah
        description: Upscale hotel connected to the Abraj Al-Bait complex
        location:
          address: Abraj Al-Bait, Ibrahim Al Khalil Street, Mekka
        distance_to_haram: 2–5 minute walk
        notes: Excellent Haram views from upper floors; buffet dining available

      - name: Raffles Makkah Palace
        description: Ultra-luxury hotel in the Abraj Al-Bait with palatial suites
        location:
          address: Abraj Al-Bait Complex, Mekka
        distance_to_haram: 3–5 minute walk
        notes: Top-tier service; butler service; ideal for those prioritizing comfort

      - name: Hilton Suites Makkah
        description: Well-known 5-star hotel close to the Grand Mosque
        location:
          address: Ibrahim Al Khalil Street, Al Haram district, Mekka
          coordinates: "21.4197° N, 39.8253° E"
        distance_to_haram: 5 minute walk
        notes: Spacious suites; strong reputation for Hajj and Umrah groups

      - name: Pullman ZamZam Makkah
        description: Premium hotel offering Kaaba views and Haram proximity
        location:
          address: Ajyad Street, Al Haram district, Mekka
        distance_to_haram: 5–7 minute walk
        notes: Part of the Accor group; known for good service and comfortable rooms

      - name: Le Méridien Towers Makkah
        description: Twin-tower hotel in the Ajyad area with excellent dining
        location:
          address: Ajyad Street, Al Haram district, Mekka
        distance_to_haram: 7–10 minute walk
        notes: Popular with families and large groups; Al Nafoura restaurant on site

      - name: InterContinental Makkah
        description: Established 5-star hotel with conference facilities and Haram access
        location:
          address: King Abdulaziz Road, Al Haram district, Mekka
        distance_to_haram: 10–15 minute walk
        notes: Good for larger group bookings; shuttle service to the mosque available

  transportation:
    description: Getting around Mekka during your stay
    items:
      - name: Mekka Metro (Mashaaer Railway)
        description: Metro line connecting Masjid al-Haram, Mina, Muzdalifah, and Arafat
        location:
          stations:
            - "King Abdulaziz Station (Masjid al-Haram)"
            - "Mina Station"
            - "Muzdalifah Station"
            - "Arafat Station"
        notes: Operates mainly during Hajj season; alleviates congestion on pilgrimage routes

      - name: Uber / Careem
        description: Ride-hailing apps widely used in Mekka for point-to-point travel
        notes: Available year-round; surge pricing common during prayer times and Hajj; book in advance

      - name: Mekka Bus Service (Saptco)
        description: Public bus network covering key areas in Mekka
        location:
          key_routes:
            - "Al Haram ↔ Tan'eem (Masjid Aisha)"
            - "Al Haram ↔ Jabal al-Nour"
            - "Al Haram ↔ Al-Aziziyah"
        notes: Affordable; AC buses; Mada card (contactless payment) accepted

      - name: Taxis
        description: Metered and non-metered taxis available throughout Mekka
        notes: Agree on fare before starting; licensed yellow taxis preferred over informal options

  wellness_and_rest:
    description: Activities to maintain health and spiritual energy during the pilgrimage
    items:
      - name: Hotel Spa and Rest
        description: Using hotel wellness facilities to recover from physically demanding rituals
        businesses:
          - name: Fairmont Spa (Fairmont Makkah Clock Royal Tower)
            address: Abraj Al-Bait Complex, Mekka
            notes: Full-service spa with massage, steam, and pool
          - name: Swissôtel Fitness Center
            address: Abraj Al-Bait, Mekka
            notes: Gym and pool facilities for hotel guests
        notes: Adequate rest is critical for sustaining Hajj and Umrah stamina

      - name: Walking the Mosque Courtyards
        description: Gentle walking and quiet reflection in the open courtyards of Masjid al-Haram
        location:
          name: Masjid al-Haram outdoor and rooftop areas
          area: Al Haram district
        notes: Peaceful especially after Fajr; rooftop accessible from several gates

      - name: Journaling and Reflection
        description: Writing personal duas, reflections, and spiritual intentions
        notes: A meaningful practice; some pilgrims use dedicated Hajj/Umrah journals sold at local bookstores

      - name: Charity and Sadaqah
        description: Giving to those in need including charitable organizations present in Mekka
        businesses:
          - name: Makkah Al-Mukarramah Charity
            area: Mekka city
            notes: Official local charity accepting donations for pilgrims in need
          - name: Al-Rajhi Charity Foundation donation boxes
            area: Throughout Masjid al-Haram and hotels
        notes: Sadaqah is especially rewarded in the holy city; many collection points near the mosque

  arabian_heritage_sports:
    description: >
      Traditional Arabian sports and martial arts rooted in Islamic and Bedouin culture.
      Most venues are in Mekka or a short drive away in Taif (75 km, cooler climate) or Jeddah (80 km).
      Advance booking is strongly recommended for all activities.
    items:
      - name: Horseback Riding (Furousia)
        description: >
          Learning to ride Arabian horses — one of the most celebrated skills in Islamic tradition.
          The Prophet Muhammad (PBUH) encouraged horse riding as a noble sport.
        skill_levels: [beginner, intermediate, advanced]
        businesses:
          - name: Al-Furousiya Equestrian Academy
            area: Al-Shafa, Taif (approx. 75 km from Mekka)
            notes: >
              Offers beginner lessons, trail rides through mountain terrain, and Arabian horse
              care workshops; cooler mountain climate makes it ideal for riding year-round
          - name: Taif Equestrian Club
            area: Taif city, Al-Hada district
            notes: Affiliated with the Saudi Equestrian Federation; group and private lessons available
          - name: Jeddah Equestrian Club
            area: Al-Andalus district, Jeddah (80 km from Mekka)
            address: King Abdulaziz Road, Jeddah
            notes: >
              One of the oldest equestrian clubs in the region; hosts competitions and offers
              riding lessons for all ages; short drive from Mekka
        duration: 1–3 hours per session
        notes: >
          Wear long trousers and closed shoes; helmets provided; book lessons at least a week ahead
          during Hajj season as availability is limited

      - name: Arabian Sword Fighting (Al-Furusiyya al-Harbiyya)
        description: >
          Traditional Arabian sword combat techniques derived from Islamic martial heritage.
          Includes Al-Ardah (ceremonial sword dance), single-sword drills, and paired sparring
          forms used historically by Arabian warriors.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Saudi Heritage Commission Cultural Centers
            area: Mekka and Jeddah branches
            notes: >
              Run workshops on Al-Ardah (the traditional Saudi sword and dance performance);
              contact the Heritage Commission (Al-Turath) for scheduled public sessions
          - name: Al-Makkah Cultural and Sports Club
            area: Al-Aziziyah district, Mekka
            notes: Occasionally hosts traditional martial arts and heritage sport workshops
          - name: Jeddah Heritage Festival Venues
            area: Al-Balad (Historic Jeddah), Jeddah
            notes: >
              Seasonal festivals feature live Al-Ardah performances and hands-on sword
              handling demonstrations; check the Saudi Tourism Authority event calendar
        duration: 1–2 hours per session
        notes: >
          Al-Ardah is a cultural performance art as much as a martial skill; wooden practice
          swords used for beginners; traditional dress (thobe) often worn during sessions

      - name: Traditional Archery (Rami / Qaws)
        description: >
          Islamic archery using traditional bows — explicitly encouraged in hadith
          ("Teach your children swimming, archery, and horse riding" — reported by al-Bayhaqi).
          Covers stance, draw, aim, and release using recurve and traditional Arabic bows.
        skill_levels: [beginner, intermediate, advanced]
        businesses:
          - name: Al-Rami Archery Club
            area: Al-Aziziyah district, Mekka
            notes: Indoor range with traditional and modern bow options; beginner sessions available
          - name: Saudi Archery Federation Affiliated Clubs
            area: Jeddah and Taif (check federation website for Mekka-area affiliates)
            notes: Certified coaching; equipment rental included for beginners
          - name: Taif Sports City Archery Range
            area: Taif Sports City, Taif
            notes: Outdoor range with longer distances; suitable for intermediate and advanced archers
        duration: 1–2 hours per session
        equipment_provided: true
        notes: >
          No prior experience needed to start; closed-toe shoes required;
          traditional thumb ring (Zihgir) used in Islamic archery style

      - name: Camel Riding
        description: >
          Riding the "Ship of the Desert" — an iconic Bedouin experience and deeply
          symbolic animal in Islamic culture. Includes mounting, basic steering, and short trail rides.
        skill_levels: [beginner]
        businesses:
          - name: Al-Badia Camel Farm
            area: Outskirts of Mekka, Al-Badia district
            notes: Guided camel rides on desert trails; photography sessions available
          - name: Desert Safari Makkah (various operators)
            area: Eastern desert outskirts of Mekka
            notes: >
              Half-day packages combining camel riding, dune driving, and traditional Bedouin
              tent hospitality; bookable through local tour agencies
          - name: Taif Camel Experience
            area: Al-Hada, Taif
            notes: Scenic mountain-area camel rides; cooler and more comfortable than desert rides
        duration: 30 minutes – 2 hours
        notes: >
          Wear modest, comfortable clothing; camels kneel for mounting;
          guides assist first-time riders; best experienced early morning or near sunset

      - name: Falconry (Al-Saqr)
        description: >
          The ancient Arabian art of training and flying falcons for hunting — a UNESCO
          Intangible Cultural Heritage practice. Includes handling, perch training, and
          short free-flight sessions with trained birds.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Saudi Falconry Club (Jeddah)
            area: Jeddah, approx. 80 km from Mekka
            notes: >
              Offers introductory falconry sessions; trained Saker and Peregrine falcons;
              handlers guide beginners through glove work and lure flying
          - name: Al-Saqr Heritage Falconry Center
            area: Taif outskirts
            notes: >
              Combines falconry demonstration with Bedouin cultural experience;
              group sessions and private bookings available
          - name: King Abdulaziz Falconry Festival (seasonal)
            area: Varies (Riyadh-based main event; regional events in Mekka/Taif area)
            notes: >
              Annual national festival with competitions, exhibitions, and public
              demonstrations; check Saudi Falconry Association for dates and locations
        duration: 1–3 hours
        notes: >
          Thick leather glove provided; long sleeves recommended; patience required —
          falcons respond to calm, slow movements; no loud noises near the birds

      - name: Traditional Wrestling (Al-Musaraa)
        description: >
          Classical Arabian wrestling — a ground-based grappling sport historically
          practiced by Bedouin tribes. Focuses on balance, leverage, and controlled throws.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Al-Makkah Sports Club
            area: Al-Aziziyah district, Mekka
            address: King Abdulaziz Road, Al-Aziziyah, Mekka
            notes: >
              General sports club offering traditional and modern combat sports;
              Al-Musaraa training sessions run by experienced coaches
          - name: Al-Wahda Sports Club
            area: Al-Zahir district, Mekka
            notes: Community club with mat facilities; beginner-friendly environment
        duration: 1–1.5 hours per session
        notes: >
          Wear comfortable athletic clothing; no shoes on the mat;
          good supplementary fitness activity during pilgrimage downtime

      - name: Arabian Dagger Craft (Khanjar)
        description: >
          Workshop learning the history, symbolism, and craftsmanship of the traditional
          Arabian curved dagger (Khanjar / Janbiya). Includes handle carving and sheath decoration.
        skill_levels: [beginner]
        businesses:
          - name: Saudi Heritage Commission Craft Workshops
            area: Mekka Heritage Center and Jeddah Al-Balad district
            notes: >
              Seasonal craft workshops on traditional Arabian weaponry and jewelry;
              contact Al-Turath (Heritage Commission) for schedule
          - name: Souq Al-Zal Artisan Stalls
            area: Al-Mu'alla district, Mekka
            notes: >
              Master craftsmen sometimes demonstrate Khanjar making; daggers and decorative
              pieces available for purchase; not typically a hands-on lesson but worth observing
        duration: 2–3 hours (workshop format)
        notes: >
          Purely craft-focused; no combat element; decorative Khanjars make meaningful souvenirs;
          ornate versions with silver handles can be expensive but are heirloom-quality pieces

      - name: Swimming and Water Sports
        description: >
          The Prophet Muhammad (PBUH) encouraged Muslims to learn swimming.
          Jeddah's Red Sea coast (80 km) offers world-class diving, snorkeling,
          and open-water swimming in warm, clear waters.
        skill_levels: [beginner, intermediate, advanced]
        businesses:
          - name: Jeddah Yacht Club
            area: Al-Kurnaysh (Corniche), Jeddah
            address: Al-Hamra, Jeddah Corniche, Jeddah
            notes: Swimming, kayaking, sailing; Red Sea access; day membership available
          - name: Dive Jeddah
            area: Al-Kurnaysh, Jeddah
            notes: >
              PADI-certified dive center offering beginner Discover Scuba courses and
              guided reef dives; Red Sea coral reefs are world-renowned for biodiversity
          - name: Al-Shallal Theme Park (indoor pool)
            area: Corniche Road, Jeddah
            notes: Large indoor/outdoor aquatic park; suitable for families and non-swimmers
        duration: Half-day to full-day
        notes: >
          Modest swimwear required in public areas; private or segregated pools available
          for those who prefer; Jeddah day trips easily arranged from Mekka via taxi or Careem

      - name: Saudi Jiu-Jitsu (SJJ)
        description: >
          Saudi Jiu-Jitsu has exploded in popularity across the Kingdom. Combines ground
          grappling, chokes, joint locks, and takedowns. Saudi Arabia hosts major international
          SJJ tournaments and the sport is supported at national federation level.
        skill_levels: [beginner, intermediate, advanced]
        businesses:
          - name: Saudi Jiu-Jitsu Federation Affiliated Academy (Mekka)
            area: Al-Aziziyah district, Mekka
            notes: >
              Beginner-friendly gi and no-gi classes; coaches certified by the Saudi
              Jiu-Jitsu Federation; free trial class often available for visitors
          - name: Al-Hilal Sports Academy
            area: Jeddah (80 km from Mekka)
            notes: Full BJJ and SJJ curriculum; competition prep classes available
          - name: Gracie Jeddah
            area: Al-Rawdah district, Jeddah
            notes: International-standard instruction; Gracie family lineage curriculum
        duration: 1–1.5 hours per class
        equipment_provided: false
        notes: >
          Bring or rent a gi (uniform); nail clipping and hygiene strictly enforced on the mat;
          one of the best sports for building functional strength and discipline

      - name: Spear and Shield Training (Al-Harbah)
        description: >
          Ancient Arabian battlefield art using the traditional long spear (Harbah) and
          round leather shield (Turs). Taught as a cultural martial art and physical discipline.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Saudi Heritage Commission Martial Arts Workshops
            area: Mekka Heritage Center
            notes: Seasonal sessions; traditional wooden training spears used for safety
          - name: Al-Ardah Cultural Troupe Training Sessions
            area: Jeddah Heritage Festival grounds
            notes: Group workshops alongside sword and percussion training
        duration: 1–2 hours
        notes: Protective padding provided; sessions often conclude with a group Al-Ardah performance

      - name: Desert Dune Bashing and Off-Road Driving
        description: >
          4x4 off-road driving across the desert dunes surrounding Mekka — a beloved
          Saudi weekend activity combining adrenaline with Bedouin landscape exploration.
        skill_levels: [beginner (passenger), intermediate, advanced]
        businesses:
          - name: Makkah Desert Safari Co.
            area: Eastern desert outskirts of Mekka
            notes: >
              Full packages include 4x4 convoy, sandboarding, camel riding, and Bedouin
              dinner under stars; pickup from central Mekka hotels available
          - name: Saudi Off-Road Club (Jeddah chapter)
            area: Jeddah and surrounding desert areas
            notes: Community group runs organized desert drives; visitors may join with prior contact
        duration: 3–6 hours (half-day or full-day packages)
        notes: >
          Vehicles and drivers provided for beginners; bring sunscreen, sunglasses, and a scarf
          for dust; evenings are recommended for the best temperatures

  arts_and_culture:
    description: >
      Traditional and contemporary Arabian arts — calligraphy, music, poetry, and storytelling
      deeply rooted in Islamic civilization. Many workshops available in Mekka, Taif, and Jeddah.
    items:
      - name: Arabic Calligraphy (Al-Khatt al-Arabi)
        description: >
          The art of beautiful Arabic script — considered the highest Islamic visual art form.
          Styles include Naskh, Thuluth, Diwani, Kufi, and Ruq'a. UNESCO-listed as Intangible
          Cultural Heritage. Learning even basic Naskh is a deeply rewarding spiritual experience.
        skill_levels: [beginner, intermediate, advanced]
        styles:
          - Naskh (most readable; best for beginners)
          - Thuluth (classical mosque inscriptions; intermediate)
          - Diwani (ornate Ottoman style; advanced)
          - Kufi (geometric angular style; advanced)
          - Ruq'a (everyday handwriting style; beginner-friendly)
        businesses:
          - name: Dar al-Khatt al-Islami
            area: Al-Aziziyah district, Mekka
            notes: >
              Dedicated calligraphy school offering weekend and intensive courses;
              supplies included; work in both traditional reed pen (qalam) and modern tools
          - name: Mekka Cultural Center (Dar al-Thaqafa)
            area: Al-Adl district, Mekka
            address: King Fahd Road, Al-Adl, Mekka
            notes: Regular calligraphy workshops by master calligraphers; free or low-cost sessions
          - name: Al-Balad Calligraphy Studio
            area: Historic Jeddah (Al-Balad), Jeddah
            notes: >
              Beautiful heritage building setting; courses from 1-day crash course to
              12-week term; certificates issued by Saudi Calligraphy Association
          - name: Umm al-Qura University Arts Faculty (open workshops)
            area: Al-Abdiyah district, Mekka
            notes: Occasional public workshops run by the university's arts department
        duration: 2–3 hours per session (courses range from 1 day to 12 weeks)
        supplies_needed:
          - Reed pen (qalam) or bamboo pen
          - Calligraphy ink (Hibr)
          - Practice paper (smooth, non-absorbent)
          - Ruler and T-square
        notes: >
          Suitable for all ages; Arabic literacy not strictly required for beginners;
          finished pieces make extraordinary personal keepsakes and gifts

      - name: Oud Playing (Al-Oud)
        description: >
          The Oud is the king of Arabian musical instruments — a fretless lute with a warm,
          resonant tone at the heart of classical Arabic music. Learning even basic maqamat
          (melodic modes) opens a world of Islamic musical heritage spanning 1,000+ years.
        skill_levels: [beginner, intermediate, advanced]
        arabic_maqamat_covered:
          - Rast (foundational; most common beginner mode)
          - Bayati (melancholic; emotionally expressive)
          - Hijaz (exotic; associated with Arabian Peninsula)
          - Nahawand (resembles Western minor scale)
          - Saba (deeply emotional; used in religious music)
        businesses:
          - name: Mekka Music and Arts Institute
            area: Al-Naseem district, Mekka
            notes: >
              Private and group Oud lessons; Ouds available for rent during lessons;
              instructors trained in classical Arabic and Islamic musical traditions
          - name: Al-Andalus Music Academy
            area: Al-Hamra district, Jeddah
            notes: >
              Well-regarded school with experienced Oud masters; beginner courses
              start with proper posture, right-hand picking technique, and basic maqamat
          - name: Taif Arts Center
            area: Taif city center
            notes: Oud workshops and cultural music evenings; intimate setting
        duration: 45–60 minutes per lesson
        notes: >
          Student-grade Ouds available for purchase at music shops near Mekka;
          Arabic music is microtonal — quarter tones differ from Western scales;
          patience in the first weeks yields lifelong musical ability

      - name: Arabic Poetry (Al-Shi'r al-Arabi)
        description: >
          Arabia is the birthplace of one of history's greatest poetic traditions. From
          pre-Islamic Mu'allaqat odes to Nabati Bedouin poetry and contemporary verse,
          learning to compose or recite Arabic poetry sharpens language and deepens spirituality.
        genres:
          - Fusha (Classical Arabic poetry — formal, literary)
          - Nabati (Bedouin vernacular poetry — oral tradition, emotionally raw)
          - Zajal (colloquial rhyming poetry — performed at social gatherings)
          - Qasida (long ode form — classical structure)
          - Haiku-inspired modern Arabic verse (contemporary)
        businesses:
          - name: Saudi Writers and Literati Club (Mekka Chapter)
            area: Mekka city center
            notes: >
              Weekly poetry circles open to the public; recitation evenings, critique
              sessions, and poetry workshops in both classical and colloquial Arabic
          - name: Taif Cultural Palace
            area: Taif city center
            notes: Regular literary evenings featuring Nabati poetry; audience participation welcomed
          - name: Jeddah Literary Club
            area: Al-Rawdah district, Jeddah
            notes: >
              One of Saudi Arabia's most active literary societies; hosts famous poets;
              workshops for beginners wanting to try composing their first qasida
        duration: 1–3 hours per session
        notes: >
          No Arabic writing required to enjoy Nabati poetry circles (oral tradition);
          classical poetry workshops benefit from basic Modern Standard Arabic literacy

      - name: Arabic Storytelling (Al-Hakawati)
        description: >
          The Hakawati is the traditional Arabian oral storyteller — a figure who once held
          court in coffeehouses and public squares. Sessions combine folklore, Islamic history,
          Bedouin legends, and improvised narrative. A living tradition being actively revived.
        businesses:
          - name: Saudi Heritage Commission Story Nights
            area: Mekka Heritage Center and Jeddah Al-Balad
            notes: >
              Organized storytelling evenings in Arabic; themes drawn from Islamic
              history, Arabian Nights (Alf Layla), and regional folklore
          - name: Jeddah Corniche Cultural Events
            area: Al-Kurnaysh, Jeddah
            notes: Outdoor storytelling performances during national festivals and Ramadan evenings
          - name: Al-Hada Mountain Camps (Taif)
            area: Al-Hada, Taif
            notes: Bedouin-hosted evenings with traditional stories around a campfire
        duration: 1–2 hours per session
        notes: Basic Arabic comprehension helpful; some sessions offered with English summaries

      - name: Islamic Geometric Art and Tile Design
        description: >
          The intricate geometric patterns adorning mosques, palaces, and manuscripts across
          the Islamic world. Learn to construct star patterns, girih tiles, and arabesque
          designs using compass and ruler — the classical Islamic method.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Mekka Cultural Center (Dar al-Thaqafa)
            area: Al-Adl district, Mekka
            notes: Geometric art workshops; materials provided; no drawing experience required
          - name: Saudi Heritage Commission Design Workshops
            area: Mekka and Jeddah
            notes: >
              Hands-on sessions covering Mamluk, Ottoman, and Andalusian geometric traditions;
              participants take home their completed framed artwork
          - name: Al-Balad Art Studios (Historic Jeddah)
            area: Al-Balad (UNESCO World Heritage Site), Jeddah
            notes: >
              Beautiful workshop spaces inside restored coral-stone buildings;
              combine with a walking tour of Al-Balad's intricate Roshan wooden screens
        duration: 2–4 hours per session
        materials_provided: true
        notes: >
          Compass, ruler, fine-liner pens, and quality paper provided;
          finished geometric works are frameable art pieces

      - name: Arabic Percussion — Tabla and Riqq
        description: >
          Learn the foundational rhythms (Iqa'at) of Arabic music on the hand drum (Tabla/Darbuka)
          or tambourine (Riqq). Rhythmic cycles like Maqsum, Samai, and Wahda underpin all
          Arabic classical and folk music.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Mekka Music and Arts Institute
            area: Al-Naseem district, Mekka
            notes: Group percussion classes; Tabla rental available
          - name: Al-Andalus Music Academy
            area: Al-Hamra district, Jeddah
            notes: Individual and ensemble percussion coaching; covers Tabla, Riqq, and Duff
        duration: 45–60 minutes per lesson
        notes: >
          Riqq (tambourine) is gentler for complete beginners; Tabla requires
          finger conditioning but progress is rapid; rhythms are written in visual notation

      - name: Traditional Saudi Nasheed (Islamic Vocal Music)
        description: >
          Nasheed is vocal Islamic music — unaccompanied or with light percussion.
          Learn proper maqam-based vocal technique, breath control, and the classical
          Arabic texts set to traditional melodic modes.
        skill_levels: [beginner, intermediate]
        businesses:
          - name: Mekka Islamic Arts Institute
            area: Al Haram district, Mekka
            notes: >
              Group vocal workshops focusing on Quranic recitation tone (Tajweed melody)
              and classical Nasheed forms; open to men, women (separate sessions)
          - name: Taif Arts Center Vocal Workshops
            area: Taif city center
            notes: >
              Courses covering proper Arabic vocal production, maqam awareness,
              and group Nasheed performance practice
        duration: 1 hour per session
        notes: >
          No prior musical experience required; Nasheed connects spiritual intention
          with vocal artistry; many participants report it deepening their Quran recitation

  nature_and_outdoors:
    description: >
      Natural landscapes surrounding Mekka — from desert plains to the cool Taif mountains
      and Red Sea coast. Best visited outside peak Hajj season (Dhul Hijjah) for safety and access.
    items:
      - name: Taif Mountain Trekking
        description: >
          The Al-Hada and Al-Shafa mountains around Taif (75 km from Mekka, 1,800 m elevation)
          offer cooler temperatures, forested trails, waterfalls, and stunning valley views.
          A complete contrast to Mekka's desert basin.
        location:
          name: Al-Hada and Al-Shafa mountains
          area: Taif governorate, Makkah Region
          coordinates: "21.3528° N, 40.4062° E"
          distance_from_mekka: 75 km (approx. 1 hour by car)
        businesses:
          - name: Al-Hada Mountain Resort Trails (public access)
            area: Al-Hada, Taif
            notes: Marked walking trails through pine and juniper forest; free access
          - name: Taif Adventure Park
            area: Al-Shafa, Taif
            notes: >
              Zipline, rope bridges, and guided hiking; family-friendly; stunning
              views over the Hejaz mountain range
          - name: Saudi Trekking Club (Taif chapter)
            area: Taif
            notes: Organized group hikes; welcome to visitors; contact via social media
        difficulty: easy to moderate
        best_season: "Year-round (summer especially pleasant — Taif is known as Saudi Arabia's summer retreat)"
        duration: 2–6 hours depending on trail
        notes: >
          Bring water, sunscreen, and layered clothing (evenings cool quickly at altitude);
          Al-Hada cable car offers aerial views for those preferring a gentler option

      - name: Taif Rose Valley (Wadi al-Ward)
        description: >
          Taif is world-famous for its Damascene roses — the source of some of the world's
          finest rose oil (Attar al-Ward). The rose season (March–April) fills the valleys
          with color and fragrance. Visit working rose farms and distilleries.
        location:
          name: Rose Farms of Al-Hada and Al-Hawiyah
          area: Taif, Makkah Region
          distance_from_mekka: 75 km
        businesses:
          - name: Al-Khuraibah Rose Farm
            area: Al-Hawiyah district, Taif
            notes: >
              One of the oldest rose farms in Taif; guided tours of rose picking
              and traditional steam-distillation of rose water and Attar
          - name: Taif Rose Festival (seasonal)
            area: Taif city and surrounding farms
            notes: >
              Annual festival held during bloom season (late March to early April);
              live distillation demos, rose products market, and cultural performances
          - name: Al-Rudaf Park
            area: Taif city center
            address: Al-Rudaf Road, Taif
            notes: Large public park with rose gardens; picnic areas; family-friendly; free entry
        best_season: "March–April (rose bloom season)"
        duration: Half-day to full-day
        notes: >
          Rose water, rose oil, and rose jam sold directly at farms — far cheaper and
          more authentic than city shops; book farm visits in advance during festival season

      - name: Desert Stargazing
        description: >
          The desert skies around Mekka are among the least light-polluted in the region.
          On clear nights the Milky Way is visible with the naked eye. An experience
          that connects deeply with Islamic reflection on the cosmos.
        location:
          name: Desert outskirts east of Mekka
          area: Al-Badia and Wadi Na'man areas
          distance_from_mekka: 20–40 km
        businesses:
          - name: Makkah Desert Safari Co. (Stargazing Package)
            area: Eastern desert, Mekka outskirts
            notes: >
              Evening packages including telescope sessions, Bedouin dinner,
              and guided star identification (Arabic star names are richly historical)
          - name: Saudi Astronomical Society (Jeddah chapter)
            area: Jeddah (80 km)
            notes: >
              Organizes public stargazing nights; visitors welcome; telescopes provided;
              lectures on Islamic astronomy and the historical Arabic star map
        best_time: "New moon phase; winter months (October–March) for clearest skies"
        duration: 3–5 hours (evening into night)
        notes: >
          Bring warm clothing for the desert night chill; Islamic astronomical heritage
          is vast — most stars visible tonight carry Arabic names given by medieval Muslim scholars

      - name: Wadi Na'man Hiking
        description: >
          Wadi Na'man is a scenic valley system northeast of Mekka with rocky gorges,
          seasonal waterfalls after rainfall, and ancient agricultural terraces. Popular
          for day hikes among Mekka residents.
        location:
          name: Wadi Na'man
          area: Northeast of Mekka, approx. 25 km from city center
          coordinates: "21.5200° N, 39.9500° E"
        difficulty: easy to moderate
        duration: 2–4 hours
        notes: >
          Best visited after winter rains (December–February) when water flows;
          no formal facilities — bring all food, water, and navigation tools;
          hiking in groups is recommended

      - name: Al-Hada Cable Car (Teleferik)
        description: >
          A scenic cable car ride over the Al-Hada mountain valley near Taif — offering
          breathtaking aerial views over the Hejaz highlands, valleys, and forest canopy.
        location:
          name: Al-Hada Cable Car Station
          area: Al-Hada, Taif
          address: Al-Hada Road, Taif
          coordinates: "21.3774° N, 40.3607° E"
        duration: 20–30 minutes (round trip)
        operating_hours: "09:00–22:00 daily"
        notes: >
          Suitable for all fitness levels; spectacular sunset views; combine with
          lunch at one of the hilltop restaurants overlooking the valley

      - name: Red Sea Snorkeling and Diving (Jeddah)
        description: >
          The Red Sea off Jeddah hosts some of the world's most biodiverse coral reefs —
          pristine hard and soft corals, reef fish, rays, turtles, and occasional whale sharks.
          Accessible for complete beginners through to advanced technical divers.
        location:
          name: Jeddah Corniche and offshore reefs
          area: Jeddah, Red Sea coast (80 km from Mekka)
          coordinates: "21.5433° N, 39.1728° E"
        businesses:
          - name: Dive Jeddah
            area: Al-Kurnaysh (Corniche), Jeddah
            notes: >
              PADI Open Water certification courses; Discover Scuba for beginners (no cert needed);
              guided reef dives at Sharm Obhur and offshore sites; full equipment rental
          - name: Red Sea Dive Center
            area: Obhur Creek, North Jeddah
            address: Obhur Al-Shamaliyah, Jeddah
            notes: >
              Snorkeling day trips to shallow reefs; boat dive charters; underwater
              photography rental available; family snorkel packages
          - name: Al-Nawras Diving Club
            area: Al-Hamra, Jeddah Corniche
            notes: >
              Community dive club; day memberships for certified divers;
              guided night dives (extraordinary visibility in warm Red Sea waters)
        best_season: "October–April (cooler water; optimal visibility)"
        duration: Half-day to full-day
        notes: >
          Water temperature 22–30°C year-round; no wetsuit needed in summer;
          modest swimwear options available from dive centers

  modern_sports_and_fitness:
    description: >
      Contemporary sports facilities, martial arts academies, and fitness centers in Mekka,
      with options in nearby Jeddah and Taif for specialist activities.
    items:
      - name: Football (Soccer)
        description: >
          Saudi Arabia's most popular sport. Public pitches, 5-a-side centers, and
          full-size pitches are available across Mekka for casual and competitive play.
        businesses:
          - name: Mekka Stadium (Prince Abdullah Al-Faisal Stadium)
            area: Al-Aziziyah district, Mekka
            address: King Abdulaziz Road, Mekka
            notes: >
              Home ground of Ittihad Mekka FC; check fixture schedule for match days;
              watching a Saudi Pro League match is a vibrant cultural experience
          - name: Foot Zone 5-a-side Centers
            area: Multiple locations in Mekka
            notes: >
              Hourly pitch rentals; floodlit artificial turf; equipment hire available;
              popular with pilgrims and residents for casual games
          - name: Al-Aziziyah Sports Complex
            area: Al-Aziziyah district, Mekka
            notes: Full-size natural and artificial pitches; changing rooms and showers
        notes: Bring or rent boots; water is essential; avoid midday heat (play mornings or evenings)

      - name: Basketball
        description: Fast-growing sport in Saudi Arabia with quality courts across Mekka.
        businesses:
          - name: Al-Makkah Sports Club Basketball Courts
            area: Al-Aziziyah district, Mekka
            notes: Indoor courts; open sessions and league games; visitor-friendly
          - name: Public Courts at King Fahd Sports Complex
            area: Mekka
            notes: Outdoor courts free to use; active pickup games most evenings
        notes: Courts usually busy after Asr prayer until late evening

      - name: Tennis
        description: Available at major hotels and sports clubs in Mekka and Taif.
        businesses:
          - name: Fairmont Makkah Tennis Facility
            area: Abraj Al-Bait Complex, Mekka
            notes: Courts for hotel guests; coaching available on request
          - name: Taif Tennis Club
            area: Taif Sports City, Taif
            notes: >
              Outdoor and indoor courts; coaching sessions; cooler mountain climate
              makes Taif the preferred destination for year-round outdoor tennis
          - name: Al-Aziziyah Sports Complex Tennis Courts
            area: Al-Aziziyah, Mekka
            notes: Public courts; racket hire available
        notes: Book courts in advance; early morning or evening sessions recommended

      - name: Mixed Martial Arts (MMA)
        description: >
          MMA has a fast-growing scene in Saudi Arabia following Vision 2030 reforms.
          Saudi Arabia now hosts major UFC and boxing events. Training academies in Mekka
          and Jeddah offer striking (Muay Thai, Boxing) and grappling (BJJ, Wrestling) classes.
        skill_levels: [beginner, intermediate, advanced]
        businesses:
          - name: Saudi MMA Federation Academy (Mekka)
            area: Al-Aziziyah district, Mekka
            notes: >
              Official federation-affiliated academy; classes in striking, wrestling,
              and submission grappling; beginners welcome; trial class available
          - name: Elevation MMA (Jeddah)
            area: Al-Rawdah district, Jeddah
            notes: >
              Full MMA curriculum including Muay Thai, Boxing, BJJ, and Wrestling;
              international coaching staff; English and Arabic instruction
          - name: Arena MMA Academy (Jeddah)
            area: Jeddah
            notes: Well-equipped gym; large mat area; regular in-house competitions
        duration: 1–1.5 hours per class
        notes: >
          Mouthguard and groin guard recommended for sparring sessions;
          most gyms provide gloves and pads for beginners

      - name: Gym and Fitness Centers
        description: Modern fitness facilities for weight training, cardio, and group classes.
        businesses:
          - name: Fitness Time (Mekka branches)
            area: Multiple locations — Al-Aziziyah, Al-Naseem, Abraj Al-Bait area
            notes: Saudi Arabia's largest gym chain; day passes and monthly memberships; modern equipment
          - name: Gold's Gym Makkah
            area: Al-Aziziyah district, Mekka
            notes: International brand; weights, cardio, and group fitness classes
          - name: Fairmont Makkah Fitness Center
            area: Abraj Al-Bait Complex, Mekka
            notes: Premium hotel gym; open to non-guests for a day fee
          - name: Swissôtel Fitness Center
            area: Abraj Al-Bait, Mekka
            notes: Full gym with pool; hotel guests free, visitors pay day fee
        notes: Separate facilities for men and women at most venues; hydration critical in Mekka's climate

      - name: Running and Athletics
        description: >
          Running clubs and athletics tracks are available in Mekka.
          The early morning hours after Fajr are ideal for running in cooler temperatures.
        businesses:
          - name: King Abdulaziz Sports City Athletics Track
            area: Al-Aziziyah district, Mekka
            notes: Standard 400m track; public access; often used by serious runners
          - name: Makkah Running Club (community group)
            area: Various meeting points across Mekka
            notes: >
              Community running group active on social media; weekly group runs;
              welcoming to visiting runners and pilgrims
        best_time: "05:30–07:30 (post-Fajr) or after Maghrib prayer"
        notes: >
          Hydration is critical — carry water; avoid running during midday heat;
          the elevated terrain of parts of Mekka provides natural hill training

  culinary_arts:
    description: >
      Hands-on cooking experiences celebrating Saudi and Hejazi culinary heritage —
      from traditional bread-baking to coffee ceremony mastery and royal kitchen techniques.
    items:
      - name: Saudi Cooking Classes (Hejazi Cuisine)
        description: >
          Learn to cook authentic Hejazi dishes — the distinct cuisine of the Mekka
          and Jeddah region, shaped by centuries of pilgrims from across the Muslim world.
          Dishes include Kabsa, Saleeg, Jareesh, Mutabbaq, and Harees.
        signature_dishes_taught:
          - Kabsa (spiced rice with meat — the national dish)
          - Saleeg (white rice slow-cooked in broth and milk; Hejazi specialty)
          - Jareesh (cracked wheat porridge with meat and caramelized onions)
          - Harees (slow-cooked wheat and lamb; Ramadan staple)
          - Mutabbaq (stuffed pastry with spiced meat and egg)
          - Maamoul (semolina cookies stuffed with dates or nuts)
        businesses:
          - name: Mekka Culinary Experience Center
            area: Al-Aziziyah district, Mekka
            notes: >
              Group and private cooking classes taught by local Hejazi home cooks;
              all ingredients provided; full meal enjoyed at the end; English and Arabic instruction
          - name: Jeddah Cooking Academy
            area: Al-Rawdah district, Jeddah
            notes: >
              Professional kitchen setting; wide Saudi and Gulf curriculum;
              Hejazi cuisine module highly popular with international visitors
          - name: Sofitel Jeddah Culinary Workshops
            area: Corniche Road, Jeddah
            notes: Hotel-run cooking experiences; Saudi and international techniques
        duration: 3–4 hours per class (including eating the meal cooked)
        notes: Halal-only ingredients; alcohol-free; dietary preferences accommodated on request

      - name: Arabic Coffee Ceremony (Qahwa Arabiyya)
        description: >
          The preparation and serving of traditional Saudi qahwa (Arabic coffee) is a refined
          art and a pillar of Arabian hospitality. Learn to roast green beans, grind with a
          wooden mortar (Mihbaj), and brew with cardamom, cloves, and saffron.
        businesses:
          - name: Saudi Heritage Commission Coffee Workshops
            area: Mekka Heritage Center
            notes: >
              Authentic demonstrations of traditional qahwa preparation;
              participants roast their own beans and brew a full ceremonial pot (Dallah)
          - name: Al-Nakhi Specialty Coffee (workshop sessions)
            area: Al-Aziziyah district, Mekka
            notes: Specialty coffee roaster offering qahwa heritage sessions alongside modern brewing
          - name: Taif Bedouin Camp Experiences
            area: Al-Hada, Taif
            notes: >
              Bedouin hosts teach qahwa ceremony in a traditional tent setting;
              paired with dates, dried fruits, and the full hospitality sequence
        duration: 1–2 hours
        notes: >
          Qahwa is served without sugar (sweetness comes from dates served alongside);
          the Dallah (coffee pot) and small handle-less cups (Fenjan) are iconic souvenirs

      - name: Traditional Bread Baking (Khobz Tannour and Margoog)
        description: >
          Learn to bake traditional Arabian flatbread in a clay tandoor oven (Tannour)
          and prepare Margoog — a slow-cooked meat and vegetable stew with thin bread layers.
          A deeply communal cooking tradition.
        businesses:
          - name: Mekka Heritage Cooking Sessions
            area: Traditional homes and cultural centers in Al-Adl district, Mekka
            notes: >
              Hosted by local families via cultural heritage programs;
              hands-on bread slapping, tandoor management, and stew preparation
          - name: Bedouin Desert Camp Cooking (Mekka outskirts)
            area: Eastern desert outskirts of Mekka
            notes: Evening programs include open-fire bread baking and Bedouin dinner preparation
        duration: 2–3 hours
        notes: >
          Flatbread baking in a Tannour reaches very high heat; long oven gloves provided;
          the finished meal is eaten together — a communal experience

      - name: Date Tasting and Classification Workshop
        description: >
          Saudi Arabia produces over 100 varieties of dates. Learn to distinguish between
          Ajwa (Medina's prized black date), Medjool (king of dates), Sukkari (caramel-sweet),
          Khlas, Safawi, and Barhi — assessing texture, sugar content, skin, and origin.
        businesses:
          - name: Bateel Dates Academy Sessions
            area: Abraj Al-Bait Mall, Mekka
            notes: >
              Guided tasting experiences; premium date varieties from Saudi farms;
              pairing with Arabic coffee; gift packaging available
          - name: Al-Madinah Date Market (tasting sessions)
            area: Near Masjid al-Haram souq area, Mekka
            notes: Informal but generous tastings from market vendors; bulk purchasing encouraged
          - name: Taif Date and Honey Festival (seasonal)
            area: Taif
            notes: >
              Annual event celebrating local dates and Sidr honey;
              expert-led tasting workshops; live harvest demonstrations
        duration: 1–2 hours
        notes: >
          Dates are considered Sunnah food (the Prophet PBUH broke fast with dates);
          Ajwa dates from Medina have particular religious significance for pilgrims

  family_and_kids:
    description: >
      Family-friendly activities and attractions suitable for children and all ages,
      combining entertainment with cultural and spiritual enrichment.
    items:
      - name: Al-Shallal Theme Park
        description: >
          Large entertainment complex combining an indoor theme park, aquatic park,
          go-karts, bowling, ice skating, and restaurants. One of the largest in the region.
        location:
          name: Al-Shallal Theme Park
          address: Corniche Road, Jeddah (80 km from Mekka)
          coordinates: "21.5900° N, 39.1170° E"
        age_range: All ages (some rides 3+)
        duration: Half-day to full-day
        notes: Family-friendly; halal food throughout; segregated and family sections

      - name: Mekka Mall Entertainment (Funland)
        description: Indoor family entertainment center with rides, arcade games, and play zones.
        location:
          name: Mekka Mall
          address: Al-Aziziyah district, Mekka
        age_range: 2–14 years (primary focus)
        duration: 1–3 hours
        notes: Indoor and air-conditioned; ideal during Mekka's hot midday hours

      - name: Taif Zoo and Wildlife Park
        description: >
          One of Saudi Arabia's largest zoos featuring Arabian wildlife including oryx,
          sand gazelles, baboons, and birds native to the Hejaz region.
        location:
          name: Taif Zoo (Al-Rudaf Park)
          address: Al-Rudaf Road, Taif
          coordinates: "21.2667° N, 40.4145° E"
          distance_from_mekka: 75 km
        duration: 2–3 hours
        notes: Family-friendly; shaded walkways; educational Arabic and English signage

      - name: Children's Quran and Islamic Learning Camps
        description: >
          Structured programs for children combining Quran memorization, Islamic history
          storytelling, Arabic alphabet, and fun activities — available during school holidays.
        businesses:
          - name: Masjid al-Haram Children's Quran Program
            area: Masjid al-Haram, Mekka
            notes: Free programs run during summer and Ramadan for ages 5–15
          - name: Al-Nour Islamic Children's Academy
            area: Al-Aziziyah district, Mekka
            notes: Intensive summer camps; Quran, Arabic, and Islamic arts integrated
        duration: Half-day sessions or week-long camps
        notes: Deeply meaningful for Muslim families visiting Mekka with children

      - name: Camel and Horse Petting Farm (Family Visit)
        description: >
          Gentle interaction with Arabian horses, camels, and farm animals — a hands-on
          educational experience for children to connect with the animals of Islamic heritage.
        businesses:
          - name: Al-Badia Family Farm
            area: Outskirts of Mekka, Al-Badia district
            notes: Family visits; animal feeding; photography; short guided camel walks for children
          - name: Al-Hada Animal Farm (Taif)
            area: Al-Hada, Taif
            notes: >
              Mountain setting; goats, horses, and camels; pony rides for young children;
              fresh farm products sold on-site
        duration: 1–2 hours
        notes: Bring modest, comfortable clothing; closed shoes essential around animals
