<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 14px 10px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 4px; }
  .ic svg { color: var(--ink-800); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: center; }
  .group { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="label">Iconography — Lucide @ 24px / 1.75 stroke</div>
  <div class="group">Used throughout. Stroke = currentColor. Mirror arrows in RTL.</div>
  <div class="grid" id="icons"></div>
</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  const names = ['map-pin','clock','calendar','phone','instagram','share-2','bookmark','arrow-left','chevron-down','coffee','mountain','sparkles','users','compass'];
  const root = document.getElementById('icons');
  names.forEach(n=>{
    const el = document.createElement('div'); el.className = 'ic';
    el.innerHTML = `<i data-lucide="${n}"></i><div class="name">${n}</div>`;
    root.appendChild(el);
  });
  lucide.createIcons({ attrs: { 'stroke-width': 1.75, width: 22, height: 22 }});
</script>
</body></html>
