<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 80px 1fr 60px; gap: 8px 14px; align-items: center; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .bar { height: 12px; background: var(--terracotta-300); border-radius: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Spacing — 8px Grid</div>
  <div class="grid">
    <div class="tag">--space-1</div><div><div class="bar" style="width:4px"></div></div><div class="tag">4</div>
    <div class="tag">--space-2</div><div><div class="bar" style="width:8px"></div></div><div class="tag">8</div>
    <div class="tag">--space-3</div><div><div class="bar" style="width:12px"></div></div><div class="tag">12</div>
    <div class="tag">--space-4</div><div><div class="bar" style="width:16px"></div></div><div class="tag">16</div>
    <div class="tag">--space-5</div><div><div class="bar" style="width:24px"></div></div><div class="tag">24</div>
    <div class="tag">--space-6</div><div><div class="bar" style="width:32px"></div></div><div class="tag">32</div>
    <div class="tag">--space-7</div><div><div class="bar" style="width:48px"></div></div><div class="tag">48</div>
    <div class="tag">--space-8</div><div><div class="bar" style="width:64px"></div></div><div class="tag">64</div>
    <div class="tag">--space-9</div><div><div class="bar" style="width:96px"></div></div><div class="tag">96</div>
  </div>
</div>
</body></html>
