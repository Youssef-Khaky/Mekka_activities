<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Logo Options</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@300;400;500;700;900&display=swap"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 24px; }
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .opt { background: var(--parchment-50); border: 1px solid var(--border-subtle); padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 10px; min-height: 220px; justify-content: center; }
  .opt.featured { background: #fff; border-color: var(--terracotta-300); box-shadow: var(--shadow-sm); grid-column: span 2; min-height: 260px; }
  .opt img, .opt svg { max-width: 100%; height: auto; max-height: 200px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .name.brand { color: var(--terracotta-600); font-weight: 600; }
</style>
</head>
<body>
<div class="card" style="width: 760px;">
  <div class="label">Logo — Wordmark Options</div>
  <div class="grid">
    <div class="opt featured" id="opt-b">
      <!-- Option B is rendered inline so it can be tweaked. -->
      <svg id="logo-b" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220"></svg>
      <div class="name brand">B · Stacked editorial · selected</div>
    </div>
    <div class="opt"><img src="../assets/logo/logo-serif.svg" alt="serif"/><div class="name">A · Serif horizontal</div></div>
    <div class="opt"><img src="../assets/logo/logo-modern.svg" alt="modern"/><div class="name">C · Modern with mark</div></div>
    <div class="opt"><img src="../assets/logo/logo-mark.svg" alt="mark"/><div class="name">D · Mark only</div></div>
  </div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dividerStyle": "none",
  "dividerGap": 76,
  "dividerY": 92,
  "stackGap": 72
}/*EDITMODE-END*/;

function renderLogoB(t) {
  const svg = document.getElementById('logo-b');
  const W = 480;
  const topY = 80;
  const dividerY = t.dividerY;
  const bottomY = dividerY + t.stackGap;
  const taglineY = bottomY + 28;
  const half = t.dividerGap / 2;
  const cx = W / 2;

  // Divider piece (depends on style)
  let divider = '';
  if (t.dividerStyle === 'lines-only') {
    // Just two short rules with empty space — no center dot
    divider = `
      <line x1="${cx - half - 50}" y1="${dividerY}" x2="${cx - half}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>
      <line x1="${cx + half}" y1="${dividerY}" x2="${cx + half + 50}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>
    `;
  } else if (t.dividerStyle === 'diamond') {
    // Small diamond in the middle, not a circle (less likely to read as a dot)
    divider = `
      <line x1="${cx - half - 50}" y1="${dividerY}" x2="${cx - 6}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>
      <line x1="${cx + 6}" y1="${dividerY}" x2="${cx + half + 50}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>
      <path d="M ${cx} ${dividerY - 4} L ${cx + 4} ${dividerY} L ${cx} ${dividerY + 4} L ${cx - 4} ${dividerY} Z" fill="#c97a4a"/>
    `;
  } else if (t.dividerStyle === 'star') {
    // Small 8-point asterisk — clearly ornamental, not punctuation
    const starPath = `M ${cx} ${dividerY - 5} L ${cx} ${dividerY + 5} M ${cx - 5} ${dividerY} L ${cx + 5} ${dividerY} M ${cx - 3.5} ${dividerY - 3.5} L ${cx + 3.5} ${dividerY + 3.5} M ${cx - 3.5} ${dividerY + 3.5} L ${cx + 3.5} ${dividerY - 3.5}`;
    divider = `
      <line x1="${cx - half - 50}" y1="${dividerY}" x2="${cx - half}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>
      <line x1="${cx + half}" y1="${dividerY}" x2="${cx + half + 50}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>
      <path d="${starPath}" stroke="#c97a4a" stroke-width="1.2" fill="none"/>
    `;
  } else if (t.dividerStyle === 'single-rule') {
    // One continuous hairline through the whole word width
    divider = `<line x1="${cx - 130}" y1="${dividerY}" x2="${cx + 130}" y2="${dividerY}" stroke="#c97a4a" stroke-width="1"/>`;
  } else if (t.dividerStyle === 'none') {
    divider = '';
  }

  svg.innerHTML = `
    <text x="${cx}" y="${topY}" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="700" font-size="78" fill="#1a1612" direction="rtl">فعاليات</text>
    ${divider}
    <text x="${cx}" y="${bottomY}" text-anchor="middle" font-family="Tajawal, sans-serif" font-weight="700" font-size="64" fill="#c97a4a" direction="rtl">مكــة</text>
    <text x="${cx}" y="${taglineY}" text-anchor="middle" font-family="IBM Plex Sans Arabic, sans-serif" font-size="10" fill="#4a3f2f" letter-spacing="4">EST. ١٤٤٧ — MAKKAH</text>
  `;
  // Re-resize viewBox to accommodate stack gap
  svg.setAttribute('viewBox', `0 0 ${W} ${taglineY + 24}`);
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    // Wait for fonts so SVG text measures correctly with Tajawal Black.
    const render = () => renderLogoB(t);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(render);
    } else {
      render();
    }
  }, [t]);
  return (
    <TweaksPanel title="Logo B — Tweaks">
      <TweakSection title="Divider treatment">
        <TweakSelect
          label="Style"
          value={t.dividerStyle}
          onChange={v => setTweak('dividerStyle', v)}
          options={[
            { value: 'lines-only', label: 'Two rules, no dot (recommended)' },
            { value: 'diamond', label: 'Tiny diamond' },
            { value: 'star', label: 'Tiny ornament' },
            { value: 'single-rule', label: 'Single hairline' },
            { value: 'none', label: 'No divider' },
          ]}
        />
        <TweakSlider
          label="Gap between rules"
          value={t.dividerGap}
          min={20} max={140} step={2}
          onChange={v => setTweak('dividerGap', v)}
          format={v => `${v}px`}
        />
      </TweakSection>
      <TweakSection title="Vertical rhythm">
        <TweakSlider
          label="Divider Y position"
          value={t.dividerY}
          min={92} max={132} step={1}
          onChange={v => setTweak('dividerY', v)}
          format={v => `${v}px`}
        />
        <TweakSlider
          label="Gap below divider"
          value={t.stackGap}
          min={48} max={88} step={2}
          onChange={v => setTweak('stackGap', v)}
          format={v => `${v}px`}
        />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
