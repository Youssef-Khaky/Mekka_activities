<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--font-ui); font-size: 15px; font-weight: 500; padding: 12px 22px; border-radius: 2px; border: 1px solid transparent; cursor: pointer; transition: all 220ms cubic-bezier(.2,.7,.2,1); display: inline-flex; gap: 8px; align-items: center; }
  .btn-primary { background: var(--terracotta-500); color: #fff; }
  .btn-primary:hover { background: var(--terracotta-600); }
  .btn-secondary { background: transparent; color: var(--ink-900); border-color: var(--ink-800); }
  .btn-secondary:hover { background: var(--ink-900); color: var(--parchment-50); }
  .btn-ghost { background: transparent; color: var(--terracotta-600); }
  .btn-ghost:hover { color: var(--terracotta-700); text-decoration: underline; text-underline-offset: 3px; }
  .btn-dark { background: var(--ink-900); color: var(--parchment-50); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-lg { padding: 16px 28px; font-size: 17px; }
  .group { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="label">Buttons</div>
  <div class="group">Primary actions</div>
  <div class="row">
    <button class="btn btn-primary">حجز الآن</button>
    <button class="btn btn-primary btn-lg">احجز رحلتك</button>
    <button class="btn btn-primary btn-sm">حجز</button>
    <button class="btn btn-dark">زيارة الموقع</button>
  </div>
  <div class="group">Secondary & ghost</div>
  <div class="row">
    <button class="btn btn-secondary">إضافة إلى رحلتي</button>
    <button class="btn btn-ghost">عرض جميع المقاهي ←</button>
    <button class="btn btn-secondary btn-sm">شارك</button>
  </div>
</div>
</body></html>
