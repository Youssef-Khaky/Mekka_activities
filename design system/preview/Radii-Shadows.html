<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Radii & Shadows</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .group { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); margin-top: 4px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .swatch { width: 110px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 88px; height: 64px; background: #fff; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align:center; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Radii · Shadows · Borders</div>
  <div class="group">Radii — editorial sharpness</div>
  <div class="row">
    <div class="swatch"><div class="box" style="border-radius:0"></div><div class="name">none · 0</div></div>
    <div class="swatch"><div class="box" style="border-radius:2px"></div><div class="name">sm · 2</div></div>
    <div class="swatch"><div class="box" style="border-radius:4px"></div><div class="name">md · 4 ★ cards</div></div>
    <div class="swatch"><div class="box" style="border-radius:8px"></div><div class="name">lg · 8</div></div>
    <div class="swatch"><div class="box" style="border-radius:14px"></div><div class="name">xl · 14</div></div>
    <div class="swatch"><div class="box" style="border-radius:999px"></div><div class="name">pill · ∞</div></div>
  </div>
  <div class="group">Shadows — warm-tinted only</div>
  <div class="row" style="background:var(--parchment-50); padding:18px; border:1px solid var(--border-subtle);">
    <div class="swatch"><div class="box" style="box-shadow:0 1px 2px rgba(45,38,32,.06); border-color:transparent;"></div><div class="name">xs · rest</div></div>
    <div class="swatch"><div class="box" style="box-shadow:0 2px 6px rgba(45,38,32,.08); border-color:transparent;"></div><div class="name">sm · hover</div></div>
    <div class="swatch"><div class="box" style="box-shadow:0 6px 18px rgba(45,38,32,.10); border-color:transparent;"></div><div class="name">md · popover</div></div>
    <div class="swatch"><div class="box" style="box-shadow:0 16px 40px rgba(45,38,32,.14); border-color:transparent;"></div><div class="name">lg · modal</div></div>
  </div>
</div>
</body></html>
