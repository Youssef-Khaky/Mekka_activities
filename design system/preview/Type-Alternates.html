<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Type — Tajawal Weight Family</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display: flex; gap: 16px; align-items: baseline; }
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: 100px 1fr; gap: 16px 22px; align-items: baseline; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .specimen { font-family: 'Tajawal', sans-serif; color: var(--ink-900); font-size: 38px; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="label">Tajawal — Weight Family</span><span class="meta">one typeface, full system</span></div>
  <div class="grid">
    <div class="name">300 · Light</div>
    <div class="specimen" style="font-weight:300;">فعاليات مكة</div>
    <div class="name">400 · Regular</div>
    <div class="specimen" style="font-weight:400;">فعاليات مكة</div>
    <div class="name">500 · Medium</div>
    <div class="specimen" style="font-weight:500;">فعاليات مكة</div>
    <div class="name">700 · Bold</div>
    <div class="specimen" style="font-weight:700;">فعاليات مكة</div>
    <div class="name">900 · Black</div>
    <div class="specimen" style="font-weight:900;">فعاليات مكة</div>
    <div class="name">Amiri italic <br/><span style="opacity:.6">accent only</span></div>
    <div class="specimen" style="font-family:'Amiri', serif; font-style:italic; font-weight:400;">«اكتشف ما تفعله اليوم»</div>
  </div>
</div>
</body></html>
