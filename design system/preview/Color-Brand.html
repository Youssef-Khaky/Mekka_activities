<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Color — Brand</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.1/1; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-ui); font-size: 13px; color: var(--fg-primary); font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .row { display: flex; gap: 16px; align-items: baseline; }
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <span class="label">Brand · Terracotta</span>
    <span style="font-family:var(--font-body); font-size:13px; color:var(--fg-secondary);">الأساس البصري — الطين الحراري</span>
  </div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#f4d9c8"></div><div class="name">terracotta-100</div><div class="val">#F4D9C8</div></div>
    <div class="sw"><div class="chip" style="background:#e09b75"></div><div class="name">terracotta-300</div><div class="val">#E09B75</div></div>
    <div class="sw"><div class="chip" style="background:#c97a4a; border-color:transparent"></div><div class="name">terracotta-500 ★</div><div class="val">#C97A4A</div></div>
    <div class="sw"><div class="chip" style="background:#b4623a; border-color:transparent"></div><div class="name">terracotta-600</div><div class="val">#B4623A</div></div>
    <div class="sw"><div class="chip" style="background:#8f4a2c; border-color:transparent"></div><div class="name">terracotta-700</div><div class="val">#8F4A2C</div></div>
    <div class="sw"><div class="chip" style="background:#6b3a2a; border-color:transparent"></div><div class="name">date-500</div><div class="val">#6B3A2A</div></div>
    <div class="sw"><div class="chip" style="background:#4a261b; border-color:transparent"></div><div class="name">date-700</div><div class="val">#4A261B</div></div>
    <div class="sw"><div class="chip" style="background:#1a1612; border-color:transparent"></div><div class="name">ink-900</div><div class="val">#1A1612</div></div>
  </div>
</div>
</body></html>
