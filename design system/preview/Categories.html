<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Categories</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .cat { aspect-ratio: 1.4/1; background: var(--parchment-100); border: 1px solid var(--border-subtle); padding: 14px; display: flex; flex-direction: column; justify-content: space-between; }
  .cat .ar { font-family: 'Amiri', serif; font-size: 22px; font-weight: 700; color: var(--ink-900); line-height: 1.1; }
  .cat .en { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-muted); }
  .cat svg { color: var(--terracotta-600); }
  .cat.dark { background: var(--ink-900); }
  .cat.dark .ar { color: var(--parchment-50); }
  .cat.dark .en { color: var(--sand-400); }
  .cat.dark svg { color: var(--saffron-400); }
  .cat.brand { background: var(--terracotta-500); }
  .cat.brand .ar { color: #fff; }
  .cat.brand .en { color: var(--parchment-100); }
  .cat.brand svg { color: #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Category Tiles</div>
  <div class="grid">
    <div class="cat brand"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M8 2v4M16 2v4M3 10h18M5 6h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"/></svg><div><div class="ar">فعاليات</div><div class="en">Events</div></div></div>
    <div class="cat"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M17 8h1a4 4 0 1 1 0 8h-1M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg><div><div class="ar">مقاهٍ</div><div class="en">Coffee</div></div></div>
    <div class="cat"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg><div><div class="ar">مسارات</div><div class="en">Trails</div></div></div>
    <div class="cat dark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg><div><div class="ar">تاريخية</div><div class="en">Historic</div></div></div>
    <div class="cat"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><div><div class="ar">ورش حرفة</div><div class="en">Skills</div></div></div>

    <div class="cat"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg><div><div class="ar">ركوب الخيل</div><div class="en">Horseback</div></div></div>
    <div class="cat"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><div><div class="ar">المزيد</div><div class="en">All categories</div></div></div>
  </div>
</div>
</body></html>
