<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Type — UI</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display: flex; gap: 16px; align-items: baseline; }
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .ui { font-family: 'Tajawal', sans-serif; color: var(--fg-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="label">UI · Tajawal Medium / Bold</span><span class="meta">500 / 700 — var(--font-ui)</span></div>
  <div class="stack">
    <div class="ui" style="font-size: 28px; font-weight: 700;">جميع المقاهي</div>
    <div class="ui" style="font-size: 18px; font-weight: 500;">إضافة إلى رحلتي</div>
    <div class="ui" style="font-size: 15px; font-weight: 400;">٣٢ مكانًا · مرتبة حسب القرب</div>
    <div class="ui" style="font-size: 13px; font-weight: 500; letter-spacing: 0.06em; color: var(--fg-muted);">قهوة • تراث • ورش</div>
  </div>
</div>
</body></html>
