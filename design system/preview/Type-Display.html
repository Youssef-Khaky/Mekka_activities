<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Type — Display</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display: flex; gap: 16px; align-items: baseline; }
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .specimen { font-family: 'Tajawal', sans-serif; color: var(--fg-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="label">Display · Tajawal Black</span><span class="meta">900 / var(--font-display)</span></div>
  <div class="specimen" style="font-size: 84px; font-weight: 900; line-height: 1.0;">فعاليات مكة</div>
  <div class="specimen" style="font-size: 44px; font-weight: 700; line-height: 1.15; color: var(--terracotta-600);">رحلة في وادي إبراهيم عند الفجر</div>
  <div class="specimen" style="font-family:'Amiri', serif; font-size: 22px; font-style: italic; color: var(--fg-secondary);">«اكتشف ما تفعله اليوم — في الجبل، في المقهى، في ورشة الحرفة.»</div>
</div>
</body></html>
