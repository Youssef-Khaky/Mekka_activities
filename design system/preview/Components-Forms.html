<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<title>Form Fields</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .label { font-family: var(--font-ui); font-size: 12px; color: var(--fg-muted); letter-spacing: 0.12em; text-transform: uppercase; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .flbl { font-family: var(--font-ui); font-size: 13px; color: var(--fg-secondary); font-weight: 500; }
  .input { font-family: var(--font-ui); font-size: 15px; padding: 12px 14px; background: #fff; border: 1px solid #d9caa8; color: #1a1612; outline: none; border-radius: 2px; }
  .input:focus { border-color: #c97a4a; box-shadow: 0 0 0 2px rgba(201,122,74,.18); }
  .input::placeholder { color: #a48852; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .search { display: flex; align-items: center; background: #fff; border: 1px solid #d9caa8; padding: 0 14px; border-radius: 2px; }
  .search input { border: none; background: transparent; padding: 14px 0; font-family: var(--font-ui); font-size: 16px; flex:1; outline: none; }
  .search svg { color: #a48852; }
  .help { font-family: var(--font-body); font-size: 12px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card">
  <div class="label">Inputs · Forms</div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input placeholder="ابحث عن مقهى أو فعالية أو مسار…"/>
  </div>
  <div class="row">
    <div class="field"><span class="flbl">الاسم</span><input class="input" placeholder="اسمك الكريم"/></div>
    <div class="field"><span class="flbl">رقم التواصل</span><input class="input" value="+٩٦٦ ٥٠ ١٢٣ ٤٥٦٧"/></div>
  </div>
  <div class="field">
    <span class="flbl">ملاحظات</span>
    <textarea class="input" rows="2" style="resize:vertical; font-family:var(--font-body);">عدد الأشخاص: ٢ • أول مرة على الخيل</textarea>
    <span class="help">سنشاركها مع المرشد المحلي قبل الجلسة.</span>
  </div>
</div>
</body></html>
