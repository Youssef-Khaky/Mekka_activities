# الإقامة والنقل والمعلومات العملية للزائر

activities:
  accommodation:
    description: أبرز الفنادق والأماكن للإقامة بالقرب من المسجد الحرام
    items:
    - name: فيرمونت مكة كلوك رويال تاور
      description: فندق فاخر من فئة خمس نجوم في برج الساعة الأيقوني مع إطلالة مباشرة على الكعبة المشرفة
      location:
        address: مجمع أبراج البيت، شارع إبراهيم الخليل، مكة المكرمة 24231
        coordinates: 21.4196° N, 39.8260° E
      url: https://www.fairmont.com/en/hotels/makkah/makkah-clock-royal-tower.html
      distance_to_haram: ملاصق مباشرة (2–3 دقائق سيراً)
      notes: خيار متميز؛ مطاعم متعددة وسبا وإطلالة سطح الفندق؛ الحجز يُغلق قبل أشهر

    - name: سويسوتيل مكة
      description: فندق راقٍ متصل بمجمع أبراج البيت
      location:
        address: أبراج البيت، شارع إبراهيم الخليل، مكة المكرمة
      url: https://www.swissotel.com/hotels/makkah
      distance_to_haram: دقيقتان إلى خمس دقائق سيراً
      notes: إطلالات ممتازة على الحرم من الطوابق العليا؛ بوفيه إفطار متاح

    - name: رافلز مكة بالاس
      description: فندق فائق الفخامة في أبراج البيت بأجنحة فارهة
      location:
        address: مجمع أبراج البيت، مكة المكرمة
      url: https://www.raffles.com/makkah
      distance_to_haram: ثلاث إلى خمس دقائق سيراً
      notes: خدمة على أعلى مستوى؛ خدمة كونسيرج؛ مثالي لمن يُقدّم الراحة الفائقة

    - name: هيلتون سويتس مكة
      description: فندق خمس نجوم مشهور قريب من المسجد الحرام
      location:
        address: شارع إبراهيم الخليل، منطقة الحرم، مكة المكرمة
        coordinates: 21.4197° N, 39.8253° E
      url: https://www.hilton.com/en/hotels/maksuhi-hilton-suites-jabal-omar-makkah
      distance_to_haram: خمس دقائق سيراً
      notes: أجنحة فسيحة؛ سمعة طيبة بين مجموعات الحج والعمرة

    - name: بولمان زمزم مكة
      description: فندق متميز يوفر إطلالات على الكعبة وقرب من الحرم
      location:
        address: شارع أجياد، منطقة الحرم، مكة المكرمة
      url: https://www.pullman-zamzam-makkah.com
      distance_to_haram: خمس إلى سبع دقائق سيراً
      notes: تابع لمجموعة أكور؛ معروف بالخدمة الجيدة والغرف المريحة

    - name: لو ميريديان تاورز مكة
      description: فندق ذو برجين في منطقة أجياد مع مطاعم ممتازة
      location:
        address: شارع أجياد، منطقة الحرم، مكة المكرمة
      url: https://www.marriott.com/en-us/hotels/jedmk-le-meridien-towers-makkah/overview
      distance_to_haram: سبع إلى عشر دقائق سيراً
      notes: مفضل لدى العائلات والمجموعات الكبيرة؛ مطعم النافورة في الموقع

    - name: إنتركونتيننتال مكة
      description: فندق خمس نجوم راسخ السمعة يوفر قاعات مؤتمرات وسهولة وصول للحرم
      location:
        address: طريق الملك عبدالعزيز، منطقة الحرم، مكة المكرمة
      url: https://www.ihg.com/intercontinental/hotels/us/en/makkah/qcahd/hoteldetail
      distance_to_haram: عشر إلى خمس عشرة دقيقة سيراً
      notes: مناسب لحجوزات المجموعات الكبيرة؛ خدمة مكوك للمسجد متاحة

  transportation:
    description: التنقل داخل مكة المكرمة خلال إقامتك
    items:
    - name: مترو مكة (قطار المشاعر)
      description: خط مترو يربط المسجد الحرام بمنى ومزدلفة وعرفات
      location:
        stations:
        - محطة الملك عبدالعزيز (المسجد الحرام)
        - محطة منى
        - محطة مزدلفة
        - محطة عرفات
      notes: يعمل أساساً في موسم الحج؛ يُخفف الاختناقات المرورية على طرق الشعائر

    - name: أوبر وكريم
      description: تطبيقا طلب السيارات الأكثر استخداماً في مكة المكرمة
      url_uber: https://www.uber.com/sa/en
      url_careem: https://www.careem.com
      notes: متاحان على مدار العام؛ ترتفع الأسعار في أوقات الصلاة والحج؛ الحجز المسبق مُستحسن

    - name: حافلات مكة (سابتكو)
      description: شبكة حافلات عامة تغطي المناطق الرئيسية في مكة المكرمة
      location:
        key_routes:
        - الحرم ↔ التنعيم (مسجد السيدة عائشة)
        - الحرم ↔ جبل النور
        - الحرم ↔ العزيزية
      url: https://saptco.com.sa/en
      notes: اقتصادية؛ حافلات مكيفة؛ تقبل بطاقة مدى (الدفع اللاتلامسي)

    - name: سيارات الأجرة
      description: تاكسيات بعداد وبدون عداد متاحة في أنحاء مكة المكرمة
      notes: اتفق على الأجرة قبل الانطلاق؛ التاكسيات الصفراء المرخصة أفضل من غيرها

  practical_resources:
    description: >
      معلومات عملية أساسية لزيارة آمنة ومنظمة وممتعة روحياً لمكة المكرمة — أرقام الطوارئ
      والتطبيقات وإرشادات التأشيرة وقائمة المستلزمات.
    items:
    - name: أرقام الطوارئ
      description: الأرقام الطارئة الرئيسية والمرافق الطبية في مكة المكرمة.
      contacts:
      - service: الطوارئ السعودية (شرطة / إسعاف / إطفاء)
        number: '911'
      - service: الهلال الأحمر السعودي (إسعاف)
        number: '997'
      - service: خط طوارئ وزارة الحج
        number: '920002814'
      hospitals:
      - name: مجمع الملك عبدالله الطبي (KAMC)
        area: منطقة الحرم، مكة المكرمة
        url: https://kamc.med.sa/en
        notes: أكبر مستشفى في مكة؛ طوارئ 24 ساعة؛ علاج مجاني لحجاج بيت الله
      - name: مستشفى النور التخصصي
        area: طريق العزيزية، مكة المكرمة
        notes: خدمات تخصصية متكاملة؛ كادر طبي يتحدث الإنجليزية
      - name: مستشفى الملك فيصل
        area: حي الزاهر، مكة المكرمة
        notes: مستشفى عام مجهز بقسم طوارئ متكامل

    - name: التطبيقات الأساسية للحجاج
      description: تطبيقات ذكية تُعزز السلامة والتنقل وتجربة العبادة.
      apps:
      - name: نسك
        developer: وزارة الحج والعمرة السعودية
        url: https://www.nusuk.sa
        platforms:
        - iOS
        - Android
        features:
        - تسجيل الحج والعمرة الرسمي والتصاريح
        - خرائط كثافة الحشود في الوقت الفعلي بالمسجد الحرام
        - مواقيت الصلاة واتجاه القبلة
        - الإبلاغ عن الحجاج المفقودين
        notes: إلزامي لحجاج بيت الله؛ موصى به بشدة لمعتمري بيت الله

      - name: كريم وأوبر
        url_careem: https://www.careem.com
        url_uber: https://www.uber.com/sa/en
        platforms:
        - iOS
        - Android
        features:
        - طلب سيارات في مكة والمناطق المحيطة
        - إمكانية الحجز المسبق
        notes: كريم الأكثر انتشاراً محلياً؛ ترتفع الأسعار في أوقات الصلاة والحج

      - name: مسلم برو
        url: https://www.muslimpro.com
        platforms:
        - iOS
        - Android
        features:
        - مواقيت صلاة دقيقة لمكة المكرمة
        - القرآن الكريم مع ترجمات وتلاوات صوتية
        - متابع أذكار يومية

      - name: خرائط جوجل / خرائط آبل
        platforms:
        - iOS
        - Android
        features:
        - التنقل داخل مكة المكرمة (تغطية جيدة)
        - تحميل خرائط بدون إنترنت قبل الوصول
        notes: تغطية المشي داخل المسجد الحرام محدودة

    - name: التأشيرة ومتطلبات الدخول
      description: >
        تستلزم المملكة العربية السعودية تأشيرات خاصة لحجاج الحج والعمرة. تحقق دائماً من البوابة الرسمية
        لوزارة الحج قبل الحجز.
      visa_types:
      - type: تأشيرة الحج
        eligibility: حجاج مسلمون ضمن الحصة الوطنية المعتمدة
        apply_via: بعثة الحج الرسمية في بلدك أو وكيل حج مرخص
        notes: خاصة بموسم الحج؛ غير المسلمين ممنوعون من دخول مكة
      - type: تأشيرة العمرة
        eligibility: حجاج مسلمون؛ بعض الجنسيات عبر التأشيرة الإلكترونية
        validity: حتى 90 يوماً؛ خيارات دخول متعددة متاحة
        apply_via: بوابة التأشيرة الإلكترونية السعودية أو وكلاء عمرة مرخصون
        url: https://visa.visitsaudi.com
        notes: كثير من الجنسيات تستطيع الحصول عليها إلكترونياً؛ تشمل مكة والمدينة
      - type: التأشيرة السياحية السعودية (لغير المسلمين)
        eligibility: مواطنو الدول المؤهلة
        notes: غير المسلمين لا يُسمح لهم بدخول مكة المكرمة؛ تشمل سائر المناطق السعودية
      notes: احتفظ دائماً بنسخ ورقية من جميع الوثائق إضافةً إلى النسخ الرقمية

    - name: قائمة مستلزمات الإحرام والحاج
      description: دليل عملي لتجهيز حقيبة الحج والعمرة.
      ihram_requirements:
        men:
        - قطعتان من القماش الأبيض غير المخيط (الرداء والإزار)
        - صندل (بدون تغطية الكعب في الإحرام)
        women:
        - ملابس محتشمة فضفاضة كاملة التغطية (أي لون؛ الوجه والكفان مكشوفان)
        - حذاء مريح للمشي
      recommended_items:
      - زجاجة ماء زمزم قابلة للحمل (من الفولاذ المقاوم للصدأ أو خالية من BPA)
      - سجادة صلاة مدمجة
      - كريم واقٍ من الشمس (SPF 50+)
      - أكياس الأملاح والمعادن (ORS)
      - لاصقات البثور وحذاء مريح للمشي
      - حقيبة إسعافات أولية صغيرة
      - أدوية موصوفة (مع رسالة طبية بالعربية والإنجليزية)
      - شاحن هاتف محمول / بطارية احتياطية
      - مصباح LED صغير (مفيد في مدينة خيام منى)
      - مفكرة حج وعمرة لتسجيل الأدعية والتأملات
      notes: جميع المستلزمات متاحة قرب المسجد الحرام عند النسيان؛ ثياب الإحرام تُباع في محطات الميقات
