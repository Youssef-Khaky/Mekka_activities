# الأنشطة الليلية والجولات الإرشادية ودراسة العربية والقرآن

activities:
  night_activities:
    description: >
      مكة المكرمة مدينة لا تنام — الأجواء بعد العشاء وفي ساعات الفجر فريدة ولا يختبرها إلا من
      يقضي فيها لياليه. الطواف في الثلث الأخير من الليل، وشوارع الحرم تحت الإضاءة، وأكل
      البيك فجراً — تجارب لا تُنسى.
    items:
    - name: الطواف في الثلث الأخير من الليل (02:00–04:00)
      description: >
        أهدأ أوقات المسجد الحرام وأكثرها روحانية — الحشود تقل، والكعبة تبدو في جلالها الكامل،
        وبعض الحجاج يبكون بحرية أكبر. يقترن بصلاة التهجد ثم تأمل الكعبة في ضوء الفجر.
      location:
        name: المطاف — المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      best_time: 02:00–04:30 (بعد صلاة التهجد)
      notes: احمل ماءً وسجادة صلاة مدمجة؛ سطح المسجد وأفنيته أيضاً هادئة في هذه الساعات

    - name: مسيرة ما بعد العشاء حول المسجد الحرام
      description: >
        جولة مشاة مسائية في الشوارع المحيطة بالمسجد الحرام — شارع إبراهيم الخليل وشارع أجياد
        وصحن باب الملك فهد — حيث تضيء الأنوار الكعبة وبرج الساعة معاً. تجربة بصرية لا مثيل لها.
      location:
        area: شارع إبراهيم الخليل وشارع أجياد والمداخل المحيطة بالمسجد الحرام
      best_time: 21:00–23:30 بعد صلاة العشاء
      duration: ساعة إلى ساعتين
      notes: الهواء أكثر برودة ليلاً؛ مثالي للتصوير؛ الباعة المتجولون يزيد نشاطهم بعد العشاء

    - name: وجبة البيك في ساعات الفجر
      description: >
        تجربة أيقونية بين حجاج الفجر — تناول وجبة البيك بعد صلاة الفجر حين تفتح الفروع أبوابها
        على الحجاج المنهكين الراجعين من التهجد. طوابير الفجر أقصر ولها أجواء خاصة.
      location:
        businesses:
        - name: البيك — شارع أجياد
          area: بالقرب من المسجد الحرام، مكة المكرمة
          url: https://www.albaik.com
          notes: مفتوح 24 ساعة خلال موسم الحج ورمضان
        - name: البيك — مجمع أبراج البيت
          area: شارع إبراهيم الخليل، منطقة الحرم
      best_time: 04:30–07:00 (بعد صلاة الفجر مباشرة)
      notes: جزء من ذكريات الحج لملايين الحجاج؛ الدجاجة المقرمشة مع الصوص الحار تقليد لا غنى عنه

    - name: أسواق الليل حول الحرم (بعد العشاء)
      description: >
        الشوارع المحيطة بالمسجد الحرام تحيا بعد صلاة العشاء بباعة متجولين وبسطات تذكارات وعطارين
        وبائعي التمور والسواك والسبح ومستلزمات الإحرام. تسوق ليلي بأجواء حجازية أصيلة.
      location:
        areas:
        - شارع أجياد — بسطات التذكارات والمسابح والسواك
        - أمام باب الملك عبدالعزيز — عطارون وبائعو زيوت عطرية
        - محيط سوق الزل (المعلا) — مقتنيات ليلية
      best_time: 21:00–01:00
      notes: التفاوض متوقع؛ الأسعار في الليل أحياناً أرن من النهار؛ احمل محفظة صغيرة

    - name: صلاة الفجر بالمسجد الحرام مع إشراق الشمس
      description: >
        من أكثر التجارب إبهاراً روحياً: أداء صلاة الفجر في المسجد الحرام ثم البقاء جالساً تتلو
        القرآن أو تذكر الله حتى شروق الشمس، والكعبة أمامك تبدأ تتلقى أول ضوء النهار.
      location:
        name: المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      best_time: قبل صلاة الفجر بـ 30 دقيقة حتى 45 دقيقة بعد الشروق
      notes: الجلوس حتى الإشراق يعادل حجة تامة (حديث شريف)؛ احمل مصحفاً صغيراً

    - name: جلسة ذكر جماعية ليلية (حلقة)
      description: >
        حلقات الذكر الجماعي تُعقد بشكل عفوي في أفنية وممرات المسجد الحرام بعد صلاة العشاء
        وفي رمضان بشكل خاص — مجموعات تذكر الله وتقرأ القرآن وتتلو الأدعية بنغمات جماعية خاشعة.
      location:
        name: أفنية المسجد الحرام والممرات الخارجية
        area: منطقة الحرم، مكة المكرمة
      best_time: بعد صلاة العشاء (21:00–23:00)؛ رمضان بشكل خاص
      notes: انضم برفق إلى الحلقات الموجودة؛ الذكر مفتوح للجميع؛ لا يشترط فهم عربي لمجرد الحضور

    - name: تجربة السحور الليلي مع الحجاج الدوليين
      description: >
        في رمضان وفي مواسم الحج تعود فيها الحجاج بعد منتصف الليل، يتحول محيط الحرم إلى سوق
        طعام ليلي غير رسمي تتعدد فيه مأكولات العالم الإسلامي — مطابخ باكستانية وتركية وإندونيسية
        وغرب أفريقية جنباً إلى جنب.
      location:
        area: شارع أجياد والمحلات الصغيرة المحيطة بالمسجد من الجهات الأربع
      best_time: 00:00–04:00 (رمضان وموسم الحج)
      notes: تجربة ثقافية بامتياز — الطعام والأجواء تعكس التعددية الإسلامية الحقيقية

  guided_city_tours:
    description: >
      جولات إرشادية منظمة مع مرشدين سياحيين معتمدين — تجمع بين عمق المعنى الروحي وسرد التاريخ
      الإسلامي والجغرافية المقدسة لمكة المكرمة. مناسبة لمن يريد فهماً أعمق بدلاً من مجرد الزيارة.
    items:
    - name: جولة مواقع التاريخ الإسلامي (يوم كامل)
      description: >
        جولة ميدانية مع مرشد معتمد تغطي الجبال المقدسة والمواقع التاريخية والأحياء القديمة
        في يوم كامل: جبل النور (غار حراء) وجبل ثور وجنة المعلا ومسجد الجن وجنة البقيع والمساجد التاريخية.
      duration: 6–8 ساعات
      businesses:
      - name: وكالات سياحية مرخصة للحج والعمرة (وزارة السياحة)
        area: مكة المكرمة
        url: https://www.visitsaudi.com/en
        notes: اطلب مرشداً حاصلاً على ترخيص وزارة السياحة ومتخصصاً في التاريخ الإسلامي
      - name: تجارب مكة المرشدة
        area: منطقة الحرم، مكة المكرمة
        notes: خدمة مرشد إرشادي خاص؛ يتحدث العربية والإنجليزية والأردية؛ سيارة مدرجة في الخدمة
      notes: احجز مسبقاً؛ ارتدِ حذاءً متيناً لصعود الجبال؛ اصطحب كمية وفيرة من الماء

    - name: جولة العمرة التعليمية التفصيلية
      description: >
        جولة إرشادية مع عالم أو طالب علم يشرح المعنى الروحي والفقهي لكل خطوة من خطوات العمرة
        في الوقت الفعلي — الإحرام والطواف والسعي والتحلل. مثالية للمسلمين الجدد والزائرين للمرة الأولى.
      duration: 3–4 ساعات (مع الممارسة الفعلية)
      businesses:
      - name: برنامج الدليل الديني — وزارة الحج والعمرة
        area: المسجد الحرام، مكة المكرمة
        url: https://www.nusuk.sa
        notes: مرشدون دينيون رسميون يتحدثون لغات متعددة؛ التسجيل عبر منصة نسك
      - name: برامج مرشدي الحج والعمرة المعتمدون
        area: مداخل المسجد الحرام الرئيسية
        notes: مرشدون خاصون متاحون عبر وكالات السياحة المرخصة؛ أتعاب متفق عليها مسبقاً
      notes: متاح بالعربية والإنجليزية والفرنسية والأردية والملاوية والتركية

    - name: جولة معمارية للمسجد الحرام
      description: >
        استكشاف إرشادي لعمارة المسجد الحرام عبر الزمن — التوسعات العثمانية والسعودية الأولى
        والثانية وتوسعة الملك فهد وبقايا العناصر التاريخية ضمن المبنى الحالي. البوابات والمآذن
        والمقرنصات والأسقف والتفاصيل المعمارية التي يتجاوز عنها أغلب الزوار.
      duration: 2–3 ساعات
      businesses:
      - name: جمعية المهندسين السعوديين — فرع مكة (جلسات جولات موسمية)
        area: المسجد الحرام، مكة المكرمة
        notes: جولات معمارية موسمية يقودها مهندسون متخصصون في عمارة المساجد الإسلامية
      - name: مراكز التراث والإرشاد — هيئة التراث السعودي
        area: مكة المكرمة
        url: https://heritage.moc.gov.sa/en
        notes: تتضمن بعض برامج الهيئة جولات في عمارة المسجد الحرام وتاريخه المعماري
      notes: عدسة واسعة الزاوية مُوصى بها؛ اقرأ مسبقاً عن التوسعات التاريخية لاستيعاب أفضل

    - name: جولة جبلي النور والثور (المشي المقدس)
      description: >
        مشي مرشد يجمع صعود جبل النور (غار حراء) وجبل ثور في يوم واحد مع سرد للسيرة النبوية
        المرتبطة بكل موقع. الاستماع إلى قصة أول آيات الوحي عند الغار أشد أثراً من أي كتاب.
      duration: 5–7 ساعات (صعود وهبوط والتنقل بين الموقعين)
      logistics:
        start: جبل النور (الصباح الباكر)
        transport_between: سيارة مشمولة في الجولة
        finish: جبل ثور (فترة ما بعد الظهر)
      businesses:
      - name: وكالات السياحة الإسلامية المرخصة
        area: مكة المكرمة
        url: https://www.visitsaudi.com/en
        notes: اطلب باقة "جولة الجبلين المقدسين"؛ مرشد سيرة نبوية مطلوب لا مجرد دليل مكاني
      notes: ابدأ الصعود لجبل النور قبل الشروق؛ حذاء متين للغاية ضروري لجبل ثور

    - name: جولة الأحياء القديمة في مكة (الماشي التراثي)
      description: >
        جولة مشاة في الأحياء التاريخية حول المسجد الحرام التي لم تُزَل بعد — حي المعلا والزاهر
        وأجياد والقديمة — مع مرشد يكشف عن تاريخ مكة الاجتماعي والعمراني قبل التوسعات الحديثة.
      duration: 2–3 ساعات
      businesses:
      - name: مجموعة المصورين المحليين ومحبي التراث (إرشاد غير رسمي)
        area: حي المعلا وسوق الزل، مكة المكرمة
        notes: سكان محليون متحمسون للتاريخ يرشدون مجموعات صغيرة بشكل غير رسمي؛ التواصل عبر الشبكات المحلية
      - name: برامج "كان يا مكان" التراثية — هيئة التراث السعودي
        area: مكة المكرمة
        url: https://heritage.moc.gov.sa/en
        notes: برامج تراثية موسمية بمرشدين متخصصين في التاريخ الحضري لمكة
      notes: الأجمل في ساعات الصباح الباكر أو المساء؛ احترم خصوصية السكان أثناء التصوير

    - name: جولة مواقيت الإحرام (الحدود المقدسة)
      description: >
        زيارة مرشدة للمواقيت الرئيسية المحيطة بمكة — مسجد السيدة عائشة (التنعيم) ومسجد
        الجعرانة وميقات قرن المنازل (السيل الكبير) — مع شرح تفصيلي لفقه الحرم وحدوده الجغرافية.
      duration: نصف يوم (التنعيم والجعرانة) إلى يوم كامل (مع السيل الكبير)
      highlights:
      - مسجد السيدة عائشة (التنعيم) — 7.5 كم شمالاً؛ يمكن أداء عمرة منه
      - مسجد الجعرانة — 24 كم شرقاً؛ تاريخ غزوة حنين وتوزيع غنائمها
      - قرن المنازل (السيل الكبير) — 75 كم شرقاً؛ ميقات نجد والخليج
      businesses:
      - name: جولات دليلك المرشدة
        area: مكة المكرمة
        notes: باقات نصف يوم ويوم كامل تغطي المواقيت؛ مرشد فقهي ديني متاح
      notes: يمكن أداء عمرة إضافية من مسجد السيدة عائشة أو الجعرانة خلال هذه الجولة

  arabic_and_quran_study:
    description: >
      برامج منهجية لتعلم اللغة العربية وتحسين التلاوة القرآنية ودراسة العلوم الإسلامية
      في مكة المكرمة — من دورات مكثفة للزائرين القصيرة الإقامة إلى برامج جامعية للراغبين
      في التعمق الأكاديمي.
    items:
    - name: دورات العربية المكثفة للحجاج
      description: >
        دورات لغة عربية قصيرة مكثفة (3–10 أيام) تركز على الحوار العملي وإتقان المفردات الدينية
        اليومية وفهم الأدعية والسؤال والجواب في سياق الحج والعمرة.
      skill_levels:
      - مبتدئ تام (لا خلفية عربية)
      - مبتدئ
      - متوسط
      businesses:
      - name: معهد اللغة العربية — جامعة أم القرى
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: دورات عربية معتمدة؛ إصدار شهادات؛ برامج خاصة للحجاج غير الناطقين بالعربية
      - name: المعهد الإسلامي الدولي للغة العربية
        area: حي العزيزية، مكة المكرمة
        notes: دورات مكثفة تبدأ من الصفر؛ مدة أسبوعان إلى ثلاثة أشهر؛ مواعيد تتناسب مع أوقات الحج
      - name: برامج تعلم العربية عبر الإنترنت (تحضير قبل السفر)
        url: https://www.madinaharabic.com
        notes: >
          كثير من الحجاج يبدؤون الدراسة قبل وصولهم عبر مدونة العربية من المدينة (مجاناً)
          أو ألفية ابن مالك أو التطبيقات المتخصصة
      duration: 3–14 يوماً للدورات المكثفة
      notes: حتى المبتدئ التام يستطيع تعلم عشرات العبارات الدينية الأساسية في يومين

    - name: ورش التجويد القرآني مع شيوخ معتمدين
      description: >
        دروس تجويد تفصيلية تُعلّم قواعد النطق الصحيح للقرآن — مخارج الحروف والصفات والمدود
        والإدغام والإظهار. في مكة يتوفر شيوخ من أعلى مستويات الإجازة القرآنية في العالم.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم (إجازة)
      businesses:
      - name: دار الحديث الخيرية
        area: بالقرب من المسجد الحرام، مكة المكرمة
        notes: شيوخ حاملون لأسانيد إلى النبي صلى الله عليه وسلم؛ دروس فردية وجماعية؛ رسوم رمزية
      - name: قسم التجويد — المسجد الحرام (الحلقات الداخلية)
        area: منطقة الحرم، مكة المكرمة
        notes: حلقات تجويد يومية بعد الفجر والعصر؛ مستويات متعددة؛ مجانية تماماً
      - name: معهد الإمام نافع للتجويد
        area: حي النسيم، مكة المكرمة
        notes: متخصص في رواية حفص وورش وقالون؛ شهادات تجويد معتمدة لمن يرغب
      duration: جلسة يومية 45–90 دقيقة (الدورات من أسبوع إلى شهر)
      notes: >
        الشيخ في مكة يعطيك "إجازة بالسند" إن بلغت المستوى المطلوب — وثيقة علمية تربطك بسلسلة
        متصلة بالنبي صلى الله عليه وسلم؛ من أثمن ما يُحصَّل في رحلة الحج

    - name: برامج حفظ القرآن الكريم (مكثفة)
      description: >
        برامج منهجية لحفظ القرآن الكريم أو أجزاء منه مع مراجعة منتظمة وتثبيت — من صفحتين
        يومياً للزائر العادي إلى برامج حفظ كامل للمقيمين. مكة المكرمة أفضل بيئة للحفظ في العالم.
      skill_levels:
      - حفظ جزء عم والمعوذات (مبتدئ)
      - حفظ جزء تبارك وياسين (متوسط)
      - حفظ القرآن كاملاً (متقدم — برامج طويلة الأمد)
      businesses:
      - name: دار القرآن الكريم لتحفيظ الكتاب العزيز
        area: حي العدل، مكة المكرمة
        notes: منهج موسكا للحفظ؛ شيوخ يتابعون التقدم يومياً؛ شهادات تحفيظ رسمية
      - name: مدرسة النور لتحفيظ القرآن الكريم
        area: حي العزيزية، مكة المكرمة
        notes: برامج صيفية مكثفة للزائرين؛ مجموعات حسب العمر ومستوى الحفظ
      - name: حلقات التحفيظ بالمسجد الحرام (بعد الفجر)
        area: المسجد الحرام، مكة المكرمة
        notes: مجانية؛ جلسة يومية صباحية؛ الانضمام يتم بمجرد الجلوس مع الحلقة
      notes: >
        الحفظ في مكة له نكهة لا تُوصف؛ كثير من الحجاج يحفظون سورة البقرة كاملاً في رحلة
        عمرة مدتها 30 يوماً — والزيادة في الأجر مكفولة بالحديث الشريف

    - name: دراسة السيرة النبوية في مواقعها الحية
      description: >
        قراءة ودراسة السيرة النبوية أثناء زيارة المواقع المذكورة فيها — من غار حراء حيث نزل الوحي
        إلى ميدان بدر حيث كان أول نصر. الكتاب والموقع الجغرافي معاً يخلقان فهماً لا تتيحه الدراسة
        المجردة.
      resources:
        books:
        - السيرة النبوية لابن هشام (ترجمات إنجليزية وأردية وفرنسية متوفرة)
        - الرحيق المختوم (البوطي / العمري) — أوسع انتشاراً للزوار الدوليين
        - ar-Raheeq al-Makhtum (الإنجليزية) — متوفر في مكتبة دار السلام
        apps:
        - تطبيق السيرة النبوية (iOS / Android) — خرائط تفاعلية تربط الأحداث بالمواقع
