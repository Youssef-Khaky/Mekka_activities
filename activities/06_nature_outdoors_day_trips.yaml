# الطبيعة والأنشطة الخارجية والرحلات اليومية من مكة المكرمة

activities:
  nature_and_outdoors:
    description: >
      المناظر الطبيعية المحيطة بمكة المكرمة — من السهول الصحراوية إلى جبال الطائف الباردة وشاطئ
      البحر الأحمر. يُنصح بالزيارة خارج موسم الحج (ذو الحجة) لضمان السلامة وسهولة الوصول.
    items:
    - name: التنزه في جبال الطائف
      description: >
        توفر جبال الهدا والشفا حول الطائف (75 كم من مكة، ارتفاع 1800 م) درجات حرارة أكثر برودة
        ومسارات مشجرة وشلالات ومناظر خلابة للأودية. تناقض تام مع حرارة سهل مكة الصحراوي.
      location:
        name: جبال الهدا والشفا
        area: محافظة الطائف، منطقة مكة المكرمة
        coordinates: 21.3528° N, 40.4062° E
        distance_from_mekka: 75 كم (نحو ساعة بالسيارة)
      businesses:
      - name: مسارات منتجع الهدا الجبلي (وصول عام)
        area: الهدا، الطائف
        notes: مسارات مُعلَّمة عبر غابات الصنوبر والعرعر؛ مجانية
      - name: متنزه الطائف المغامر
        area: الشفا، الطائف
        notes: تحلق بالزيبلاين وجسور الحبال والمشي الإرشادي؛ مناسب للعائلات؛ إطلالات خلابة
      - name: نادي المشي السعودي (فرع الطائف)
        area: الطائف
        notes: رحلات مشي جماعية منظمة؛ ترحيب بالزوار؛ التواصل عبر وسائل التواصل الاجتماعي
      difficulty: سهل إلى متوسط
      best_season: على مدار العام (الصيف ممتع بشكل خاص — الطائف مصيف المملكة المعروف)
      duration: ساعتان إلى ست ساعات حسب المسار
      notes: أحضر ماءً وواقٍ شمس وملابس متعددة الطبقات؛ تلفريك الهدا يتيح مناظر جوية للمستريحين

    - name: وادي الورد بالطائف
      description: >
        الطائف مشهورة عالمياً بأزهارها الدمشقية — مصدر بعض من أفخر زيت الورد في العالم (عطر الورد).
        موسم الورد (مارس–أبريل) يملأ الأودية بالألوان والعطر. زيارة مزارع الورد ومعامل التقطير.
      location:
        name: مزارع ورود الهدا والحوية
        area: الطائف، منطقة مكة المكرمة
        distance_from_mekka: 75 كم
      businesses:
      - name: مزرعة الخريبة للورود
        area: حي الحوية، الطائف
        notes: من أقدم مزارع الورود في الطائف؛ جولات إرشادية لقطف الورود والتقطير التقليدي
      - name: مهرجان ورود الطائف (موسمي)
        area: مدينة الطائف والمزارع المحيطة
        notes: مهرجان سنوي في موسم التفتح (أواخر مارس وأوائل أبريل)؛ عروض تقطير مباشرة وسوق منتجات
      - name: منتزه الردف
        area: وسط مدينة الطائف
        address: طريق الردف، الطائف
        notes: منتزه عام كبير مع حدائق الورود؛ مناطق نزهة؛ مناسب للعائلات؛ دخول مجاني
      best_season: مارس–أبريل (موسم تفتح الورود)
      duration: نصف يوم إلى يوم كامل
      notes: ماء الورد وزيت الورد ومربى الورد تُباع مباشرة من المزارع بأسعار أرخص وجودة أعلى

    - name: مراقبة النجوم في الصحراء
      description: >
        سماء الصحراء حول مكة من أقل السماوات تلوثاً ضوئياً في المنطقة. في الليالي الصافية يُرى
        درب التبانة بالعين المجردة. تجربة تُعمق التأمل الإسلامي في الكون.
      location:
        name: أطراف الصحراء شرق مكة المكرمة
        area: مناطق البادية ووادي نعمان
        distance_from_mekka: 20–40 كم
      businesses:
      - name: شركة سفاري مكة الصحراوية (باقة رصد النجوم)
        area: الصحراء الشرقية، أطراف مكة
        notes: باقات مسائية تشمل جلسات التلسكوب والعشاء البدوي وتحديد النجوم (أسماؤها العربية ثرية تاريخياً)
      - name: الجمعية الفلكية السعودية (فرع جدة)
        area: جدة (80 كم)
        notes: تنظم ليالي رصد نجوم عامة؛ ترحيب بالزوار؛ تلسكوبات مرفقة
      best_time: مرحلة الهلال الجديد؛ أشهر الشتاء (أكتوبر–مارس) لأصفى سماء
      duration: ثلاث إلى خمس ساعات (من المساء حتى الليل)
      notes: أحضر ملابس دافئة لبرودة الليل الصحراوي؛ التراث الفلكي الإسلامي ثري — معظم نجوم السماء تحمل أسماءً عربية

    - name: تنزه وادي نعمان
      description: >
        وادي نعمان نظام وادٍ خلاب شمال شرق مكة بأخاديد صخرية وشلالات موسمية بعد هطول الأمطار
        وشرفات زراعية قديمة. شهير بالنزهات اليومية بين سكان مكة.
      location:
        name: وادي نعمان
        area: شمال شرق مكة، نحو 25 كم من مركز المدينة
        coordinates: 21.5200° N, 39.9500° E
      difficulty: سهل إلى متوسط
      duration: ساعتان إلى أربع ساعات
      notes: الأفضل بعد أمطار الشتاء (ديسمبر–فبراير)؛ لا مرافق رسمية — احمل طعامك وماءك؛ يُنصح بالتجمع

    - name: تلفريك الهدا
      description: >
        رحلة تلفريك خلابة فوق وادي الهدا الجبلي قرب الطائف — توفر مناظر جوية مذهلة على مرتفعات
        الحجاز والأودية والغطاء الحرجي.
      location:
        name: محطة تلفريك الهدا
        area: الهدا، الطائف
        address: طريق الهدا، الطائف
        coordinates: 21.3774° N, 40.3607° E
      duration: 20–30 دقيقة (ذهاباً وإياباً)
      operating_hours: 09:00–22:00 يومياً
      notes: مناسب لجميع مستويات اللياقة؛ غروب رائع؛ يُقرن بغداء في أحد مطاعم القمة المطلة على الوادي

    - name: الغطس والغوص في البحر الأحمر (جدة)
      description: >
        يُعدّ البحر الأحمر قبالة جدة من أكثر الشعب المرجانية تنوعاً بيولوجياً في العالم — مرجان صلب
        وطري وأسماك شعاب وأشعة وسلاحف وقراش الحوت أحياناً. متاح للمبتدئين التامين حتى الغواصين المتقدمين.
      location:
        name: كورنيش جدة والشعاب البحرية الخارجية
        area: جدة، ساحل البحر الأحمر (80 كم من مكة)
        coordinates: 21.5433° N, 39.1728° E
      businesses:
      - name: دايف جدة
        area: الكورنيش، جدة
        notes: دورات PADI للغوص المفتوح؛ غطس استكشافي للمبتدئين بلا شهادة؛ غطسات إرشادية بشعاب شرم عبهر
      - name: مركز البحر الأحمر للغوص
        area: خور عبهر، شمال جدة
        address: عبهر الشمالية، جدة
        notes: رحلات غطس يومية لشعاب ضحلة؛ إيجار معدات تصوير تحت الماء متاح
      - name: نادي النوارس للغوص
        area: الحمراء، كورنيش جدة
        notes: نادي غوص مجتمعي؛ اشتراكات يومية للغواصين المعتمدين؛ غطسات ليلية إرشادية
      best_season: أكتوبر–أبريل (ماء أكثر برودة وأفضل وضوحاً)
      duration: نصف يوم إلى يوم كامل
      notes: درجة حرارة الماء 22–30°C على مدار العام؛ بدلات سباحة محتشمة متاحة من مراكز الغوص

  day_trips:
    description: >
      وجهات رحلات يومية شهيرة يمكن الوصول إليها من مكة في غضون ساعة إلى ساعتين، توفر تغييراً
      في المشهد وتجارب روحية وثقافية إضافية.
    items:
    - name: المدينة المنورة
      description: >
        مدينة النبي صلى الله عليه وسلم — موطن المسجد النبوي الشريف ومسجد قباء (أول مسجد في الإسلام)
        ومسجد القبلتين ومقبرة البقيع. إضافة حجية عميقة الأثر لأي زيارة لمكة.
      location:
        area: المدينة المنورة، نحو 450 كم شمال مكة
        distance_from_mekka: 450 كم (4–4.5 ساعات براً؛ ساعتان بقطار الحرمين)
      key_sites:
      - المسجد النبوي الشريف — ضريح النبي محمد صلى الله عليه وسلم
      - مسجد قباء — أول مسجد بُني في الإسلام؛ ركعتان تعدلان عمرة (حديث شريف)
      - مسجد القبلتين — حيث تحولت القبلة إلى مكة المكرمة
      - مقبرة البقيع — مقبرة المدينة الرئيسية تضم قبور صحابة النبي
      - جبل أحد — موقع غزوة أحد وقبور الشهداء
      - سوق تمور المدينة المنورة — أكبر سوق تمور في العالم
      transport:
      - قطار الحرمين السريع (HHR) — الأسرع؛ ساعتان؛ احجز إلكترونياً
        url: https://sar.hhr.sa
      - حافلات سابتكو بين المدن — اقتصادية؛ تنطلق من محطة مكة المركزية
        url: https://saptco.com.sa/en
      - استئجار سيارة خاصة أو تاكسي — مرن؛ احسب وقتاً إضافياً للنقاط الأمنية
      notes: غير المسلمين لا يُسمح لهم بدخول المنطقة المركزية المقدسة بالمدينة

    - name: جدة (البلد التاريخي)
      description: >
        المدينة الساحلية العالمية على البحر الأحمر — موطن موقع البلد التراثي المدرج في قائمة يونسكو
        وكورنيش جدة ونافورة الملك فهد (الأعلى في العالم) وبوابة مغامرات البحر الأحمر.
      location:
        area: جدة، نحو 80 كم غرب مكة (نحو ساعة بالسيارة)
      key_sites:
      - حي البلد التاريخي — موقع يونسكو؛ منازل مرجانية بشناشيل خشبية
      - نافورة الملك فهد — أعلى نافورة في العالم (312 م)؛ أجمل ليلاً
      - كورنيش جدة — ممشى مائي بطول 30 كم
      - المسجد الرحمة العائم — مسجد أيقوني يُبنى على البحر الأحمر
      - مواقع الغطس والغوص في البحر الأحمر
      transport:
      - تاكسي أو أوبر/كريم — نحو 100–150 ريال اتجاهاً واحداً
      - حافلات سابتكو — خيار اقتصادي من محطة مكة المركزية
        url: https://saptco.com.sa/en
      notes: البلد أجمل ما يُستكشف سيراً في ساعات الصباح أو المساء الأكثر برودة

    - name: الطائف (مدينة الورود)
      description: >
        مدينة جبلية خلابة على ارتفاع 1800 م — مصيف المملكة العربية السعودية، مشهورة بالورود الدمشقية
        ومناخها الأكثر برودة وحدائقها الغناء ومنحدراتها الجبلية.
      location:
        area: الطائف، نحو 75 كم جنوب شرق مكة
        distance_from_mekka: 75 كم (نحو ساعة إلى ساعة ونصف بالسيارة عبر طريق الهدا الجبلي)
      key_sites:
      - مناطق منتجع الهدا والشفا الجبليتين
      - مزارع ورود الطائف (ذروة التفتح مارس–أبريل)
      - منتزه الردف وحديقة حيوان الطائف
      - تلفريك الهدا — مناظر جوية للوادي
      - سوق الطائف والعسل والتمور المحلية
      transport:
      - تاكسي أو أوبر/كريم — طريق جبلي خلاب
      - حافلة سابتكو — رحلات منتظمة من مكة
        url: https://saptco.com.sa/en
      best_season: على مدار العام؛ الصيف منعش بالارتفاع؛ موسم الورود مارس–أبريل
      notes: الطريق الصاعد على الهدا يتيح مناظر ملتوية مبهرة؛ الطائف أبرد بكثير من مكة — احمل جاكيتاً خفيفاً

    - name: بدر (الغزوة الكبرى الأولى في الإسلام)
      description: >
        سهول بدر حيث حقق النبي صلى الله عليه وسلم و313 من صحابته نصراً حاسماً عام 624م.
        وجهة تاريخية وروحية بالغة التأثير.
      location:
        area: بدر، نحو 340 كم شمال غرب مكة
        distance_from_mekka: 340 كم (نحو 3.5 ساعات بالسيارة)
        coordinates: 23.7794° N, 38.7867° E
      key_sites:
      - مقبرة شهداء بدر
      - جبل الملائكة
      - بئر بدر
      - متحف بدر
      notes: يُفضل تنسيقه مع رحلة إلى المدينة المنورة؛ الملبس المحتشم إلزامي

    - name: جولة مواقيت الإحرام
      description: >
        رحلة إرشادية تزور نقاط الحدود (المواقيت) التي تحدد الحدود المقدسة للحرم — ذات أهمية تاريخية
        بالغة لفقه الحج وجغرافية الإسلام.
      highlights:
      - مسجد السيدة عائشة (التنعيم) — 7.5 كم شمالاً؛ أقرب ميقات لمن في مكة
      - مسجد الجعرانة — حيث وزع النبي صلى الله عليه وسلم غنائم حنين وأحرم
      - قرن المنازل (السيل الكبير) — 75 كم شرقاً؛ ميقات أهل نجد والخليج
      - الجحفة (قرب رابغ) — 180 كم شمال غرباً؛ ميقات أهل الشام ومصر
      duration: نصف يوم (التنعيم والجعرانة) إلى يوم كامل (المواقيت الخارجية)
      notes: يُعمق فهم الجغرافية الإسلامية وفقه الحج؛ كثير من الحجاج يؤدون عمرة من الجعرانة

    - name: وادي النخلة (وادي الأخشب)
      description: >
        وادٍ خصب خارج مكة مباشرة ذو أهمية تاريخية لأنه المكان الذي التقى فيه النبي صلى الله عليه
        وسلم بالجن الذين آمنوا (مذكور في سورة الجن 72). رحلة طبيعية ذات معنى روحي عميق.
      location:
        name: وادي نخلة
        area: شمال شرق مكة، نحو 20 كم من المركز
      duration: ساعتان إلى ثلاث ساعات
      notes: يُصل إليه بالتاكسي أو السيارة الخاصة؛ بيئة طبيعية هادئة؛ أفضل في الأشهر الباردة

    - name: رحلة وادي بهرة ووادي نعمان
      description: >
        أودية صحراوية خلابة شمال شرق مكة توفر تشكيلات جيولوجية وبرك طبيعية موسمية وشرفات زراعية
        قديمة ومواقع تراث بدوي.
      location:
        area: شمال شرق مكة، 20–40 كم من المركز
      businesses:
      - name: شركة سفاري مكة الصحراوية (رحلات الأودية)
        area: الأطراف الشرقية الصحراوية لمكة
        notes: نزهات وادي نصف يوم مع غداء بدوي؛ نقل بالسيارة مشمول
      difficulty: سهل إلى متوسط
      duration: نصف يوم (3–5 ساعات)
      notes: الأفضل بعد أمطار الشتاء (ديسمبر–فبراير)؛ أحضر كمية وافرة من الماء وواقٍ شمس

    - name: سوق عكاظ (مهرجان تراثي موسمي)
      description: >
        إحياء سوق ما قبل الإسلام والفجر الإسلامي قرب الطائف حيث كان الشعراء والتجار وزعماء القبائل
        العرب يجتمعون. الآن مهرجان ثقافي كبير تنظمه وزارة الثقافة يتضمن مسابقات شعرية حية
        وعروضاً مسرحية وحرفاً تقليدية وعروضاً للخيل العربية.
      location:
        name: ساحات مهرجان سوق عكاظ
        area: نحو 30 كم شمال شرق الطائف (110 كم من مكة)
      season: سنوياً (في الغالب يوليو–أغسطس؛ راجع هيئة السياحة للتواريخ الدقيقة)
        url: https://www.visitsaudi.com/en
      duration: يوم كامل
      notes: نافذة فريدة على الحضارة العربية الكلاسيكية؛ من أكثر الفعاليات الإقليمية جمالاً وأصالة

    - name: موقع الأخدود التاريخي (نجران)
      description: >
        رحلة أطول إلى الأخدود (نجران) — مدينة قديمة مرشحة لليونسكو مذكورة في القرآن الكريم
        (سورة البروج 85). تضم نقوشاً صخرية ما قبل إسلامية وأطلال حميرية وموقع أصحاب الأخدود.
      location:
        name: الموقع الأثري بالأخدود
        area: نجران، جنوب المملكة العربية السعودية
        distance_from_mekka: 700 كم (نحو 7 ساعات براً أو ساعة ونصف بالطيران)
      duration: رحلة يومين على الأقل
      notes: لهواة التاريخ؛ السعودية وفلاي ناس تشغلان رحلات جدة–نجران؛ يُقرن بمتحف نجران
