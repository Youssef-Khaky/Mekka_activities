# الطعام والتسوق والتجارب الطهوية

activities:
  food_and_hospitality:
    description: التجارب الطهوية والضيافة المحلية الأصيلة
    items:
    - name: البيك
      description: سلسلة وجبات سريعة سعودية شهيرة بدجاجها المقرمش وروبيانها المميز
      location:
        area: فروع متعددة في أنحاء مكة المكرمة
        branches:
        - address: شارع أجياد، بالقرب من المسجد الحرام
        - address: شارع إبراهيم الخليل، الحرم
        - address: فود كورت مجمع أبراج البيت
      url: https://www.albaik.com
      notes: لا بد من التجربة؛ توقع طوابير انتظار؛ مفتوح 24 ساعة في موسم الحج ورمضان

    - name: مطاعم الرومانسية
      description: سلسلة مطاعم سعودية شهيرة تقدم الكبسة التقليدية والمشويات
      location:
        area: فروع متعددة في مكة المكرمة
        branches:
        - address: حي العزيزية، مكة المكرمة
        - address: حي النسيم، مكة المكرمة
      url: https://alromansiah.com
      notes: جلوس عائلي؛ حلال معتمد؛ مثالي للمجموعات

    - name: مطعم الكبسة الأصلي
      description: مطعم تقليدي يقدم الكبسة الأصيلة (أرز متبل مع اللحم)
      location:
        name: مطعم الكبسة الأصلي
        area: حي العزيزية، مكة المكرمة
      notes: بأسعار معقولة وشعبي بين السكان المحليين؛ جلوس على طاولات مشتركة

    - name: مطعم سافرون (فيرمونت مكة)
      description: مطعم بوفيه فاخر في برج الساعة الفيرمونت مع إطلالة على الكعبة المشرفة
      location:
        name: فيرمونت مكة كلوك رويال تاور — مطعم سافرون
        address: مجمع أبراج البيت، شارع إبراهيم الخليل، مكة المكرمة
        floor: الدور الثالث
      notes: إطلالة خلابة على الحرم؛ مطبخ دولي وعربي؛ يُنصح بالحجز المسبق

    - name: مطعم النافورة (لو ميريديان تاورز)
      description: مطعم طوال اليوم يقدم بوفيه عربياً ودولياً
      location:
        name: لو ميريديان تاورز مكة — مطعم النافورة
        address: شارع أجياد، منطقة الحرم، مكة المكرمة
      notes: مريح للحجاج المقيمين في منطقة أجياد؛ شهير لبوفيه السحور في رمضان

    - name: هرفي
      description: سلسلة وجبات سريعة سعودية تقدم البرغر والدجاج والأطباق العربية
      location:
        area: فروع متعددة في مكة المكرمة
        branches:
        - address: مجمع أبراج البيت
        - address: حي العزيزية
      url: https://herfy.com
      notes: اقتصادي؛ مناسب للوجبات السريعة بين جلسات العبادة

    - name: تندوري إكسبريس
      description: مطعم شبه القارة الهندية الاقتصادي الشهير بين الحجاج
      location:
        name: تندوري إكسبريس
        area: شارع أجياد، بالقرب من المسجد الحرام، مكة المكرمة
      notes: شهير بين حجاج جنوب آسيا؛ يقدم البريياني والنان والكاري

    - name: ناندوز مكة
      description: مطعم دجاج مشوي بصلصة البيري بيري
      location:
        name: ناندوز
        address: مجمع أبراج البيت، الدور الثاني، شارع إبراهيم الخليل، مكة المكرمة
      url: https://www.nandos.com/world/
      notes: خيار دولي مألوف؛ حلال معتمد

    - name: محلات التمور وكافيهات القهوة العربية
      description: شراء وتذوق أجود أنواع التمور السعودية مع القهوة العربية
      location:
        businesses:
        - name: باتيل للتمور
          address: مجمع أبراج البيت، مكة المكرمة
          url: https://bateel.com/en_sa
          notes: تمور سعودية فاخرة وهدايا راقية
        - name: سوق التمور بالمدينة المنورة (بسطات)
          area: منطقة السوق قرب المسجد الحرام
          notes: تمور طازجة وجافة بالجملة؛ العجوة والمجدول والسكري

  shopping:
    description: أبرز الأماكن لشراء التذكارات والملابس والبضائع الإسلامية
    items:
    - name: مجمع أبراج البيت (مول برج الساعة)
      description: أكبر مجمع تجاري في مكة المكرمة، ملاصق للمسجد الحرام مباشرة
      location:
        name: مجمع أبراج البيت
        address: شارع إبراهيم الخليل، منطقة الحرم، مكة المكرمة 24231
        coordinates: 21.4196° N, 39.8262° E
      url: https://theclocktowers.com
      hours: 10:00–00:00 يومياً (مواعيد ممتدة في رمضان)
      notes: يضم هايبر باندا وباتيل وعلامات تجارية دولية وفود كورت

    - name: أجياد مول
      description: مجمع تجاري متوسط الفئة شهير بين الحجاج لمستلزمات الإحرام والملابس
      location:
        name: أجياد مول
        address: شارع أجياد، منطقة الحرم، مكة المكرمة
        coordinates: 21.4179° N, 39.8241° E
      notes: تشكيلة جيدة من ملابس الإحرام والمستلزمات الدينية والتذكارات بأسعار تنافسية

    - name: مول الحجاز
      description: مجمع تجاري يضم مزيجاً من العلامات المحلية والدولية
      location:
        name: مول الحجاز
        address: طريق الملك عبدالعزيز، العزيزية، مكة المكرمة
      url: https://www.hijazmalls.com
      notes: أقل ازدحاماً من أبراج البيت؛ جيد للملابس والإلكترونيات

    - name: سوق الزل
      description: سوق مفتوحة تقليدية للأثريات والحرف المحلية والمقتنيات القديمة
      location:
        name: سوق الزل
        area: مكة القديمة، بالقرب من حي المعلا
        address: طريق الزاهر، المعلا، مكة المكرمة
      notes: التفاوض متوقع؛ يُفضل زيارته في المساء؛ أجواء محلية أصيلة

    - name: عطور عبدالصمد القرشي
      description: عطارة سعودية مشهورة تبيع العود الفاخر والمسك وتركيبات العطر
      location:
        name: عبدالصمد القرشي
        branches:
        - address: مجمع أبراج البيت، مكة المكرمة
        - address: شارع أجياد، بالقرب من المسجد الحرام
      url: https://sa.abdulsamadalqurashi.com
      notes: من أرقى دور العطور في العالم العربي؛ خالٍ من الكحول

    - name: الحرمين للعطور
      description: محل عطور ميسور التكلفة شهير بالبخور وعطور الزيت
      location:
        name: الحرمين للعطور
        area: محلات متعددة في منطقة سوق المسجد الحرام
        address: منطقة الحرم، مكة المكرمة
      url: https://shop.alharamainperfumes.com
      notes: ممتاز للهدايا؛ أسعار معقولة؛ تشكيلة واسعة

    - name: مكتبة دار السلام (مكتبة إسلامية)
      description: مكتبة إسلامية كبيرة تبيع المصاحف وكتب الحديث والأدب الإسلامي
      location:
        name: مكتبة دار السلام
        area: بالقرب من المسجد الحرام، منطقة الحرم، مكة المكرمة
      url: https://darussalamstore.com
      notes: كتب بالعربية والإنجليزية والأردية والفرنسية وغيرها؛ أسعار تنافسية

    - name: بن داود سوبرماركت
      description: سلسلة سوبرماركت سعودية كبيرة للمواد الغذائية واللوازم اليومية
      location:
        name: بن داود
        branches:
        - address: حي العزيزية، مكة المكرمة
        - address: بالقرب من أبراج البيت، مكة المكرمة
      url: https://bindawood.sa
      notes: يبيع زجاجات ماء زمزم والوجبات الخفيفة الحلال ومستلزمات الحجاج

  culinary_arts:
    description: >
      تجارب طهوية عملية تُبرز التراث الغذائي السعودي والحجازي — من خبز التنور التقليدي إلى إتقان
      طقوس القهوة العربية وفنون المطبخ الملكي.
    items:
    - name: دروس الطبخ السعودي (المطبخ الحجازي)
      description: >
        تعلم طهي أطباق حجازية أصيلة — مطبخ مكة المكرمة وجدة المتشكّل عبر قرون من حجاج شتى أصقاع
        العالم الإسلامي. الأطباق تشمل الكبسة والسليق والجريش والمطبق والهريس.
      signature_dishes_taught:
      - الكبسة (أرز متبل مع اللحم — الطبق الوطني)
      - السليق (أرز أبيض مطبوخ ببطء في المرق والحليب؛ تخصص حجازي)
      - الجريش (عصيدة قمح مع اللحم والبصل المكرمل)
      - الهريس (قمح وخروف مطبوخان ببطء؛ من أطباق رمضان)
      - المطبق (معجنات محشوة باللحم المتبل والبيض)
      - المعمول (بسكويت سميد محشو بالتمر أو المكسرات)
      businesses:
      - name: مركز مكة للتجارب الطهوية
        area: حي العزيزية، مكة المكرمة
        notes: دروس جماعية وخاصة يقدمها طهاة محليون حجازيون؛ جميع المكونات مرفقة؛ تُؤكل الوجبة المطبوخة في الختام
      - name: أكاديمية الطبخ بجدة
        area: حي الروضة، جدة
        notes: مطبخ احترافي؛ منهج سعودي وخليجي واسع؛ وحدة المطبخ الحجازي مطلوبة جداً من الزوار الدوليين
      - name: ورش الطبخ بفندق سوفيتيل جدة
        area: طريق الكورنيش، جدة
        notes: تجارب طهوية تنظمها الفندق؛ أساليب سعودية ودولية
      duration: ثلاث إلى أربع ساعات للحصة (شاملة أكل الوجبة المطبوخة)
      notes: مكونات حلال فقط؛ خالٍ من الكحول؛ التفضيلات الغذائية تُراعى عند الطلب

    - name: طقوس القهوة العربية (القهوة العربية)
      description: >
        إعداد القهوة العربية السعودية التقليدية (القهوة) وتقديمها فن رفيع وركيزة من ركائز الضيافة
        العربية. تعلم تحميص الحبوب الخضراء والطحن بالمهباج وتحضير القهوة بالهيل والقرنفل والزعفران.
      businesses:
      - name: ورش القهوة — هيئة التراث السعودي
        area: مركز التراث بمكة
        notes: عروض تراثية أصيلة لتحضير القهوة؛ المشاركون يحمّصون حبوبهم بأنفسهم
      - name: النخيل للقهوة المتخصصة (جلسات ورش)
        area: حي العزيزية، مكة المكرمة
        notes: محمصة قهوة متخصصة تقدم جلسات تراث القهوة العربية جنباً إلى جنب التحضيرات الحديثة
      - name: تجارب مخيم الطائف البدوي
        area: الهدا، الطائف
        notes: يعلّم المضيفون البدو طقوس القهوة في خيمة تقليدية مع التمر والفواكه المجففة
      duration: ساعة إلى ساعتين
      notes: القهوة تُقدم بدون سكر (الحلاوة تأتي من التمر الموضوع بجانبها)؛ الدلة والفنجان هدايا تذكارية رائعة

    - name: خبز التنور التقليدي والمرقوق
      description: >
        تعلم خبز الخبز العربي التقليدي في فرن طيني (التنور) وتحضير المرقوق — يخني لحم وخضروات
        مطهو ببطء مع طبقات من الخبز الرقيق. تقليد طهوي عميق الجذور في الروح الجماعية.
      businesses:
      - name: جلسات مكة للطبخ التراثي
        area: المنازل التقليدية والمراكز الثقافية في حي العدل، مكة المكرمة
        notes: تستضيفها عائلات محلية عبر برامج التراث الثقافي؛ خبز يدوي وإدارة التنور وتحضير اليخني
      - name: مخيم الصحراء البدوي للطهي (أطراف مكة)
        area: أطراف مكة الشرقية الصحراوية
        notes: برامج مسائية تشمل خبز الخبز على النار المكشوفة وتحضير العشاء البدوي
      duration: ساعتان إلى ثلاث ساعات
      notes: فرن التنور يصل لحرارة عالية جداً؛ قفازات فرن طويلة مرفقة؛ الوجبة المنتهية تُؤكل معاً

    - name: ورشة تذوق وتصنيف التمور
      description: >
        تُنتج المملكة العربية السعودية أكثر من 100 صنف من التمور. تعلم التمييز بين العجوة والمجدول
        والسكري والخلاص والصفاوي والبرحي من حيث القوام ونسبة السكر والقشرة والمنشأ.
      businesses:
      - name: جلسات أكاديمية باتيل للتمور
        area: مجمع أبراج البيت، مكة المكرمة
        url: https://bateel.com/en_sa
        notes: تجارب تذوق إرشادية؛ أصناف تمور فاخرة من مزارع سعودية؛ تناسب مع القهوة العربية
      - name: سوق التمور بالمدينة المنورة (جلسات التذوق)
        area: منطقة السوق قرب المسجد الحرام، مكة المكرمة
        notes: تذوق غير رسمي لكنه سخي من تجار السوق؛ يُشجع على الشراء بالجملة
      - name: مهرجان تمور وعسل الطائف (موسمي)
        area: الطائف
        notes: فعالية سنوية تحتفي بالتمور المحلية وعسل السدر؛ ورش تذوق بإشراف خبراء
      duration: ساعة إلى ساعتين
      notes: التمر غذاء سني — كان النبي صلى الله عليه وسلم يفطر عليه؛ لتمر العجوة من المدينة أهمية دينية خاصة
