# الفعاليات الموسمية والأنشطة العائلية والخدمات الصحية

activities:
  ramadan_activities:
    description: >
      أنشطة وتجارب خاصة بالشهر الفضيل رمضان، حين تبلغ مكة المكرمة ذروتها الروحية والحيوية.
    items:
    - name: الإفطار في المسجد الحرام
      description: >
        الإفطار عند أذان المغرب داخل المسجد الحرام — من أعمق التجارب الروحية في الإسلام.
        التمر والماء يوزعان مجاناً من قِبل الحكومة السعودية في أنحاء المسجد.
      location:
        name: المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      timing: يومياً عند صلاة المغرب طوال رمضان
      notes: >
        صل قبل 30–45 دقيقة من المغرب لتأمين مكانك؛ الروح الجماعية استثنائية؛ التمر والماء
        وأحياناً وجبات كاملة تُوزع مجاناً

    - name: صلاة التراويح (قيام الليل الرمضاني)
      description: >
        صلوات ليلية مطولة تُقام بعد العشاء في رمضان — يؤمها قراء مشهورون في المسجد الحرام.
        من أكثر التجارب الدينية تأثيراً في العالم الإسلامي.
      location:
        name: المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      duration: ساعة ونصف إلى ساعتين ونصف كل ليلة
      notes: >
        يختم الإمام القرآن الكريم كاملاً خلال 30 ليلة؛ تبكّر لتأمين المكان؛ السطح والأفنية تمتلئ
        سريعاً؛ أحضر سجادة صغيرة أو منشفة

    - name: ليلة القدر (أشرف ليالي العام)
      description: >
        أقدس ليلة في العام — يُرجَّح أنها في العشر الأواخر من رمضان (الأرجح الليلة السابعة والعشرون).
        العبادة فيها خير من ألف شهر (القرآن 97:3). يقضي المسلمون الليل في الصلاة وتلاوة القرآن
        والتضرع بالدعاء في المسجد الحرام.
      location:
        name: المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      timing: العشر الأواخر من رمضان؛ بكثافة في الليلة السابعة والعشرين
      notes: >
        يصل المسجد لأعلى طاقته الاستيعابية في هذه الليلة؛ تبكّر بساعات أو خطط للعبادة
        في الأفنية والسطح؛ الاعتكاف موصى به بشدة

    - name: السحور قرب المسجد الحرام
      description: >
        وجبة السحور قبيل الفجر — في المطاعم ومحلات الطعام التي تبقى مفتوحة الليل كله حول
        الحرم خلال رمضان.
      location:
        area: شارع أجياد وشارع إبراهيم الخليل ومطاعم الفنادق في منطقة الحرم
      businesses:
      - name: البيك (مواعيد رمضان المفتوحة)
        area: شارع أجياد وأبراج البيت
        url: https://www.albaik.com
      - name: مطعم النافورة — لو ميريديان تاورز
        area: شارع أجياد
        notes: بوفيه سحور مع إطلالة على الحرم
      - name: مطعم سافرون — فيرمونت برج الساعة
        area: أبراج البيت
        notes: سحور راقٍ مع إطلالة على الكعبة؛ الحجز ضروري
      notes: >
        الشوارع حول الحرم حيّة بشكل فريد بين منتصف الليل والفجر في رمضان — باعة متجولون
        وتوزيع خيري للطعام وأجواء روحانية احتفالية

    - name: الاعتكاف (الخلوة الرمضانية)
      description: >
        تكريس العشر الأواخر والليالي من رمضان للخلوة داخل المسجد الحرام — النوم والأكل والعبادة
        داخل المسجد. سنة نبوية مأثورة؛ تحوّل أصحابها إلى تجربة روحية مدى الحياة.
      location:
        name: المسجد الحرام — مناطق الاعتكاف المخصصة
        area: منطقة الحرم، مكة المكرمة
      timing: العشر الأواخر من رمضان
      notes: >
        التسجيل مطلوب عبر وزارة الحج والعمرة؛ التصاريح محدودة ويجب التقدم مبكراً

    - name: أسواق رمضان الليلية
      description: >
        أسواق مسائية مؤقتة في مكة وجدة خلال رمضان — طعام شعبي وبسطات حرفية وأمسيات نشيد
        وترفيه عائلي من الإفطار حتى السحور.
      businesses:
      - name: مهرجان مكة رمضان (موسمي، الموقع يتغير)
        area: حي العزيزية ووسط مكة
        notes: راجع هيئة السياحة لتفاصيل الفعالية السنوية
        url: https://www.visitsaudi.com/en
      - name: سوق رمضان الليلي — كورنيش جدة
        area: كورنيش جدة (80 كم)
        notes: سوق خارجي كبير؛ مناسب للعائلات؛ مفتوح ليلياً من الإفطار حتى الفجر
      notes: أجواء بالغة الحيوية؛ العائلات تسهر حتى وقت متأخر؛ تظاهرة اجتماعية بارزة في الشهر

    - name: ختمات القرآن الكريم
      description: >
        الانضمام لمجموعات ختم القرآن الكريم كاملاً — يُقرأ تقليدياً أكثر من مرة في رمضان. حلقات
        دراسة يقودها شيوخ تُغطي الحصص اليومية بتجويد صحيح ونطق سليم.
      location:
        name: المسجد الحرام — أقسام وممرات متعددة
        area: منطقة الحرم، مكة المكرمة
      notes: >
        المجموعات تتشكل طوعياً بالقرب من الأعمدة والممرات في المسجد؛ غير الناطقين بالعربية
        مرحب بهم للاستماع والمتابعة مع ترجمة؛ لختم القرآن في رمضان بالمسجد الحرام أجر عظيم

  events:
    description: >
      فعاليات ثقافية متكررة وموسمية في مكة والطائف وجدة — أمسيات شعرية وليالي عود وأسواق موسمية
      وبرامج رمضانية ومهرجانات تراثية. كثير منها مجاني أو رمزي التكلفة. راجع هيئة السياحة
      ووسائل التواصل المحلية للبرامج الراهنة.
    items:
    - name: أمسيات العود والموسيقى العربية
      description: >
        عروض عود حية وحفلات أنسامبل عربي كلاسيكي وجلسات ارتجال مقامي في المراكز الثقافية
        والكافيهات الموسيقية — نافذة على ألف عام من التراث الموسيقي الحي.
      recurrence: أسبوعية
      businesses:
      - name: معهد مكة للموسيقى والفنون (حفلات مسائية)
        area: حي النسيم، مكة المكرمة
        notes: حفلات عامة شهرية؛ عروض الطلاب وأعضاء هيئة التدريس؛ دخول مجاني
      - name: مركز الطائف للفنون (أمسيات الجمعة)
        area: وسط مدينة الطائف
        notes: حفلات مسائية أسبوعية لعازفي عود إقليميين؛ مفتوحة للزوار
      - name: منطقة الموسيقى بجدة (فعاليات ثقافية الحمراء)
        area: حي الحمراء، جدة
        notes: أمسيات أداء منتظمة؛ راجع إنستغرام للبرنامج الأسبوعي
      notes: الملبس المحتشم مطلوب؛ تبكّر 30 دقيقة لتأمين المقعد

    - name: أمسيات الشعر (مجلس الشعر)
      description: >
        تجمعات شعر عربي تقليدية — فصيح ونبطي — في الأندية الثقافية وصالونات المجلس الخاصة.
        إلقاء وشعر تلقائي وارتجال ومشاركة جمهور.
      recurrence: أسبوعية
      businesses:
      - name: نادي الأدباء والكتاب السعوديين (فرع مكة) — أمسية الجمعة
        area: وسط مكة المكرمة
        notes: كل جمعة مساءً؛ شعر كلاسيكي ونبطي؛ الجمهور مرحب به
      - name: القصر الثقافي بالطائف (ليلة الشعر النبطي)
        area: وسط مدينة الطائف
        notes: مساء الخميس؛ شعراء إقليميون مشهورون؛ حضور مميز
      - name: الأمسية الشهرية — نادي جدة الأدبي
        area: حي الروضة، جدة
        url: https://adabijeddah.com
        notes: تجمع شهري مع شعراء ضيوف؛ يشمل ورشاً للمبتدئين
      notes: الفهم العربي مفيد؛ بعض الفعاليات تقدم ترجمة عربية–إنجليزية

    - name: مهرجان ورود الطائف (مهرجان الورد)
      description: >
        احتفال سنوي بورود الطائف الدمشقية الأيقونية في موسم التفتح. قطف الورود الحي وعروض
        التقطير التقليدي وسوق منتجات الورد وفعاليات ثقافية بدوية وطبخ بماء الورد.
      recurrence: موسمية
      season: أواخر مارس وأوائل أبريل (يتفاوت حسب التفتح)
      location:
        name: مزارع ورود الطائف ومنتزه الردف
        area: محافظة الطائف (75 كم من مكة)
      notes: احجز الإقامة في الطائف قبل أسابيع في موسم المهرجان

    - name: احتفالات اليوم الوطني السعودي (23 سبتمبر)
      description: >
        احتفالات على مستوى المملكة بالألعاب النارية وعروض الضوء بالطائرات المسيّرة وعروض حية
        ومعارض تراثية في مكة والطائف وجدة.
      recurrence: سنوية
      season: 23 سبتمبر
      location:
        areas:
        - منطقة أبراج البيت ووسط مكة المكرمة
        - كورنيش جدة (أكبر عرض إقليمي)
      notes: الفنادق تمتلئ قبل أسابيع؛ الألعاب النارية في الغالب بعد صلاة العشاء

    - name: البازارات التراثية والأسواق الموسمية
      description: >
        أسواق مفتوحة تحتفي بالحرف والمأكولات العربية والتقاليد الشعبية — تُقام خلال الأعياد
        والعطل الوطنية والمواسم التراثية. تضم بضائع يدوية وأطعمة تقليدية وعروضاً حية.
      businesses:
      - name: ليالي سوق الزل التراثية (طبعة رمضان)
        area: حي المعلا، مكة المكرمة
        notes: مواعيد ممتدة وباعة مميزون في أمسيات رمضان
      - name: سوق عيد الفطر (وسط مكة)
        area: مكة مول والشوارع المحيطة، العزيزية
        notes: سوق ثلاثة أيام بعد صلاة العيد؛ حلوى تقليدية وملابس وهدايا
      - name: سوق مهرجان جدة الشتوي (سوق البلد التراثي)
        area: جدة التاريخية
        notes: ديسمبر–يناير؛ بسطات حرفيين وطعام شعبي وموسيقى حية؛ رحلة يومية سهلة
      notes: تابع هيئة السياحة (@visitsaudi) للبرامج السنوية الراهنة

    - name: الأمسيات الثقافية الرمضانية (ليالي رمضان)
      description: >
        في رمضان تنبعث الحياة في مكة وما حولها بعد الإفطار بقراءات شعرية وأمسيات نشيد ومسابقات
        قرآنية وأسواق مفتوحة. الأجواء الروحانية لمكة في رمضان لا مثيل لها في العالم.
      recurrence: موسمية
      season: رمضان (تواريخ متغيرة مع التقويم الهجري)
      location:
        areas:
        - أفنية المسجد الحرام والشوارع المحيطة
        - المساحات العامة في مجمع أبراج البيت
        - المركز الثقافي بمكة (دار الثقافة)
      notes: >
        كثير من الفعاليات عفوية وتنظيمها مجتمعي؛ صلوات التراويح الكبرى في المسجد الحرام
        تستقطب الملايين وهي بحد ذاتها حدث جماعي عميق

    - name: برامج المسجد المفتوح في موسم الحج
      description: >
        خلال الحج (ذو الحجة)، يستضيف المسجد الحرام والحي المحيط به برامج خاصة للحجاج —
        محاضرات علمية ومسابقات تلاوة وعروض سيرة ونبوية وجولات تراث إسلامي.
      recurrence: موسمية
      season: ذو الحجة 1–13 (التقويم الهجري)
      location:
        name: المسجد الحرام ومنطقة الحرم
        area: مكة المكرمة
      notes: >
        تنظمها وزارة الحج والعمرة؛ البرامج تُنشر عبر تطبيق نسك (المنصة الرسمية للحج السعودي)
        url: https://www.nusuk.sa

    - name: احتفالات عيد الأضحى في مكة المكرمة
      description: >
        يتزامن عيد الأضحى (العاشر من ذي الحجة) مع ذروة موسم الحج. تتحول المدينة بصلاة العيد
        والأضاحي واجتماع الأسر والأجواء الاحتفالية. الشوارع مزينة والخير يفيض في مكة.
      key_activities:
      - صلاة العيد في المسجد الحرام (جماعة ضخمة)
      - مشاهدة توزيع لحوم القرابين
      - زيارة الأسرة وتبادل التهاني
      - الصدقة في نقاط التبرع بالمسجد
      notes: الزوار غير الحجاج مرحب بهم لمشاهدة صلاة العيد؛ حركة المرور شديدة الكثافة في المدينة

    - name: احتفالات عيد الفطر
      description: >
        الاحتفال بانقضاء رمضان — يوم صلاة جماعية وزيارات عائلية وتبادل هدايا وابتهاج.
        شوارع مكة تزهو بالبهجة والضيافة السعودية الحارة في أبهى صورها.
      key_activities:
      - صلاة عيد الفطر في المسجد الحرام (جماعة الفجر)
      - طعام شعبي وحلوى في أرجاء المدينة
      - حلوى العيد التقليدية — المعمول والكعك واللقيمات
      - التسوق والهدايا في مجمعات مكة وأسواقها
      notes: الدوائر الحكومية ومعظم الشركات مغلقة يوم العيد؛ المساجد ومحلات الطعام مفتوحة

    - name: يوم التأسيس السعودي (22 فبراير)
      description: >
        إحياء ذكرى تأسيس الدولة السعودية الأولى عام 1727م. فعاليات ثقافية ومعارض تراثية وملابس
        تقليدية وعروض تاريخية في أنحاء المملكة بما فيها مكة المكرمة.
      recurrence: سنوية
      season: 22 فبراير
      location:
        area: المراكز الثقافية والمجمعات التجارية والمساحات العامة في مكة
      notes: عطلة رسمية؛ معارض تراثية تمتد لأيام حول التاريخ

    - name: موسم الحج (ذو الحجة 1–13) — تجربة المراقبة
      description: >
        حتى الزائر المقيم في مكة غير الحاج يشهد تحول المدينة إلى أكبر تجمع بشري سنوي في العالم.
        مشاهدة الملايين بالإحرام الأبيض قادمين من كل أمة تجربة لا مثيل لها في وحدة الإسلام العالمية.
      key_observations:
      - حجاج يصلون بالإحرام من مداخل المدينة والمسجد الحرام
      - محاضرات علمية متزايدة وتلاوات قرآنية في المسجد الحرام
      - بسطات طعام دولية وأسواق شعبية من عشرات الدول
      - المدينة في أعلى درجات التعدد الحضاري وزخمها الروحي
      notes: >
        غير المسلمين ممنوعون من دخول مكة في أي وقت؛ المقيمون المسلمون غير الحجاج يتجنبون
        طرق الحجاج (منى وعرفات ومزدلفة) أيام الحج بسبب الكثافة البشرية الشديدة

    - name: موسم مكة (مع رؤية 2030)
      description: >
        ضمن مبادرة رؤية 2030 للترفيه، يتضمن موسم مكة معارض ثقافية وعروض تراثية ومنشآت فنية
        وفعاليات ترفيهية عائلية عبر المدينة في فترات محددة خارج موسم الحج.
      timing: يتغير (في الغالب يتزامن مع الإجازات المدرسية والفترات خارج الحج)
      location:
        area: أماكن متعددة في مكة بما فيها العزيزية وأبراج البيت
      notes: >
        راجع هيئة السياحة السعودية لتواريخ الموسم الراهن والفعاليات المدرجة؛ البرمجة تتجدد سنوياً
        url: https://www.visitsaudi.com/en

  family_and_kids:
    description: >
      أنشطة وجهات مناسبة للعائلات والأطفال وجميع الأعمار، تجمع الترفيه مع الإثراء الثقافي
      والروحي.
    items:
    - name: منتزه الشلال الترفيهي
      description: >
        مجمع ترفيهي كبير يضم حديقة ملاهٍ داخلية وحديقة مائية وسيارات كارت ومسار بولينج وكتابة
        على الجليد ومطاعم. من أكبر المجمعات الترفيهية في المنطقة.
      location:
        name: منتزه الشلال
        address: طريق الكورنيش، جدة (80 كم من مكة)
        coordinates: 21.5900° N, 39.1170° E
      age_range: جميع الأعمار (بعض الألعاب من 3 سنوات)
      duration: نصف يوم إلى يوم كامل
      notes: مناسب للعائلات؛ طعام حلال في كل أرجائه؛ أقسام مختلطة وعائلية

    - name: مركز ترفيه مكة مول (فن لاند)
      description: مركز ترفيه عائلي داخلي بألعاب وألعاب إلكترونية ومناطق لعب.
      location:
        name: مكة مول
        address: حي العزيزية، مكة المكرمة
      age_range: 2–14 سنة (الفئة المستهدفة الرئيسية)
      duration: ساعة إلى ثلاث ساعات
      notes: داخلي ومكيف؛ مثالي خلال ساعات الحرارة الشديدة في مكة

    - name: حديقة حيوان الطائف ومتنزهها البري
      description: >
        من أكبر حدائق الحيوان في المملكة العربية السعودية، تضم حياة برية عربية كالمها والغزال
        وقرود المندريل وطيور أصيلة في منطقة الحجاز.
      location:
        name: حديقة حيوان الطائف (منتزه الردف)
        address: طريق الردف، الطائف
        coordinates: 21.2667° N, 40.4145° E
        distance_from_mekka: 75 كم
      duration: ساعتان إلى ثلاث ساعات
      notes: مناسب للعائلات؛ ممرات مظللة؛ لافتات توضيحية بالعربية والإنجليزية

    - name: مخيمات تعليم القرآن والإسلام للأطفال
      description: >
        برامج منهجية للأطفال تجمع حفظ القرآن وقصص التاريخ الإسلامي وحروف الهجاء العربية
        وأنشطة ممتعة — متاحة في العطل المدرسية.
      businesses:
      - name: برنامج القرآن للأطفال — المسجد الحرام
        area: المسجد الحرام، مكة المكرمة
        notes: برامج مجانية خلال الصيف ورمضان للأعمار 5–15
      - name: أكاديمية النور الإسلامية للأطفال
        area: حي العزيزية، مكة المكرمة
        notes: مخيمات صيفية مكثفة؛ قرآن وعربية وفنون إسلامية متكاملة
      duration: جلسات نصف يوم أو مخيمات أسبوعية
      notes: ذو معنى عميق للعائلات المسلمة الزائرة لمكة بأطفالها

    - name: مزرعة الجمال والخيول العائلية
      description: >
        التفاعل اللطيف مع الخيول العربية والجمال وحيوانات المزرعة — تجربة تعليمية تفاعلية للأطفال
        للتعرف على حيوانات التراث الإسلامي.
      businesses:
      - name: مزرعة البادية للعائلات
        area: أطراف مكة، حي البادية
        notes: زيارات عائلية؛ إطعام الحيوانات؛ تصوير؛ جولات جمال إرشادية للأطفال
      - name: مزرعة الهدا للحيوانات (الطائف)
        area: الهدا، الطائف
        notes: موقع جبلي؛ ماعز وخيول وجمال؛ ركوب خيل للصغار؛ منتجات المزرعة الطازجة في الموقع
      duration: ساعة إلى ساعتين
      notes: ارتدِ ملابس محتشمة ومريحة؛ حذاء مغلق ضروري حول الحيوانات

  health_and_medical_services:
    description: >
      المرافق الطبية والصيدليات والموارد الصحية الرئيسية للحجاج والزوار. تمتلك مكة بنية تحتية
      طبية عالمية المستوى مُصممة لخدمة الملايين — كثير من الخدمات مجانية أو مدعومة لحجاج بيت الله.
    items:
    - name: مجمع الملك عبدالله الطبي (KAMC)
      description: >
        من أكبر وأكثر المستشفيات تطوراً في مكة المكرمة — مركز إحالة رئيسي للحالات الطبية
        الحرجة في موسمي الحج والعمرة.
      location:
        name: مجمع الملك عبدالله الطبي
        area: حي الزاهر، مكة المكرمة
        address: طريق الملك عبدالله، مكة المكرمة
      url: https://kamc.med.sa/en
      notes: >
        قسم طوارئ على مدار الساعة؛ أمراض القلب وجراحة العظام والطب الباطني؛ كادر طبي عربي وإنجليزي؛
        علاج مجاني لحجاج بيت الله

    - name: مستشفى أجياد للطوارئ
      description: >
        أقرب مستشفى رئيسي إلى المسجد الحرام — مُصمم خصيصاً للتعامل مع الحجم الكبير من حالات
        الطوارئ الطبية القريبة من المسجد الحرام.
      location:
        name: مستشفى أجياد للطوارئ
        area: حي أجياد، ملاصق مباشرة للمسجد الحرام
        address: شارع أجياد، منطقة الحرم، مكة المكرمة
      url: https://www.makkahhc.sa/en/category/hospitals-en/ajyad-emergency-hospital
      notes: طوارئ 24 ساعة؛ متخصصون في ضربة الحرارة وحالات القلب وإصابات الحشود

    - name: محطات هيئة الهلال الأحمر السعودي (SRCA) الميدانية
      description: >
        محطات إسعاف ثابتة ومتنقلة في أنحاء مسار الحج — منى وعرفات ومزدلفة ومحيط المسجد الحرام
        — تعمل بكوادر مسعفين مدربين.
      location:
        area: في أنحاء مسار الحج ومحيط المسجد الحرام
      url: https://srca.org.sa/en
      emergency_number: '911'
      notes: استجابة سريعة لحالات الإجهاد الحراري والجفاف والإصابات المرتبطة بالحشود؛ خدمة مجانية

    - name: الصيدليات بالقرب من المسجد الحرام
      description: صيدليات جيدة التجهيز تخدم الحجاج 24 ساعة في المواسم الكبرى.
      businesses:
      - name: صيدلية الدواء (فروع متعددة)
        area: شارع أجياد وشارع إبراهيم الخليل، منطقة الحرم
        notes: سلسلة سعودية كبرى؛ 24 ساعة خلال الحج ورمضان؛ كادر عربي وإنجليزي
      - name: الصيدلية المتحدة (صيدليات يونايتد)
        area: بالقرب من أبراج البيت، منطقة الحرم
        notes: مخزون شامل؛ أسعار تنافسية؛ كادر متعدد اللغات
      - name: صيدليات الفنادق (فيرمونت وهيلتون وبولمان)
        area: مجمع أبراج البيت وشارع أجياد
        notes: مريحة؛ أسعار أعلى لكنها متاحة 24 ساعة
      notes: >
        احرص على توفر: أملاح الإماهة الفموية ولاصقات البثور ومسكنات الألم وكريم الشمس
        ومستلزمات الوقاية من ضربة الشمس قبل العبادات المكثفة

    - name: الوقاية من الإجهاد الحراري
      description: >
        إرشادات عملية للبقاء آمناً في حرارة مكة الشديدة — تتجاوز درجات الحرارة 45°C في الصيف.
        الإجهاد الحراري وضربة الشمس أكثر الطوارئ الطبية شيوعاً في الحج.
      key_tips:
      - اشرب 3–4 لترات من الماء يومياً على الأقل (ماء زمزم متاح مجاناً)
      - تجنب أشعة الشمس المباشرة بين 10:00 و16:00
      - ارتدِ ملابس فضفاضة بيضاء أو فاتحة اللون
      - استخدم مظلة في الشعائر الخارجية (عرفات والجمرات)
      - احمل كيس أملاح الإماهة (ORS) يومياً
      - تعرّف على الأعراض — دوخة وتشوش وتوقف التعرق — انسحب للظل والماء فوراً
      cooling_stations:
      - name: نظام الرش الضبابي بالمسجد الحرام
        area: المطاف الخارجي والأفنية؛ مراوح رش في أنحاء المحيط
      - name: الأنفاق المكيفة للمشاة
        area: تربط خيام منى بجسر الجمرات
      notes: اليقظة الفردية ضرورية رغم البنية التحتية الحكومية للتبريد

    - name: الصحة النفسية والإرشاد الروحي
      description: >
        خدمات دعم للحجاج الذين يعانون ضائقة نفسية أو تحديات روحية خلال التجربة العميقة للحج.
      businesses:
      - name: مكتب الإرشاد والتوجيه — المسجد الحرام
        area: داخل المسجد الحرام (مكاتب خدمة عند الأبواب الرئيسية)
        notes: علماء دين ومرشدون؛ دعم نفسي وإرشاد روحي؛ متعددو اللغات
      - name: مراكز خدمات الحجاج — وزارة الحج
        area: في أنحاء مكة ومسار الحج
        url: https://www.nusuk.sa
        notes: خدمات رعاية؛ مكتب المفقودات؛ لمّ شمل الأسر؛ إسعاف نفسي
      notes: الخدمات مجانية وسرية؛ طلب الإرشاد دليل قوة لا ضعف
