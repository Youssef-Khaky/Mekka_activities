# Seasonal events, family activities, and health resources

activities:
  ramadan_activities:
    description: >
      Special activities and experiences unique to the holy month of Ramadan, when Mekka is at its most spiritually charged
      and vibrant.
    items:
    - name: Iftar at Masjid al-Haram
      description: >
        Breaking the fast at sunset (Maghrib) inside the Grand Mosque — one of the most spiritually profound experiences in
        Islam. Dates and water distributed free by the Saudi government throughout the mosque.
      location:
        name: Masjid al-Haram
        area: Al Haram district, Mekka
      timing: Daily at Maghrib prayer time throughout Ramadan
      notes: >
        Arrive 30–45 minutes before Maghrib to secure a spot; communal spirit is extraordinary; dates, water, and sometimes
        full meals distributed free of charge
    - name: Tarawih Prayer (Ramadan Night Prayer)
      description: >
        Extended nightly prayers held after Isha during Ramadan — led by world-renowned Quran reciters at Masjid al-Haram.
        Among the most moving religious experiences available anywhere in the Muslim world.
      location:
        name: Masjid al-Haram
        area: Al Haram district, Mekka
      duration: 1.5–2.5 hours per night
      notes: >
        The Imam recites the entire Quran over 30 nights; arrive early for space; rooftop and courtyard areas fill fast; bring
        a small prayer mat or towel
    - name: Laylat al-Qadr Vigil (Night of Power)
      description: >
        The holiest night of the year — believed to fall in the last ten nights of Ramadan (most likely the 27th). Worship
        on this night is better than a thousand months (Quran 97:3). Muslims spend the night in prayer, Quran recitation,
        and supplication at Masjid al-Haram.
      location:
        name: Masjid al-Haram
        area: Al Haram district, Mekka
      timing: Last ten nights of Ramadan; most intensely the 27th night
      notes: >
        The mosque reaches absolute peak capacity on this night; arrive several hours early or plan to worship from the courtyards
        and rooftop; I'tikaf retreat is highly recommended
    - name: Suhoor Near the Grand Mosque
      description: >
        The pre-dawn meal (Suhoor) taken before Fajr — enjoyed at the many restaurants and street food stalls that stay open
        all night during Ramadan around the Haram.
      location:
        area: >-
          Ajyad Street, Ibrahim Al Khalil Street, and hotel restaurants in Al Haram district
      businesses:
      - name: Al Baik (24-hour Ramadan hours)
        area: Ajyad Street and Abraj Al-Bait
      - name: Al Nafoura — Le Méridien Towers
        area: Ajyad Street
        notes: Suhoor buffet with Haram views
      - name: Saffron Restaurant — Fairmont Clock Tower
        area: Abraj Al-Bait
        notes: Upscale Suhoor with Kaaba view; reservation essential
      notes: >
        Streets around the Haram are uniquely alive between midnight and Fajr during Ramadan — street vendors, charity food
        distribution, and a festive spiritual atmosphere
    - name: I'tikaf (Mosque Seclusion Retreat)
      description: >
        Devoting the last ten days and nights of Ramadan to seclusion inside Masjid al-Haram — sleeping, eating, and worshipping
        within the mosque. A Sunnah of the Prophet (PBUH); profoundly transformative for those who undertake it.
      location:
        name: Masjid al-Haram — designated I'tikaf areas
        area: Al Haram district, Mekka
      timing: Last ten days of Ramadan
      notes: >
        Registration required through the Saudi Ministry of Hajj and Umrah; permits are limited and must be applied for well
        in advance
    - name: Ramadan Night Markets
      description: >
        Temporary evening markets around Mekka and Jeddah during Ramadan — street food, craft stalls, Nasheed performances,
        and family entertainment from Iftar until Suhoor.
      businesses:
      - name: Mekka Ramadan Festival (seasonal, location varies)
        area: Al-Aziziyah district and central Mekka
        notes: Check Saudi Tourism Authority for annual event details
      - name: Corniche Ramadan Night Market
        area: Jeddah Corniche (80 km)
        notes: Large outdoor market; family-friendly; open nightly from Iftar until Fajr
      notes: Deeply festive; families stay out very late; a social highlight of the month
    - name: Quran Khatm (Completion Gatherings)
      description: >
        Joining groups that complete a full recitation of the Quran — traditionally done multiple times during Ramadan. Study
        circles with teachers guide daily portions with correct Tajweed (recitation rules) and pronunciation.
      location:
        name: Masjid al-Haram — various floor sections and corridors
        area: Al Haram district, Mekka
      notes: >
        Groups form organically near pillars and corridors throughout the mosque; non-Arabic speakers are welcome to listen
        and follow along with a translation; completing the Quran in Ramadan at Masjid al-Haram carries immense spiritual
        reward
  events:
    description: >
      Recurring and seasonal cultural events in Mekka, Taif, and Jeddah — poetry circles, Oud evenings, seasonal markets,
      Ramadan programs, and heritage festivals. Many events are free or low-cost. Check Saudi Tourism Authority and local
      social media for current schedules.
    items:
    - name: Oud and Arabic Music Evenings
      description: >
        Live Oud performances, classical Arabic ensemble concerts, and maqam improvisation sessions held at cultural centers
        and music cafes — a window into 1,000 years of living musical heritage.
      recurrence: weekly
      businesses:
      - name: Mekka Music and Arts Institute (Evening Concerts)
        area: Al-Naseem district, Mekka
        notes: Monthly public recitals; student and faculty performances; free admission
      - name: Taif Arts Center (Friday Evenings)
        area: Taif city center
        notes: Weekly evening concerts featuring regional Oud players; open to visitors
      - name: Jeddah Music Quarter (Al-Hamra Cultural Events)
        area: Al-Hamra district, Jeddah
        notes: Regular performance evenings; check Instagram for weekly schedule
      notes: Modest dress required; arrive 30 minutes early for seating
    - name: Poetry Circles (Majlis al-Shi'r)
      description: >
        Traditional Arabian poetry gatherings — classical Fusha and colloquial Nabati — held in cultural clubs and private
        majlis settings. Recitation, improvised response poetry, and audience participation.
      recurrence: weekly
      businesses:
      - name: Saudi Writers and Literati Club (Mekka Chapter) — Friday Circle
        area: Mekka city center
        notes: Every Friday evening; classical and Nabati poetry; public welcome
      - name: Taif Cultural Palace (Nabati Poetry Night)
        area: Taif city center
        notes: Thursday evenings; celebrated regional poets perform; very lively
      - name: Jeddah Literary Club Monthly Evening
        area: Al-Rawdah district, Jeddah
        notes: Monthly gathering with guest poets; includes beginner workshops
      notes: Arabic comprehension helpful; some events offer Arabic–English interpretation
    - name: Taif Rose Festival (Mahrajan al-Ward)
      description: >
        Annual celebration of Taif's iconic Damascene roses during bloom season. Live rose-picking, traditional distillation
        demonstrations, rose product markets, Bedouin cultural performances, and cooking with rose water.
      recurrence: seasonal
      season: Late March to early April (varies by bloom)
      location:
        name: Taif Rose Farms and Al-Rudaf Park
        area: Taif governorate (75 km from Mekka)
      notes: Book accommodation in Taif weeks ahead during festival season
    - name: Saudi National Day Celebrations (23 September)
      description: >
        Kingdom-wide celebrations with fireworks, drone light shows, live performances, and heritage exhibitions across Mekka,
        Taif, and Jeddah.
      recurrence: annual
      season: 23 September
      location:
        areas:
        - Abraj Al-Bait area and Mekka city center
        - Jeddah Corniche (largest regional display)
      notes: Hotels book up weeks in advance; fireworks typically after Isha prayer
    - name: Heritage Bazaars and Seasonal Souqs
      description: >
        Open-air markets celebrating Arabian craft, food, and folk traditions — held during national holidays, Eid, and heritage
        seasons. Feature handmade goods, traditional food, live demonstrations, and folk performances.
      businesses:
      - name: Souq Al-Zal Heritage Nights (Ramadan edition)
        area: Al-Mu'alla district, Mekka
        notes: Extended hours and special vendors during Ramadan evenings
      - name: Eid Al-Fitr Market (Mekka City Center)
        area: Mekka Mall and surrounding streets, Al-Aziziyah
        notes: Three-day market after Eid prayer; traditional sweets, clothing, and gifts
      - name: Jeddah Winter Festival Market (Al-Balad Heritage Souq)
        area: Historic Jeddah
        notes: December–January; artisan stalls, street food, and live music; easy day trip
      notes: Follow Saudi Tourism Authority (@visitsaudi) for current annual schedules
    - name: Ramadan Cultural Evenings (Layali Ramadan)
      description: >
        During Ramadan, Mekka and surrounding cities come alive after Iftar with poetry recitations, Nasheed performances,
        Quran competitions, and open-air markets. The spiritual atmosphere of Mekka during Ramadan is unmatched anywhere on
        earth.
      recurrence: seasonal
      season: Ramadan (dates shift annually with the Islamic calendar)
      location:
        areas:
        - Masjid al-Haram courtyards and surrounding streets
        - Abraj Al-Bait Mall public spaces
        - Mekka Cultural Center (Dar al-Thaqafa)
      notes: >
        Many events are spontaneous and community-organized; major Tarawih prayers at Masjid al-Haram draw millions and are
        themselves a profound communal event
    - name: Hajj Season Open Mosque Programs
      description: >
        During Hajj (Dhul Hijjah), Masjid al-Haram and the surrounding district host special programs for pilgrims — scholarly
        lectures, Quran recitation competitions, Seerah exhibitions, and interfaith heritage tours.
      recurrence: seasonal
      season: Dhul Hijjah 1–13 (Islamic calendar)
      location:
        name: Masjid al-Haram and Al Haram district
        area: Mekka
      notes: >
        Programs organized by the Saudi Ministry of Hajj and Umrah; schedules published via the Nusuk app (official Saudi
        Hajj platform)
    - name: Eid al-Adha Celebrations in Mekka
      description: >
        Eid al-Adha (10th Dhul Hijjah) coincides with the peak of Hajj. The city transforms with prayers, sacrifice, family
        gatherings, and festive atmosphere. Streets are decorated and charity flows throughout Mekka.
      key_activities:
      - Eid prayer at Masjid al-Haram (massive congregation)
      - Witnessing Qurbani (animal sacrifice) distribution
      - Visiting family and exchanging Eid greetings
      - Charitable giving at mosque donation points
      notes: >-
        Non-Hajj visitors are welcome to observe Eid prayers; city traffic is extremely heavy
    - name: Eid al-Fitr Celebrations
      description: >
        The celebration marking the end of Ramadan — a day of communal prayer, family visits, gift-giving, and festivity.
        Mekka's streets are alive with joy and the city's famously warm hospitality is on full display.
      key_activities:
      - Eid al-Fitr prayer at Masjid al-Haram (dawn congregation)
      - Street food and sweet stalls throughout the city
      - Traditional Eid sweets — Maamoul, Kahk, and Luqaimat
      - Shopping and gift-giving in Mekka's malls and markets
      notes: >-
        Government offices and most businesses closed on Eid day; mosques and food stalls open
    - name: Saudi Founding Day (February 22nd)
      description: >
        Celebrating the founding of the First Saudi State in 1727. Cultural events, heritage exhibitions, traditional dress,
        and historical displays take place across the country including Mekka.
      recurrence: annual
      season: 22 February
      location:
        area: Cultural centers, malls, and public spaces throughout Mekka
      notes: Public holiday; heritage-themed exhibitions run for several days around the date
    - name: Hajj Season (Dhul Hijjah 1–13) — Observer Experience
      description: >
        Even for non-Hajj visitors resident in Mekka, the Hajj season transforms the city into the world's largest annual
        gathering. Witnessing millions of white-clad pilgrims arriving from every nation is a singular experience of global
        Islamic unity.
      key_observations:
      - Pilgrims arriving in Ihram at city entry points and the Grand Mosque
      - Increased scholarly lectures and Quran recitation at Masjid al-Haram
      - International food stalls and street markets from dozens of countries
      - The city at its most multicultural and spiritually charged atmosphere
      notes: >
        Non-Muslim visitors are not permitted in Mekka at any time; Muslim residents not performing Hajj should avoid pilgrim
        routes (Mina, Arafat, Muzdalifah) during Hajj days due to extreme crowd density
    - name: Mekka Season (Mawsim Makkah)
      description: >
        Part of Saudi Arabia's Vision 2030 entertainment initiative, Mekka Season features cultural exhibitions, heritage
        shows, art installations, and family entertainment events across the city during designated periods outside Hajj.
      timing: Varies (typically aligns with school holidays and non-Hajj periods)
      location:
        area: Various venues across Mekka including Al-Aziziyah and Abraj Al-Bait
      notes: >
        Check the Saudi Tourism Authority (visitsaudi.com) for current season dates and event listings; programming changes
        annually
  family_and_kids:
    description: >
      Family-friendly activities and attractions suitable for children and all ages, combining entertainment with cultural
      and spiritual enrichment.
    items:
    - name: Al-Shallal Theme Park
      description: >
        Large entertainment complex combining an indoor theme park, aquatic park, go-karts, bowling, ice skating, and restaurants.
        One of the largest in the region.
      location:
        name: Al-Shallal Theme Park
        address: Corniche Road, Jeddah (80 km from Mekka)
        coordinates: 21.5900° N, 39.1170° E
      age_range: All ages (some rides 3+)
      duration: Half-day to full-day
      notes: Family-friendly; halal food throughout; segregated and family sections
    - name: Mekka Mall Entertainment (Funland)
      description: Indoor family entertainment center with rides, arcade games, and play zones.
      location:
        name: Mekka Mall
        address: Al-Aziziyah district, Mekka
      age_range: 2–14 years (primary focus)
      duration: 1–3 hours
      notes: Indoor and air-conditioned; ideal during Mekka's hot midday hours
    - name: Taif Zoo and Wildlife Park
      description: >
        One of Saudi Arabia's largest zoos featuring Arabian wildlife including oryx, sand gazelles, baboons, and birds native
        to the Hejaz region.
      location:
        name: Taif Zoo (Al-Rudaf Park)
        address: Al-Rudaf Road, Taif
        coordinates: 21.2667° N, 40.4145° E
        distance_from_mekka: 75 km
      duration: 2–3 hours
      notes: Family-friendly; shaded walkways; educational Arabic and English signage
    - name: Children's Quran and Islamic Learning Camps
      description: >
        Structured programs for children combining Quran memorization, Islamic history storytelling, Arabic alphabet, and
        fun activities — available during school holidays.
      businesses:
      - name: Masjid al-Haram Children's Quran Program
        area: Masjid al-Haram, Mekka
        notes: Free programs run during summer and Ramadan for ages 5–15
      - name: Al-Nour Islamic Children's Academy
        area: Al-Aziziyah district, Mekka
        notes: Intensive summer camps; Quran, Arabic, and Islamic arts integrated
      duration: Half-day sessions or week-long camps
      notes: Deeply meaningful for Muslim families visiting Mekka with children
    - name: Camel and Horse Petting Farm (Family Visit)
      description: >
        Gentle interaction with Arabian horses, camels, and farm animals — a hands-on educational experience for children
        to connect with the animals of Islamic heritage.
      businesses:
      - name: Al-Badia Family Farm
        area: Outskirts of Mekka, Al-Badia district
        notes: >-
          Family visits; animal feeding; photography; short guided camel walks for children
      - name: Al-Hada Animal Farm (Taif)
        area: Al-Hada, Taif
        notes: >
          Mountain setting; goats, horses, and camels; pony rides for young children; fresh farm products sold on-site
      duration: 1–2 hours
      notes: Bring modest, comfortable clothing; closed shoes essential around animals
  health_and_medical_services:
    description: >
      Key medical facilities, pharmacies, and health resources for pilgrims and visitors. Mekka has world-class medical infrastructure
      specifically built to serve millions of pilgrims — many services are free or subsidized for Hajj pilgrims.
    items:
    - name: King Abdullah Medical Complex (KAMC)
      description: >
        One of the largest and most advanced hospitals in Mekka — a major referral center for serious medical cases during
        Hajj and Umrah seasons.
      location:
        name: King Abdullah Medical Complex
        area: Al-Zahir district, Mekka
        address: King Abdullah Road, Mekka
      notes: >
        24-hour emergency department; cardiology, orthopedics, and internal medicine; Arabic and English-speaking staff; free
        treatment for Hajj pilgrims
    - name: Ajyad Emergency Hospital
      description: >
        The closest major hospital to Masjid al-Haram — specifically designed to handle the high volume of medical emergencies
        arising near the Grand Mosque.
      location:
        name: Ajyad Emergency Hospital
        area: Ajyad district, directly adjacent to Masjid al-Haram
        address: Ajyad Street, Al Haram district, Mekka
      notes: 24-hour emergency care; heat stroke, cardiac, and crush injury specialists
    - name: Saudi Red Crescent Authority (SRCA) Field Stations
      description: >
        Mobile and fixed first aid stations positioned throughout the Hajj circuit — Mina, Arafat, Muzdalifah, and Masjid
        al-Haram perimeter — staffed by paramedics.
      location:
        area: Throughout Hajj circuit and Masjid al-Haram perimeter
      emergency_number: '911'
      notes: >-
        Rapid response for heat exhaustion, dehydration, and crowd-related injuries; free service
    - name: Pharmacies Near Masjid al-Haram
      description: Well-stocked pharmacies serving pilgrims 24 hours during peak seasons.
      businesses:
      - name: Al-Dawaa Pharmacy (multiple branches)
        area: Ajyad Street and Ibrahim Al Khalil Street, Al Haram district
        notes: Large Saudi chain; 24-hour during Hajj/Ramadan; Arabic and English staff
      - name: United Pharmacy (Saydaliyat United)
        area: Near Abraj Al-Bait, Al Haram district
        notes: Comprehensive stock; competitive prices; multilingual staff
      - name: Hotel Pharmacies (Fairmont, Hilton, Pullman)
        area: Abraj Al-Bait Complex and Ajyad Street
        notes: Convenient; higher prices but 24-hour availability
      notes: >
        Stock up on: oral rehydration salts, blister plasters, pain relief, sunscreen, and heat stroke prevention supplies
        before intensive ibadah activities
    - name: Heat Exhaustion Prevention
      description: >
        Practical guidance for staying safe in Mekka's extreme heat — temperatures regularly exceed 45°C in summer. Heat exhaustion
        and heat stroke are the leading medical emergencies during Hajj.
      key_tips:
      - Drink at least 3–4 liters of water daily (Zamzam freely available)
      - Avoid direct sun between 10:00–16:00
      - Wear white or light-colored loose clothing
      - Use an umbrella during outdoor rituals (Arafat, Jamarat)
      - Carry an electrolyte sachet (ORS) daily
      - >-
        Recognize signs — dizziness, confusion, stopping sweating — seek shade and water immediately
      cooling_stations:
      - name: Masjid al-Haram cooling mist systems
        area: Outdoor Mataf and sahn areas; misting fans throughout the perimeter
      - name: Air-conditioned pedestrian tunnels
        area: Connecting Mina tents and Jamarat Bridge
      notes: >-
        Individual vigilance remains essential despite the government's cooling infrastructure
    - name: Mental Health and Spiritual Counseling
      description: >
        Support services for pilgrims experiencing emotional distress or spiritual challenges during the intense pilgrimage
        experience.
      businesses:
      - name: Masjid al-Haram Counseling and Guidance Office
        area: Inside Masjid al-Haram (service desks near main gates)
        notes: >-
          Islamic scholars and counselors; grief support and spiritual guidance; multilingual
      - name: Ministry of Hajj Pilgrim Services Centers
        area: Throughout Mekka and Hajj circuit
        notes: Welfare services; lost and found; family reunification; psychological first aid
      notes: Services are free and confidential; seeking guidance is a sign of strength
