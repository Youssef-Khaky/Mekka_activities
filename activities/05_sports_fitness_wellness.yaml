# الرياضة واللياقة البدنية وأنشطة العافية

activities:
  arabian_heritage_sports:
    description: >
      الرياضات العربية التقليدية والفنون القتالية المتجذرة في الثقافة الإسلامية والبدوية. معظم
      الأماكن في مكة المكرمة أو على مسافة قصيرة في الطائف (75 كم، مناخ أكثر برودة) أو جدة (80 كم).
      يُنصح بشدة بالحجز المسبق لجميع الأنشطة.
    items:
    - name: ركوب الخيل (الفروسية)
      description: >
        تعلم ركوب الخيل العربية — من أشرف المهارات في التراث الإسلامي. حث النبي صلى الله عليه وسلم
        على الفروسية باعتبارها رياضة نبيلة.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: أكاديمية الفروسية العربية
        area: الشفا، الطائف (نحو 75 كم من مكة)
        notes: دروس مبتدئة وجولات ميدانية في التضاريس الجبلية وورش العناية بالخيل العربية
      - name: نادي الفروسية بالطائف
        area: مدينة الطائف، حي الهدا
        notes: تابع لاتحاد الفروسية السعودي؛ دروس فردية وجماعية
      - name: نادي الفروسية بجدة
        area: حي الأندلس، جدة (80 كم من مكة)
        address: طريق الملك عبدالعزيز، جدة
        url: https://saef.gov.sa/en
        notes: من أقدم أندية الفروسية في المنطقة؛ يستضيف مسابقات ويقدم دروساً لجميع الأعمار
      duration: ساعة إلى ثلاث ساعات للجلسة
      notes: ارتدِ بنطلوناً طويلاً وحذاء مغلق؛ خوذات مرفقة؛ احجز قبل أسبوع على الأقل في موسم الحج

    - name: فنون السيف العربي (الفروسية الحربية)
      description: >
        تقنيات القتال بالسيف العربي التقليدي المستمدة من التراث الحربي الإسلامي. تشمل العرضة
        (رقصة السيف الاحتفالية) وتدريبات السيف المفردة وأشكال التقاطع.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: مراكز هيئة التراث السعودي الثقافية
        area: فروع مكة وجدة
        url: https://heritage.moc.gov.sa/en
        notes: تنظم ورش العرضة السعودية التقليدية؛ تواصل مع الهيئة للجلسات العامة المجدولة
      - name: نادي مكة الثقافي والرياضي
        area: حي العزيزية، مكة المكرمة
        notes: يستضيف أحياناً ورش فنون الحرب التراثية والرياضات التراثية
      - name: مواقع مهرجان جدة التراثية
        area: البلد (جدة التاريخية)، جدة
        notes: تضم العروض الحية للعرضة وتجارب السيف التفاعلية
      duration: ساعة إلى ساعتين للجلسة
      notes: العرضة فن أداء ثقافي بقدر ما هي مهارة قتالية؛ سيوف خشبية للمبتدئين

    - name: الرماية التقليدية (الرمي بالقوس)
      description: >
        الرماية الإسلامية بالأقواس التقليدية — حث عليها الحديث الشريف صراحةً ("علموا أولادكم السباحة
        والرماية وركوب الخيل" — رواه البيهقي). تشمل الوقوف والشد والتصويب والإطلاق.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: نادي الرماء للرماية
        area: حي العزيزية، مكة المكرمة
        notes: مضمار داخلي بخيارات أقواس تقليدية وحديثة؛ جلسات مبتدئة متاحة
      - name: الأندية التابعة لاتحاد الرماية السعودي
        area: جدة والطائف (راجع موقع الاتحاد للأندية في منطقة مكة)
        url: https://saaf.sa
        notes: تدريب معتمد؛ تأجير المعدات مشمول للمبتدئين
      - name: مضمار الرماية — مدينة الطائف الرياضية
        area: مدينة الطائف الرياضية، الطائف
        notes: مضمار خارجي بمسافات أطول؛ مناسب للرماة المتوسطين والمتقدمين
      duration: ساعة إلى ساعتين للجلسة
      equipment_provided: true
      notes: لا تشترط خبرة مسبقة؛ حذاء مغلق مطلوب؛ خاتم الإبهام (الزهگير) يُستخدم في أسلوب الرماية الإسلامية

    - name: ركوب الجمل
      description: >
        ركوب "سفينة الصحراء" — تجربة بدوية أيقونية وحيوان عميق الرمزية في الثقافة الإسلامية.
        تشمل الصعود والتوجيه الأساسي وجولات قصيرة.
      skill_levels:
      - مبتدئ
      businesses:
      - name: مزرعة الجمال البادية
        area: أطراف مكة، حي البادية
        notes: ركوب جمال إرشادي على مسارات صحراوية؛ جلسات تصوير متاحة
      - name: سفاري الصحراء مكة (مشغلون متعددون)
        area: أطراف مكة الشرقية الصحراوية
        notes: باقات نصف يوم تجمع ركوب الجمال وسيارات الدفع الرباعي وضيافة خيمة بدوية
      - name: تجربة جمال الطائف
        area: الهدا، الطائف
        notes: ركوب جمال في أجواء جبلية خلابة؛ أكثر برودة وراحة من الركوب الصحراوي
      duration: 30 دقيقة إلى ساعتين
      notes: ارتدِ ملابس محتشمة ومريحة؛ الجمل يجثو للركوب؛ الأدلاء يساعدون الراكبين لأول مرة

    - name: الصقارة (الصقر)
      description: >
        الفن العربي العريق في تدريب الصقور وتحليقها للصيد — تراث ثقافي غير مادي مدرج في قائمة
        اليونسكو. تشمل التعامل وتدريب المجثم وجلسات الطيران الحر القصيرة مع الطيور المدربة.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: نادي الصقور السعودي (جدة)
        area: جدة، نحو 80 كم من مكة
        url: https://sfc.org.sa/sa/en
        notes: جلسات صقارة تمهيدية؛ صقور ساكر وشاهين مدربة؛ المدربون يرشدون المبتدئين
      - name: مركز تراث الصقارة السقر
        area: أطراف الطائف
        notes: يجمع عرض الصقارة مع التجربة الثقافية البدوية؛ حجوزات جماعية وخاصة
      - name: مهرجان الملك عبدالعزيز للصقور (موسمي)
        area: متغير (الحدث الرئيسي في الرياض؛ أحداث إقليمية في منطقة مكة والطائف)
        notes: مهرجان وطني سنوي بمسابقات ومعارض وعروض عامة
      duration: ساعة إلى ثلاث ساعات
      notes: قفاز جلدي سميك مرفق؛ يُنصح بأكمام طويلة؛ الصقور تستجيب للهدوء والبطء

    - name: المصارعة التقليدية (المصارعة العربية)
      description: >
        المصارعة العربية الكلاسيكية — رياضة إمساك أرضية كانت القبائل البدوية تمارسها تاريخياً.
        تركز على التوازن والرافعة والإسقاطات المضبوطة.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: نادي مكة الرياضي
        area: حي العزيزية، مكة المكرمة
        address: طريق الملك عبدالعزيز، العزيزية، مكة المكرمة
        notes: نادي رياضي عام يقدم رياضات قتالية تقليدية وحديثة؛ جلسات تدريب بمدربين متمرسين
      - name: نادي الوحدة الرياضي
        area: حي الظاهر، مكة المكرمة
        notes: نادي مجتمعي بمرافق متكاملة؛ بيئة مناسبة للمبتدئين
      duration: ساعة إلى ساعة ونصف للجلسة
      notes: ارتدِ ملابس رياضية مريحة؛ لا أحذية على الحصيرة

    - name: حرفة الخنجر العربي
      description: >
        ورشة للتعرف على تاريخ ورمزية وصناعة الخنجر العربي التقليدي (الخنجر/الجنبية).
        تشمل نحت المقبض وزخرفة الغمد.
      skill_levels:
      - مبتدئ
      businesses:
      - name: ورش الحرف التراثية — هيئة التراث السعودي
        area: مركز التراث بمكة وحي البلد بجدة
        url: https://heritage.moc.gov.sa/en
        notes: ورش حرف موسمية حول الأسلحة والمجوهرات العربية التقليدية
      - name: بسطات حرفيي سوق الزل
        area: حي المعلا، مكة المكرمة
        notes: يعرض أحياناً الحرفيون المهرة صناعة الخنجر؛ قطع زخرفية للشراء
      duration: ساعتان إلى ثلاث ساعات (صيغة ورشة)
      notes: تركيز حرفي تام دون عنصر قتالي؛ الخناجر الزخرفية تذكارات ذات قيمة

    - name: السباحة والرياضات المائية
      description: >
        حث النبي صلى الله عليه وسلم على تعلم السباحة. يوفر ساحل البحر الأحمر بجدة (80 كم) غوصاً
        وسباحة وركوب موجات بمياه دافئة وصافية.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: نادي اليخت بجدة
        area: الكورنيش، جدة
        address: الحمراء، كورنيش جدة
        notes: سباحة وتجديف وإبحار؛ منفذ على البحر الأحمر؛ اشتراك يومي متاح
      - name: دايف جدة
        area: الكورنيش، جدة
        notes: مركز غوص معتمد PADI؛ دورات غطس استكشافي للمبتدئين وغطسات شعاب مرجانية إرشادية
      - name: منتزه الشلال المائي (مسبح داخلي)
        area: طريق الكورنيش، جدة
        notes: حديقة مائية داخلية وخارجية كبيرة؛ مناسبة للعائلات وغير السباحين
      duration: نصف يوم إلى يوم كامل
      notes: ملابس سباحة محتشمة مطلوبة في الأماكن العامة؛ مسابح خاصة أو مفصولة متاحة

    - name: الجوجيتسو السعودي (SJJ)
      description: >
        انتشر الجوجيتسو السعودي انتشاراً واسعاً في المملكة. يجمع الإمساك الأرضي والخنق وأقفال
        المفاصل والرمي. تستضيف المملكة بطولات دولية كبرى وتدعمها على المستوى الاتحادي.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: أكاديمية اتحاد الجوجيتسو السعودي (مكة)
        area: حي العزيزية، مكة المكرمة
        url: http://saudijjf.com
        notes: دروس بالغي وبدون غي للمبتدئين؛ مدربون معتمدون؛ حصة تجريبية مجانية في الغالب
      - name: أكاديمية الهلال الرياضية
        area: جدة (80 كم من مكة)
        notes: منهج BJJ وSJJ متكامل؛ دروس تحضير للمسابقات متاحة
      - name: غريسي جدة
        area: حي الروضة، جدة
        notes: تدريس بمعايير دولية؛ مناهج عائلة غريسي
      duration: ساعة إلى ساعة ونصف للحصة
      equipment_provided: false
      notes: أحضر غي أو استأجر؛ تقليم الأظافر والنظافة الشخصية إلزامية

    - name: تدريب الرمح والترس (الحربة)
      description: >
        فن حرب عربي قديم يستخدم الرمح الطويل التقليدي (الحربة) والترس الجلدي الدائري (التُرس).
        يُعلَّم كفن قتال ثقافي وانضباط بدني.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: ورش الفنون القتالية — هيئة التراث السعودي
        area: مركز التراث بمكة
        url: https://heritage.moc.gov.sa/en
        notes: جلسات موسمية؛ رماح خشبية للتدريب لأغراض السلامة
      - name: جلسات تدريب فرقة العرضة الثقافية
        area: ساحات مهرجان جدة التراثية
        notes: ورش جماعية جنباً إلى جنب مع تدريب السيف والإيقاع
      duration: ساعة إلى ساعتين
      notes: حشوات واقية مرفقة؛ تختتم الجلسات في الغالب بأداء عرضة جماعية

    - name: قيادة السيارات على الكثبان الرملية والطرق الوعرة
      description: >
        قيادة سيارات الدفع الرباعي على الكثبان الرملية المحيطة بمكة المكرمة — نشاط ترفيهي سعودي
        محبب في عطلات نهاية الأسبوع يجمع الإثارة مع استكشاف المشهد البدوي.
      skill_levels:
      - مبتدئ (راكب)
      - متوسط
      - متقدم
      businesses:
      - name: شركة سفاري مكة الصحراوية
        area: أطراف مكة الشرقية الصحراوية
        notes: باقات كاملة تشمل القافلة الرباعية وركوب الألواح الرملية وركوب الجمال وعشاء تحت النجوم
      - name: نادي الطرق الوعرة السعودي (فرع جدة)
        area: جدة والمناطق الصحراوية المحيطة
        notes: مجموعة مجتمعية تنظم رحلات صحراوية منظمة؛ الزوار أهلاً بمسبق التواصل
      duration: ثلاث إلى ست ساعات (باقات نصف يوم أو يوم كامل)
      notes: مركبات وسائقون للمبتدئين؛ أحضر واقٍ شمس ونظارة وشماغ للغبار؛ المساء أفضل درجات الحرارة

  modern_sports_and_fitness:
    description: >
      منشآت رياضية حديثة وأكاديميات فنون قتالية ومراكز لياقة في مكة مع خيارات في جدة والطائف
      للأنشطة المتخصصة.
    items:
    - name: كرة القدم
      description: >
        الرياضة الأكثر شعبية في المملكة. ملاعب عامة ومراكز خماسية وملاعب كاملة الحجم متاحة
        في مكة للعب الترفيهي والتنافسي.
      businesses:
      - name: استاد مكة (ملعب الأمير عبدالله الفيصل)
        area: حي العزيزية، مكة المكرمة
        address: طريق الملك عبدالعزيز، مكة المكرمة
        notes: مقر نادي اتحاد مكة؛ راجع جدول المباريات؛ مشاهدة مباراة دوري يُعدّ تجربة ثقافية نابضة
      - name: مراكز فوت زون الخماسية
        area: مواقع متعددة في مكة المكرمة
        notes: إيجار ملاعب بالساعة؛ عشب صناعي مضاء؛ تأجير معدات متاح
      - name: المجمع الرياضي بالعزيزية
        area: حي العزيزية، مكة المكرمة
        notes: ملاعب طبيعية وصناعية كاملة الحجم؛ غرف تغيير ودش
      notes: أحضر أو استأجر بوط؛ الماء ضروري؛ تجنب اللعب وقت منتصف النهار

    - name: كرة السلة
      description: رياضة سريعة النمو في المملكة بملاعب عالية الجودة في أنحاء مكة.
      businesses:
      - name: ملاعب كرة السلة — نادي مكة الرياضي
        area: حي العزيزية، مكة المكرمة
        notes: ملاعب داخلية؛ جلسات مفتوحة ومباريات دوري؛ ترحيب بالزوار
      - name: الملاعب العامة — المجمع الرياضي الملك فهد
        area: مكة المكرمة
        notes: ملاعب خارجية مجانية؛ مباريات محلية نشطة أغلب الأمسيات
      notes: الملاعب مكتظة في الغالب بعد صلاة العصر حتى وقت متأخر من الليل

    - name: التنس
      description: متاح في الفنادق الكبرى والأندية الرياضية في مكة والطائف.
      businesses:
      - name: منشأة التنس — فيرمونت مكة
        area: مجمع أبراج البيت، مكة المكرمة
        notes: ملاعب لنزلاء الفندق؛ تدريب متاح عند الطلب
      - name: نادي تنس الطائف
        area: مدينة الطائف الرياضية، الطائف
        notes: ملاعب خارجية وداخلية؛ جلسات تدريبية؛ مناخ الجبل الأكثر برودة مثالي
      - name: ملاعب التنس — المجمع الرياضي بالعزيزية
        area: العزيزية، مكة المكرمة
        notes: ملاعب عامة؛ تأجير مضارب متاح
      notes: احجز الملاعب مسبقاً؛ جلسات الصباح الباكر أو المساء مُوصى بها

    - name: فنون القتال المختلطة (MMA)
      description: >
        شهدت فنون القتال المختلطة نمواً متسارعاً في المملكة بعد إصلاحات رؤية 2030. تستضيف المملكة
        الآن فعاليات UFC والملاكمة الكبرى. الأكاديميات في مكة وجدة تقدم ضرب وإمساك.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: أكاديمية اتحاد MMA السعودي (مكة)
        area: حي العزيزية، مكة المكرمة
        notes: أكاديمية تابعة للاتحاد الرسمي؛ دروس ضرب ومصارعة وإمساك؛ المبتدئون أهلاً
      - name: إليفيشن MMA (جدة)
        area: حي الروضة، جدة
        notes: منهج MMA كامل يشمل المواي تاي والملاكمة والبراجيليان جوجيتسو والمصارعة
      - name: أرينا MMA أكاديمي (جدة)
        area: جدة
        notes: جيم مجهز جيداً؛ مساحة حصيرة واسعة؛ مسابقات داخلية منتظمة
      duration: ساعة إلى ساعة ونصف للحصة
      notes: واقي الفم وواقي الفخذ موصى بهما للجلسات التدريبية

    - name: صالات اللياقة البدنية ومراكز الفتنس
      description: منشآت لياقة حديثة لرفع الأثقال والكارديو ودروس المجموعات.
      businesses:
      - name: فتنس تايم (فروع مكة)
        area: مواقع متعددة — العزيزية والنسيم ومنطقة أبراج البيت
        url: https://www.fitnesstime.com.sa/en-us
        notes: أكبر سلسلة جيم في المملكة؛ اشتراكات يومية وشهرية؛ معدات حديثة
      - name: جولدز جيم مكة
        area: حي العزيزية، مكة المكرمة
        url: https://www.ggarabia.com/en
        notes: علامة تجارية دولية؛ أثقال وكارديو ودروس لياقة جماعية
