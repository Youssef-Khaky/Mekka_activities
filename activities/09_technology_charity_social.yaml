# التقنية والمبادرات الخيرية والتواصل المجتمعي

activities:
  technology_and_digital:
    description: >
      تجارب رقمية وتقنية تُثري رحلة الزائر إلى مكة المكرمة — من تطبيقات الحج الذكية إلى
      جولات المدينة الإلكترونية ومراكز الابتكار ضمن إطار رؤية 2030.
    items:
    - name: تطبيق نُسُك — المرافق الرسمي للحج والعمرة
      description: >
        التطبيق الرسمي لوزارة الحج والعمرة — يتيح استخراج التصاريح وحجز الأماكن وتتبع مناسك
        الحج ومشاركة خدمات الترجمة الفورية وخرائط المشاة داخل منطقة الحرم.
      platform: iOS وAndroid
      url: https://www.nusuk.sa
      notes: >
        متاح بعشرات اللغات؛ يُفضَّل التسجيل قبل السفر؛ يحتوي على إرشادات الطوارئ
        ومواقع الخدمات الصحية

    - name: الجولة الافتراضية للمسجد الحرام
      description: >
        جولة تفاعلية ثلاثية الأبعاد تُتيح استكشاف طبقات المسجد الحرام عبر الهاتف أو الحاسب —
        مفيدة للتخطيط المسبق لمسار العبادة واستيعاب التاريخ المعماري للحرم.
      platform: متصفح الإنترنت وتطبيق الواقع الافتراضي
      url: https://www.haram.net
      notes: >
        مثالية للمعاقين حركياً أو المسنّين الراغبين في التخطيط؛ توفر طبقات تاريخية
        للتوسعات من العهد العثماني حتى اليوم

    - name: مركز ابتكار مكة (رؤية 2030)
      description: >
        فضاء ابتكاري يعرض مشاريع تقنية تُطوَّر لخدمة الحج والعمرة — الذكاء الاصطناعي في
        إدارة الحشود والطاقة المتجددة وإنترنت الأشياء لتأمين ماء زمزم وغيرها من مبادرات التقنية الخضراء.
      location:
        name: مركز ابتكار مكة المكرمة
        area: حي النزهة، مكة المكرمة
      notes: >
        زيارات مجدولة للمجموعات؛ التواصل مع أمانة العاصمة المقدسة للحجز؛ تقديم عروض
        باللغتين العربية والإنجليزية

    - name: خريطة مكة الذكية (Smart Makkah)
      description: >
        منصة رقمية تفاعلية تُدمج خرائط المدينة الحية بتوقعات الازدحام وأوقات الصلاة ومواقع
        الخدمات وأقرب نقاط الإسعاف — تُساعد الحجاج على التخطيط الآمن للتنقل.
      platform: iOS وAndroid والمتصفح
      url: https://www.makkahhc.sa
      notes: >
        تُحدَّث بيانات الازدحام في الوقت الفعلي؛ واجهة عربية وإنجليزية؛ تشمل تنبيهات
        الطقس والحرارة ومستوى الخدمات

    - name: برنامج توثيق التراث الرقمي (مشروع أمانة مكة)
      description: >
        مبادرة رسمية لمسح وتوثيق المباني التاريخية بتقنية ليدار ثلاثية الأبعاد وصور الأقمار
        الاصطناعية — تُتيح للزائرين الوصول إلى أرشيف رقمي للمعالم قبل هدمها أو تجديدها.
      location:
        name: مركز التوثيق الرقمي — أمانة العاصمة المقدسة
        area: مكة المكرمة
      url: https://www.makkah.gov.sa
      notes: >
        الأرشيف متاح للباحثين والزوار عبر البوابة الإلكترونية؛ يضم آلاف الصور التاريخية
        والخرائط من القرن الثامن عشر حتى الحاضر

  charity_and_sadaqah:
    description: >
      فرص العطاء والصدقة الجارية في أقدس بقاع الأرض — الصدقة في مكة لها مكانة خاصة في
      الإسلام؛ ونفقة واحدة بالحرم تعادل مئة ألف نفقة في غيره (كما ورد في الحديث الشريف).
    items:
    - name: إطعام الحجاج والمعتمرين
      description: >
        المشاركة في مبادرات توزيع الطعام على الحجاج والمعتمرين — إفطار رمضاني أو وجبات
        يومية أو بسطات تمر وماء زمزم عند أبواب المسجد الحرام.
      businesses:
      - name: مبادرة "أطعمنا" — برنامج وزارة الحج
        area: ضواحي المسجد الحرام والأفنية الخارجية
        url: https://www.haj.gov.sa
        notes: يمكن التبرع نقداً أو عيناً؛ تنظيم المبادرة عبر الموقع الرسمي
      - name: جمعية البر الخيرية بمكة
        area: حي العزيزية، مكة المكرمة
        notes: تقبل التبرعات العينية والنقدية؛ توزع الطعام يومياً؛ تبحث عن متطوعين للتوزيع
      - name: مطابخ الحرمين (خيرية)
        area: شارع أجياد، مكة المكرمة
        notes: مطابخ خيرية تُعدّ آلاف الوجبات يومياً؛ قبول التبرعات المالية والعينية

    - name: الصدقة الجارية — الوقف الإسلامي
      description: >
        الإسهام في مشاريع الوقف الإسلامي ذات الأثر الممتد — بناء مسجد أو بئر أو مدرسة أو
        طباعة مصاحف أو دعم طالب علم شرعي في مكة.
      businesses:
      - name: هيئة الأوقاف السعودية (منصة وقف)
        url: https://www.awqaf.gov.sa
        notes: منصة رسمية لاستثمار أموال الوقف؛ مشاريع موثقة وشفافية مالية كاملة
      - name: مؤسسة الحرمين الإسلامية
        url: https://www.haramain.org
        notes: طباعة مصاحف وترجمتها؛ دعم حلقات التحفيظ؛ آبار مياه في أفريقيا وآسيا
      - name: رابطة العالم الإسلامي — الأمانة العامة
        area: مكة المكرمة، ملتقى رابطة العالم الإسلامي
        url: https://www.themwl.org
        notes: مبادرات دولية؛ دعم المسلمين الجدد؛ مشاريع تعليمية في البلدان النامية

    - name: توزيع المصاحف الكريمة
      description: >
        التبرع بمصاحف أو الإسهام في طباعتها وتوزيعها مجاناً على الحجاج والزوار — مجمع الملك
        فهد يطبع ملايين النسخ سنوياً وتوزّع مجاناً من خلال قنوات متعددة.
      location:
        name: مجمع الملك فهد لطباعة المصحف الشريف
        area: المدينة المنورة (55 كم من مكة عبر طريق الحج)
        url: https://qurancomplex.gov.sa
      notes: >
        يمكن حجز جولة في المجمع لمشاهدة الطباعة والتجليد؛ التبرع المالي لدعم الطباعة
        يتم عبر الموقع الرسمي

    - name: الزكاة وصندوق إعانة الحجاج المعسرين
      description: >
        إيداع زكاة المال أو التبرع لإعانة الحجاج المعسرين الذين لا يملكون ثمن تذاكر الحج —
        يُيسَّر لهم السفر عبر برامج رسمية تموّل من تبرعات المحسنين.
      businesses:
      - name: صندوق إعانة الحجاج — هيئة الحج
        url: https://www.haj.gov.sa
        notes: إيداع الزكاة وصدقة التطوع؛ كشوف توزيع شهرية؛ برنامج مدعوم حكومياً
      - name: إدارة الزكاة والدخل — مكة المكرمة
        area: مبنى الضرائب والزكاة، حي العزيزية
        notes: دفع الزكاة للجهات الرسمية وتوزيعها بعدالة على المستحقين في المنطقة

    - name: الكسوة — التبرع لتكسية الكعبة المشرفة
      description: >
        معرفة مشروع كسوة الكعبة والإسهام في دعمه — تُصنع الكسوة بيد عاملة سعودية متخصصة
        من الحرير الطبيعي والخيوط الذهبية في مصنع مخصص بمكة المكرمة.
      location:
        name: مصنع كسوة الكعبة المشرفة
        area: حي أم الجود، مكة المكرمة
        coordinates: 21.3763° N, 39.8156° E
      notes: >
        زيارة المصنع متاحة بتنسيق مسبق مع وزارة الحج؛ التبرع لدعم مشروع الكسوة
        عبر البوابة الرسمية للوزارة

  social_and_community:
    description: >
      فرص التواصل الإنساني والتبادل الثقافي في ملتقى المسلمين من شتى أنحاء العالم — مكة المكرمة
      أكثر مدن الأرض تنوعاً في مواسم الحج والعمرة إذ تستضيف حجاجاً من 180+ دولة.
    items:
    - name: حلقات التعارف الدولية في المسجد الحرام
      description: >
        التواصل العفوي مع الحجاج والمعتمرين من مختلف الجنسيات — كل ركن من أركان المسجد الحرام
        يكاد يكون عالماً متكاملاً؛ الجلوس بجوار حجاج آخرين وتبادل القصص والتجارب الروحية.
      location:
        name: المسجد الحرام وأفنيته
        area: منطقة الحرم، مكة المكرمة
      notes: >
        أحضر بطاقات تعريفية أو جاهز لتبادل أرقام الواتساب؛ اللغة العربية تجمع معظم المسلمين
        ولو بضع كلمات؛ الإشارات الجسدية والبسمة لغة عالمية

    - name: ملتقيات الأخوة الإسلامية الدولية
      description: >
        اللقاءات المنظمة التي تجمع المسلمين من جنسيات مختلفة لتبادل التجارب الدينية والثقافية —
        تُنظمها بعض السفارات ومنظمات الحج الدولية خلال موسمي الحج والعمرة.
      businesses:
      - name: مراكز خدمة الحجاج الدولية — وزارة الحج
        area: مكة المكرمة وأرجاء مسار الحج
        url: https://www.haj.gov.sa
        notes: تقدم خدمات بأكثر من 50 لغة؛ تيسير التواصل بين الحجاج ذوي الاحتياجات الخاصة
      - name: الرابطة الدولية للحج الإسلامي (IIRO)
        area: شارع الملك عبدالعزيز، مكة المكرمة
        url: https://www.iirosa.org
        notes: برامج للحجاج الجدد؛ دعم الأسر المنفصلة في الحشود؛ جلسات توعية دينية

    - name: برامج الصداقة اللغوية (Language Buddy)
      description: >
        الانضمام إلى مبادرات تبادل اللغات بين المسلمين — ناطقو العربية يُساعدون غير العرب
        وبالمقابل يتعلمون لغاتهم؛ إثراء متبادل وجسور ثقافية حية.
      businesses:
      - name: برنامج مرشد الحاج — الجمعية الإسلامية السعودية
        area: المدارس الدينية المحيطة بالمسجد الحرام
        notes: متطوعون عرب وغير عرب يُقدمون المساعدة؛ التسجيل عبر مكاتب الوزارة
      - name: منتديات مكة الإلكترونية (واتساب وتيليغرام)
        notes: مجموعات دولية للحجاج لكل جنسية تقريباً؛ البحث في المتاجر الرقمية باسم "Hajj group [دولتك]"
      duration: طوال الإقامة
      notes: حسن النية أساس كل لقاء؛ الصبر على الحواجز اللغوية جزء من تجربة التنوع

    - name: زيارة المجتمعات العلمية (حلقات الشيوخ)
      description: >
        حضور حلقات علمية يعقدها علماء من مختلف الدول حول المسجد الحرام — دروس في الفقه
        والحديث والتفسير يحضرها طلاب علم من عشرات الجنسيات.
      location:
        name: المسجد الحرام — أعمدة متعددة وأروقة المسجد
        area: منطقة الحرم، مكة المكرمة
      notes: >
        حلقات ثابتة بعد الفجر والمغرب والعشاء؛ علماء الحرمين يُدرِّسون باللغة العربية؛
        بعض العلماء الدوليين يُدرِّسون بلغات أخرى؛ يُنصح بالجلوس مع مجموعة تتكلم لغتك

    - name: مساجد الجاليات الإسلامية الدولية في مكة
      description: >
        العديد من المساجد والمراكز الإسلامية في مكة تخدم جاليات بعينها — المجتمعات الإندونيسية
        والماليزية والتركية والباكستانية والأفريقية لها تجمعاتها الثقافية الخاصة.
      businesses:
      - name: المركز الإندونيسي الإسلامي بمكة
        area: حي العزيزية، مكة المكرمة
        notes: برامج باللغة الإندونيسية؛ دعم للحجاج الإندونيسيين؛ مطعم مأكولات جنوب شرق آسيا
      - name: المركز الثقافي الماليزي
        area: منطقة الحرم، مكة المكرمة
        notes: مكتبة إسلامية ماليزية؛ برامج تعليمية للأطفال؛ خدمات للحجاج الماليزيين
      - name: مركز التراث الإسلامي الأفريقي
        area: حي الهجرة، مكة المكرمة
        notes: تجمع مجتمعات أفريقية متنوعة؛ موسيقى روحانية تقليدية وتعليم ديني
      notes: التواصل مع هذه المراكز يفتح نوافذ على إسلام عالمي ثري ومتنوع

    - name: الإرشاد السياحي الطوعي للحجاج
      description: >
        الانضمام كمرشد سياحي متطوع لمساعدة الحجاج الجدد على فهم المناسك والتنقل في المدينة —
        تجربة مُعطاء تُعمّق الفهم الشخصي للشعائر وتُقوّي الروابط الإنسانية.
      businesses:
      - name: برنامج المرشد المتطوع — وزارة الحج والعمرة
        url: https://www.haj.gov.sa
        notes: يتطلب اجتياز دورة تدريبية مُعتمدة؛ التسجيل قبل بدء الموسم بأشهر؛ مفتوح لمن يُجيدون لغتين أو أكثر
      - name: مبادرة "دليلك" — شباب مكة المتطوعون
        area: المسجد الحرام وأفنيته ومحطات المترو
        notes: مبادرة شبابية؛ تواصل عبر تطبيق نُسُك أو مكاتب الوزارة في الميدان
