# الصدقة والتجارب الرقمية وتعلم اللغة العربية

activities:
  charity_and_giving:
    description: >
      فرص العطاء والعمل الخيري في مكة المكرمة — من توزيع الطعام ودفع الزكاة إلى دعم
      المشاريع الإنسانية. مكة المكرمة وجهة استثنائية للصدقة الجارية والعطاء المنظم.
    items:
    - name: دفع الزكاة عبر هيئة الهلال الأحمر السعودي
      description: >
        أداء زكاة المال عبر القنوات الرسمية المعتمدة لضمان وصولها إلى مستحقيها.
        الهلال الأحمر السعودي يتولى توزيع الزكاة على الفقراء والمساكين والمستحقين.
      location:
        name: مراكز الهلال الأحمر السعودي
        area: فروع في مكة المكرمة والحرم
        address: طريق الملك عبدالعزيز، مكة المكرمة
      url: https://srca.org.sa
      notes: يمكن الدفع إلكترونياً عبر التطبيق أو عند المراكز؛ تُوفَّر إيصالات رسمية؛ شروط النصاب متاحة عبر الموقع

    - name: إطعام الحجاج والفقراء
      description: >
        المشاركة في مشاريع إطعام الحجاج والمحتاجين — سواء بالتبرع المالي أو بالتطوع المباشر
        في توزيع وجبات الإفطار والسحور وطعام المشاة حول المسجد الحرام.
      location:
        name: مطابخ الحرمين الشريفين ومراكز التوزيع
        area: منطقة الحرم ومحيطه، مكة المكرمة
      businesses:
      - name: مؤسسة مكة للرعاية الإنسانية
        area: حي العزيزية، مكة المكرمة
        notes: تنظم حملات إطعام يومية؛ تقبل التبرعات العينية والنقدية؛ تتيح التطوع في خطوط التوزيع
      - name: جمعية البر الخيرية بمكة
        area: وسط مكة المكرمة
        notes: أقدم جمعيات الإغاثة بمكة؛ تُوزع وجبات ساخنة في المناسبات الدينية والمواسم
      notes: الإطعام في موسم الحج والعمرة من أجزل القربات؛ يُنصح بالتواصل مع الجمعيات مسبقاً لتنظيم المشاركة

    - name: التبرع لصندوق كسوة الكعبة
      description: >
        المساهمة في تمويل كسوة الكعبة المشرفة (الغطاء الأسود المطرز بالذهب) التي تُبدَّل
        سنوياً يوم عيد الأضحى. يُعدّ التبرع لهذا المشروع من أشرف أعمال البر.
      location:
        name: هيئة الكسوة السعودية — مجمع الملك عبدالعزيز لكسوة الكعبة
        area: حي أم الجود، مكة المكرمة
        coordinates: 21.3964° N, 39.8454° E
        address: طريق الملك عبدالعزيز، أم الجود، مكة المكرمة
      notes: يمكن زيارة مجمع الكسوة وتوزيع الجزء الزائر من الكسوة القديمة؛ التبرع عبر وزارة الحج والعمرة

    - name: التبرع لمشروع سقيا الحجاج
      description: >
        تمويل توفير مياه الشرب والمياه الباردة للحجاج والمعتمرين في المسجد الحرام والمشاعر
        المقدسة. أجر الماء للحاج والمعتمر من أعظم الصدقات الجارية في الإسلام.
      businesses:
      - name: مؤسسة رعاية الحرمين
        area: مكة المكرمة
        url: https://haramain.gov.sa
        notes: الجهة الرسمية المشرفة على خدمات زمزم وسقيا الحجاج؛ التبرع عبر الموقع الرسمي
      - name: الهيئة العامة للإحصاء الزكوي (وزارة المالية)
        notes: حسابات الزكاة الرسمية وقنوات التحويل المعتمدة
      notes: صدقة جارية تجري أجرها ما دام الحجاج يشربون؛ مبالغ رمزية كافية

    - name: التطوع في خدمة ضيوف الرحمن
      description: >
        التطوع في دلالة الحجاج وإرشادهم ومساعدة كبار السن وذوي الاحتياجات الخاصة
        أثناء أداء مناسكهم. من أعظم أوجه العبادة العملية في مكة المكرمة.
      location:
        name: المسجد الحرام والمشاعر المقدسة
        area: منطقة الحرم ومنى وعرفات
      businesses:
      - name: برنامج الخدمة الوطنية التطوعية — وزارة الحج والعمرة
        url: https://www.haj.gov.sa
        notes: التسجيل الإلكتروني قبل الموسم؛ تدريب ودورات تأهيلية مقدمة مجاناً
      - name: التطوع عبر منصة نطوع
        url: https://www.natawwau.com
        notes: منصة وطنية للتطوع؛ تتيح تسجيل مشاريع التطوع في مكة المكرمة وما حولها
      notes: يُفضَّل التسجيل المسبق قبل موسم الحج بشهرين على الأقل؛ اللغة العربية ميزة

  digital_modern_experiences:
    description: >
      التجارب الرقمية والتفاعلية الحديثة المتاحة في مكة المكرمة — من التطبيقات الذكية والجولات
      الافتراضية إلى المتاحف التفاعلية ومراكز البيانات التاريخية.
    items:
    - name: تطبيق نُسُك (Nusuk) الرسمي
      description: >
        تطبيق وزارة الحج والعمرة الرسمي — يوفر خرائط تفاعلية للمسجد الحرام والمشاعر،
        وجداول الحافلات، ومتابعة الازدحام الآني، وإرشادات المناسك خطوة بخطوة.
      platform: iOS وAndroid
      url: https://www.nusuk.sa
      notes: >
        الأداة الأساسية للحاج والمعتمر في مكة؛ التنزيل مجاني؛ تتوفر نسخ بعدة لغات؛
        تشمل: خريطة أبواب المسجد، توقيت الأذان، حالة الطقس، إنذارات مبكرة للازدحام

    - name: الجولة الافتراضية لمجمع الكسوة
      description: >
        زيارة مجمع صناعة كسوة الكعبة المشرفة (أم الجود) ومشاهدة صنع النسيج المطرز
        بالذهب والفضة — أحد أندر الحرف في العالم الإسلامي.
      location:
        name: مجمع الملك عبدالعزيز لكسوة الكعبة المشرفة
        area: أم الجود، مكة المكرمة
        coordinates: 21.3964° N, 39.8454° E
        address: طريق الملك عبدالعزيز، أم الجود، مكة المكرمة
      duration: ساعة إلى ساعتين
      notes: >
        الزيارة الميدانية متاحة بتنسيق مسبق مع وزارة الحج والعمرة؛ الجولة الافتراضية
        متاحة عبر الموقع الرسمي لهيئة الرئاسة العامة لشؤون المسجد الحرام والمسجد النبوي

    - name: تطبيق وجهة مكة (Destination Makkah)
      description: >
        دليل رقمي شامل يضم الأماكن السياحية والمطاعم وخدمات النقل والمعالم التاريخية
        مع خرائط بلا اتصال إنترنت — مثالي للتجوال المستقل.
      platform: iOS وAndroid
      notes: خرائط تفاعلية؛ تقييمات المستخدمين؛ أدلة صوتية للمواقع التاريخية؛ متاح بالعربية والإنجليزية والأردية

    - name: معرض رقمي — متحف التراث الحجازي
      description: >
        تجربة رقمية تفاعلية تعيد بناء مكة المكرمة التاريخية بتقنية الواقع المعزز (AR)
        والعروض الهولوغرافية — من مكة ما قبل الإسلام إلى توسعات القرن العشرين.
      location:
        name: متحف التراث الحجازي (يُعمل به)
        area: حي العدل / حي الشبيكة، مكة المكرمة
      businesses:
      - name: هيئة التراث السعودي — البوابة الرقمية
        url: https://heritage.moc.gov.sa/en
        notes: عروض بصرية وتفاعلية وأرشيف صور نادرة من مكة في القرنين التاسع عشر والعشرين
      notes: تحقق من الجدول الزمني لافتتاح المتحف؛ بعض المحتوى الرقمي متاح على الموقع دون زيارة

    - name: منصة هواتف الزمزم الذكية
      description: >
        أجهزة الإيفاء الذكية لماء زمزم المنتشرة في المسجد الحرام — تعمل بالمسح الرقمي
        وتتتبع كميات الشرب وتوفر معلومات عن جودة المياه لحظياً.
      location:
        name: محطات الإيفاء الذكية — داخل المسجد الحرام
        area: ممرات الطابق الأرضي والطوابق العليا
      notes: مبادرة رقمية لتحديث تجربة شرب زمزم؛ تقنية إنترنت الأشياء (IoT) لضمان سلامة المياه

    - name: برنامج إدارة الحشود الذكية بمنى
      description: >
        مشاهدة وتتبع تقنيات إدارة الحشود في جسر الجمرات — من أضخم مشاريع الذكاء
        الاصطناعي لأمن الحشود في العالم. تقنيات يُتعلم منها في الدراسات الهندسية والأمنية.
      location:
        name: جسر الجمرات، منى
        area: منطقة منى، مكة المكرمة
        coordinates: 21.3926° N, 39.8731° E
      notes: >
        الجولات التعليمية للمهندسين والباحثين تحتاج تصاريح من وزارة الحج؛ المعلومات العامة
        متاحة في الدراسات المنشورة لجامعة الملك عبدالعزيز؛ غير متاح للعموم أثناء موسم الحج

  arabic_language_learning:
    description: >
      برامج وكورسات لتعلم اللغة العربية الفصحى والعامية الحجازية — خصيصاً للحجاج والزوار
      الراغبين في تعميق فهمهم للعبادة والتراث والتواصل في مكة المكرمة.
    items:
    - name: دورات عربية مكثفة للحجاج (برنامج مكة)
      description: >
        دورات عربية مصممة للحجاج الأجانب تغطي التحية والأسئلة الضرورية والمفردات الدينية
        الشائعة الاستخدام أثناء أداء المناسك — في أسبوع إلى أسبوعين.
      skill_levels:
      - مبتدئ مطلق
      - متعلم أساسي
      businesses:
      - name: معهد اللغة العربية بجامعة أم القرى
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: >
          برامج مكثفة بأسعار معقولة؛ تقبل الطلاب الدوليين؛ شهادات معتمدة؛ يُفضل التسجيل
          قبل الموسم بشهر على الأقل
      - name: مركز تعليم اللغة العربية للناطقين بغيرها (سعودي)
        area: مكة المكرمة وجدة
        notes: دروس خاصة وجماعية؛ التركيز على العربية الوظيفية للحياة اليومية في المملكة
      duration: أسبوعان إلى ثلاثة أشهر حسب المستوى
      notes: يُسهّل التعلم المسبق قبل السفر بشكل ملحوظ تجربة الحج والعمرة

    - name: تعلم أحكام تجويد القرآن الكريم
      description: >
        تعلم قواعد النطق الصحيح لتلاوة القرآن الكريم على يد شيوخ متخصصين. يُعدّ التجويد
        علماً قائماً بذاته يجمع بين الصوتيات والنبر والمخارج والصفات.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: حلقات التجويد في المسجد الحرام
        area: المسجد الحرام (أقسام متعددة)
        notes: مجانية؛ تحت إشراف إدارة الحرم؛ مفتوحة للرجال والنساء في أقسام منفصلة
      - name: مركز الإتقان لتعليم القرآن الكريم
        area: حي النسيم، مكة المكرمة
        notes: دورات مكثفة للتجويد والحفظ؛ شهادات إجازة للمتقدمين؛ دروس عبر الإنترنت متاحة
      - name: جمعية تحفيظ القرآن الكريم — فرع مكة
        area: أحياء متعددة في مكة المكرمة
        url: https://www.quranmakkah.org
        notes: شبكة واسعة من الحلقات في الأحياء؛ مجانية؛ مناسبة للمقيمين والزوار على حد سواء
      duration: ساعة إلى ساعتين للجلسة
      notes: لا يشترط إتقان العربية للالتحاق بحلقات المبتدئين في التجويد

    - name: دروس الفقه الإسلامي والعبادات العملية
      description: >
        تعلم أحكام الحج والعمرة والطهارة والصلاة من علماء متخصصين — مع التطبيق الميداني
        المباشر أثناء أداء المناسك. يجمع بين الجانب النظري والعملي في بيئة فريدة.
      businesses:
      - name: دار الحديث الخيرية
        area: بالقرب من المسجد الحرام، مكة المكرمة
        notes: دروس فقه وحديث لمستويات متعددة؛ شيوخ متخصصون؛ أقسام منفصلة للرجال والنساء
      - name: مركز الحرمين للدراسات الإسلامية
        area: منطقة الحرم، مكة المكرمة
        notes: دورات مكثفة في الفقه والعقيدة والسيرة أثناء موسم الحج؛ لغات متعددة متاحة
      - name: التعليم المفتوح — برامج الحج عبر الإنترنت
        notes: >
          كثير من الدورات تُكتمل قبل الوصول إلى مكة؛ الأكاديمية الإسلامية في سيلانجور (ISRA)
          وبرامج سيكرز غيدانس (SeekersGuidance) متاحة باللغتين العربية والإنجليزية
      duration: ساعة إلى ثلاث ساعات للجلسة
      notes: التعلم المسبق قبل الحج يضاعف الخشوع والاستفادة الروحية

    - name: تعلم الخط العربي للمبتدئين الأجانب
      description: >
        دورة خاصة بالزوار الأجانب تعلمهم كتابة حروف الهجاء العربية واسمهم بخط جميل
        — جلسة واحدة كافية للأساسيات. الخط العربي من أجمل الهدايا الشخصية من رحلة مكة.
      skill_levels:
      - مبتدئ مطلق
      businesses:
      - name: دار الخط الإسلامي
        area: حي العزيزية، مكة المكرمة
        notes: جلسات تعريفية بساعتين خصيصاً للأجانب؛ تأخذ لوحة خطية مُنجزة باسمك
      - name: المركز الثقافي بمكة (دار الثقافة)
        area: حي العدل، مكة المكرمة
        notes: ورش خط للمبتدئين بأسعار رمزية؛ لا تشترط معرفة القراءة والكتابة العربية
      duration: ساعتان للجلسة التعريفية
      supplies_needed:
      - قلم قصبة مبتدئ
      - ورق تمرين
      - حبر خط للمبتدئين
      notes: المستلزمات مرفقة في معظم الجلسات؛ أحضر وعاء صغيراً للحبر الزائد

    - name: الحوسبة اللغوية والترجمة الفورية أثناء الحج
      description: >
        استخدام أدوات الترجمة الفورية والتطبيقات اللغوية لتسهيل التواصل أثناء أداء المناسك
        — من ترجمة الإرشادات إلى الحصول على مساعدة فورية بلغتك الأم.
      apps_recommended:
      - name: Google Translate (الترجمة الفورية)
        notes: يدعم التعرف على النص العربي بالكاميرا؛ ترجمة الإشارات والكتيبات
      - name: تطبيق نُسُك (Nusuk)
        notes: إرشادات المناسك بعدة لغات؛ الأردية والإنجليزية والبنغالية والفرنسية
      - name: TarjimApp (ترجيم)
        notes: >
          خدمة ترجمة بشرية فورية عبر الهاتف — تربطك بمترجم حي خلال ثوانٍ؛
          مثالية للمواقف الطارئة والمعاملات الرسمية
      notes: >
        التطبيقات اللغوية تُقلّل القلق وتجعل تجربة الحج أكثر ثقةً — خاصة للحجاج القادمين
        من آسيا وأفريقيا وأوروبا لأول مرة
