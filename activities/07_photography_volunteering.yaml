# مواقع التصوير الفوتوغرافي وفرص التطوع والخدمة

activities:
  photography_spots:
    description: >
      مواقع أيقونية في مكة المكرمة وما حولها تتيح فرصاً فوتوغرافية استثنائية — من عظمة المسجد
      الحرام إلى مناظر الجبال الشاسعة والمشهد الصحراوي الذهبي. احترم أوقات الصلاة وجيرانك
      من المصلين دائماً أثناء التصوير.
    items:
    - name: منصة المراقبة في برج أبراج البيت
      description: >
        أعلى نقطة متاحة للعموم في مكة، تتيح منظوراً بانورامياً من الهواء على المسجد الحرام والكعبة
        المشرفة والأفق المدني. على ارتفاع يزيد على 400 متر، لا يُجارى للتصوير الجوي للحرم.
      location:
        name: فيرمونت كلوك رويال تاور — منصة المراقبة
        address: مجمع أبراج البيت، شارع إبراهيم الخليل، مكة المكرمة 24231
        coordinates: 21.4196° N, 39.8262° E
        floor: الدور 76–78
      best_time: ما قبل الفجر وبعد العشاء لإضاءة الكعبة؛ الساعة الذهبية للغروب
      notes: الدخول عبر لوبي الفيرمونت؛ نزلاء الفندق لهم الأولوية؛ الزوار برسوم عند التوفر

    - name: تصوير شروق الشمس من جبل النور
      description: >
        تصوير مكة المكرمة عند الشروق من قمة جبل النور — بانوراما 270 درجة فوق منطقة الحرم
        والتلال المحيطة والسماء الذهبية.
      location:
        name: قمة جبل النور (565 م)
        area: حي النور، نحو 4 كم شمال شرق المسجد الحرام
        coordinates: 21.4572° N, 39.8586° E
      best_time: الوصول قبل 45 دقيقة من الشروق (الفجر)؛ الإضاءة رائعة في الساعة الذهبية
      duration: ساعتان إلى ثلاث ساعات (المشي + التصوير)
      notes: تُبهر صور التعريض الطويل للمسجد الحرام من هذا الارتفاع؛ احمل مصباحاً جبهياً للصعود قبل الفجر

    - name: التصوير الليلي للمسجد الحرام (مستوى المطاف)
      description: >
        تصوير الكعبة المشرفة محاطة بعشرات الآلاف من الحجاج أثناء الطواف ليلاً — من أكثر
        الصور إبهاراً في العالم.
      location:
        name: معارض الدور العلوي وسطح المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      best_time: بعد صلاة العشاء (ساعات التهجد 02:00–04:00 بشكل خاص) لمشاهد حشود درامية
      notes: تصوير الكعبة والحرم للاستخدام الشخصي مسموح؛ عدسة واسعة الزاوية؛ إعدادات ISO عالية للضوء الخافت

    - name: جبل ثور وتلال جنوب مكة
      description: >
        التلال الصحراوية الوعرة جنوب مكة مع جبل ثور بؤرتها. ممتازة للتصوير الطبيعي الذي
        يلتقط تضاريس الحجاز الخام والجيولوجيا القديمة.
      location:
        name: منطقة جبل ثور
        area: جنوب المسجد الحرام، نحو 4.7 كم
        coordinates: 21.3856° N, 39.8192° E
      best_time: الساعة الذهبية (ساعة قبل الغروب)
      notes: أحضر عدسة هاتفية لتفاصيل الجبال البعيدة؛ التضاريس الصخرية تستلزم حذاءً متيناً

    - name: تصوير شوارع مكة القديمة (حي المعلا)
      description: >
        تصوير بقايا أزقة الحي القديم والعمارة الحجازية التقليدية وشاشات الروشان الخشبية
        والحياة اليومية لسكان مكة الدائمين والحجاج.
      location:
        name: حي المعلا وما حوله
        area: بالقرب من مقبرة جنة المعلا، مكة المكرمة
      best_time: الصباح الباكر (06:00–09:00) لإضاءة ناعمة وشوارع أقل ازدحاماً
      notes: كن محترماً عند تصوير الأفراد — استأذن دائماً؛ العمارة ما قبل الحديثة تتلاشى تدريجياً

    - name: سهل عرفات وجبل الرحمة (موسم الحج)
      description: >
        في الحج تمتلئ سهول عرفات بملايين الحجاج ذوي الثياب البيضاء — من أكبر التجمعات البشرية
        على وجه الأرض. تصوير جبل الرحمة محاطاً بهذا البحر البشري تجربة بصرية استثنائية.
      location:
        name: سهل عرفات
        area: نحو 20 كم شرق المسجد الحرام
        coordinates: 21.3549° N, 39.9845° E
      best_time: بعد ظهر اليوم التاسع من ذي الحجة؛ الضوء وحجم التجمع في ذروتهما
      notes: لا يُصال إليه إلا في موسم الحج؛ الطائرات المسيّرة محظورة تحريماً صارماً في مناطق الحج

    - name: أودية الطائف ومناظر الجبال
      description: >
        المنحدر الدرامي لجبال الحجاز حول الطائف — منحدرات شاهقة وأودية عميقة ومزارع مدرّجة
        وضباب على مستوى السحاب — يوفر تصويراً للمشاهد الطبيعية لا مثيل له في شبه الجزيرة.
      location:
        name: نقاط المشاهدة في الهدا والشفا
        area: محافظة الطائف (75 كم من مكة)
        coordinates: 21.3528° N, 40.4062° E
      best_time: الصباح الباكر لضباب الوادي؛ الساعة الذهبية لملمس الحواف الصخرية
      notes: تلفريك الهدا يتيح إطاراً علوياً غير متاح من الطريق؛ شهور الربيع (مارس–أبريل) تضيف أزهاراً أمامية

    - name: سطح المسجد الحرام والطوابق العليا
      description: >
        يوفر السطح الواسع للمسجد الحرام منظوراً علوياً فريداً — مصلى مفتوح بإطلالة مباشرة
        على الكعبة المشرفة أسفله وأفق المدينة يحيط بالمسجد. جميل بشكل خاص عند الفجر حين ينير
        ضوء الفجر الكعبة المشرفة.
      location:
        name: سطح المسجد الحرام
        area: يُصل إليه بالسلالم الكهربائية من مداخل متعددة
      best_time: صلاة الفجر (ضوء الفجر) وبعد العشاء للكعبة المضاءة
      notes: احمل سجادة صلاة؛ احترم سياسة التصوير داخل المسجد

    - name: قمة جبل أبو قبيس
      description: >
        الجبل التاريخي المباشر شرق المسجد الحرام — وفق التراث أول جبل خُلق على وجه الأرض.
        توفر القمة منظراً جوياً علوياً قريباً على المسجد الحرام والكعبة، فريداً في قربه وزاويته.
      location:
        name: جبل أبو قبيس
        area: مباشرة شرق المسجد الحرام، منطقة الحرم
        coordinates: 21.4234° N, 39.8301° E
      best_time: الصباح الباكر (الفجر حتى الشروق) لإضاءة درامية على المسجد
      notes: صعود قصير لكنه شديد الانحدار؛ مسار جزئي؛ تحقق من إمكانية الوصول قبل الزيارة

    - name: صحن باب الملك فهد
      description: >
        الصحن الاحتفالي الكبير لباب الملك فهد بالمسجد الحرام يتيح منظوراً شاملاً على واجهة
        المسجد ومآذنه وأبراج أبراج البيت — تركيبة كلاسيكية تجمع مكة القديمة والحديثة.
      location:
        name: باب الملك فهد (الباب 79)
        area: الوجهة الشمالية للمسجد الحرام، منطقة الحرم
      best_time: الساعة الزرقاء (قبيل الفجر) أو المساء بعد العشاء
      notes: عدسة واسعة الزاوية مُوصى بها؛ احترم المصلين المتجهين للصلاة

    - name: شارع الملك فهد ليلاً
      description: >
        الشارع الرئيسي لمكة مضاءً ليلاً — برج الساعة يتوهج بالأزرق والذهبي ومآذن المسجد
        مضيئة وحركة الحجاج الدائمة تخلق أجواءً فريدة لتصوير الشارع.
      location:
        name: شارع إبراهيم الخليل (طريق الملك فهد)
        area: منطقة الحرم، مكة المكرمة
      best_time: بعد صلاة العشاء (المساء المتأخر)
      notes: حامل ثلاثي القوائم أو مثبت الهاتف مُوصى به لتصوير الليل؛ برج الساعة أجمل ما يُؤطر من أفنية المسجد

    - name: تصوير الكعبة عند الشروق والغروب
      description: >
        تصوير الكعبة في ضوء الصباح أو توهج الساعة الذهبية — من الطوابق العليا للمسجد الحرام
        أو إطلالات غرف الفنادق في مجمع أبراج البيت أو مناطق سطح المسجد.
      best_locations:
      - الطوابق العليا لفيرمونت وسويسوتيل المطلة على الحرم
      - مناطق سطح المسجد عبر الأبواب العليا
      - معارض الطابق العلوي للمسجد الحرام
      best_times: 30 دقيقة بعد الفجر (ضوء وردي ناعم)؛ 30 دقيقة قبل المغرب (الساعة الذهبية)
      notes: غرف الفنادق المطلة على الحرم في أبراج البيت توفر أكثر الوصول استمراراً؛ تُحجز قبل أشهر

    - name: مقبرة جنة المعلا عند الغسق
      description: >
        المقبرة القديمة عند الغسق مع أبراج أبراج البيت المضيئة تعلوها خلفها — تباين صارخ بين
        مكة القديمة والحديثة يُقدم مشهداً فوتوغرافياً وتأملياً قوياً.
      location:
        name: مقبرة جنة المعلا (الحجون)
        area: حي المعلا، بضع مئات من الأمتار من المسجد الحرام
        coordinates: 21.4331° N, 39.8283° E
      best_time: 30 دقيقة قبل وبعد صلاة المغرب (الساعة الزرقاء)
      notes: التصوير من الطريق الخارجي؛ ادخل بأعلى درجات الهدوء والوقار — مقبرة فعلية

    - name: تأطير غروب التنعيم ومسجد السيدة عائشة
      description: >
        الطريق بين التنعيم والمدينة يتيح خطوط بصر واضحة نحو المسجد الحرام عند الغروب — المسجد
        مضيء أمام سماء حجازية حمراء. أقل تصويراً وأكثر أصالة من المواقع المركزية.
      location:
        name: طريق الهجرة، التنعيم، مكة المكرمة
        area: 7.5 كم من المسجد الحرام
      best_time: 30 دقيقة قبل المغرب
      notes: تحتاج سيارة أو تاكسي؛ التضاريس المفتوحة تتيح تأطيراً بصرياً واسعاً

    - name: منظر وادي إبراهيم
      description: >
        تقع مكة في وادي إبراهيم — مشاهدة المدينة من طرق التلال المحيطة يتيح منظوراً درامياً
        على مجمع المسجد المتكئ بين جبال الحجاز. شهير بين السكان المحليين للنزهات المسائية.
      location:
        area: الطرق الدائرية على التلال المحيطة بمركز مكة
        best_viewpoints:
        - منطقة تل الفلق — المدخل الجنوبي
        - تل قلعة أجياد (نقطة مشاهدة الآثار التاريخية)
        - طريق المدخل الشمالي عبر اتجاه النور
      notes: الأجمل عند الغروب وشفق المساء؛ يُصل إليه بالتاكسي؛ يُقرن بزيارة جبل النور

    - name: سهل مزدلفة المفتوح (موسم الحج)
      description: >
        في ليلة التاسع والعاشر من ذي الحجة تمتلئ مزدلفة بملايين الحجاج تحت السماء المفتوحة — من
        أقوى التجمعات البشرية بصرياً على الأرض. درب التبانة يُرى أحياناً فوق بحر من ثياب الإحرام البيضاء.
      location:
        name: سهل مزدلفة
        area: بين عرفات ومنى
        coordinates: 21.3797° N, 39.9358° E
      best_time: منتصف الليل حتى ما قبل الفجر خلال الحج
      notes: للحجاج فقط؛ التصوير الفلكي بزاوية عريضة أو هاتف ذكي يُجدي هنا

    - name: التصوير الجوي ومناظر الأفق المديني
      description: >
        التقاط الأفق الدرامي لمكة — أبراج أبراج البيت الأيقونية تعلو المسجد الحرام في كنف
        الجبال الحجازية. الأفضل من النقاط المرتفعة لا مستوى الأرض.
      best_locations:
      - قمة جبل النور — مناظر بانورامية على مكة المركزية
      - تل جبل أبو قبيس — منظر علوي مباشر نحو الحرم
      - الطوابق العليا ومنصة المراقبة — فيرمونت مكة
      - منحرفات التلال على الطريق الدائري حول وادي إبراهيم
      notes: >
        التصوير بالطائرات المسيّرة يستلزم تصريحاً من الهيئة العامة للطيران المدني؛ الطائرات المسيّرة
        غير المرخصة محظورة صراحةً بالقرب من المسجد الحرام؛ التصوير بعدسة هاتفية عالية الدقة من غرف
        الفندق المطلة على الحرم بديل قانوني ممتاز

  volunteer_and_service:
    description: >
      فرص للعطاء وخدمة المجتمع المسلم العالمي خلال إقامتك في مكة المكرمة — من مساعدة الحجاج
      مباشرةً إلى العمل الخيري والاهتمام البيئي. للتطوع في البلد الحرام أجر عظيم.
    items:
    - name: التطوع للإرشاد ومساعدة الحجاج
      description: >
        مساعدة كبار السن وذوي الإعاقة والحجاج الجدد في التنقل والإرشاد الشرعي ودفع الكراسي المتحركة
        والترجمة. ينظمه رسمياً برنامج التطوع بوزارة الحج والعمرة السعودية.
      businesses:
      - name: وزارة الحج والعمرة — بوابة التطوع
        area: الوطنية (تركيز مكة والمدينة)
        url: https://www.nusuk.sa
        notes: سجّل عبر منصة نسك؛ المناصب تشمل مساعدي الطواف وكراسي متحركة ومكاتب معلومات
      - name: منظمة الإغاثة الإسلامية العالمية (IIRO)
        area: منطقة الحرم، مكة المكرمة
        notes: منظمة خيرية سعودية تنسق متطوعي رعاية الحجاج في موسم الحج
      duration: متغير (جلسات يومية حتى تكليفات لموسم الحج كامل)
      notes: مهارات اللغة (العربية والإنجليزية والأردية والملاوية والفرنسية) ذات قيمة عالية

    - name: توزيع الإفطار والتطوع في رمضان
      description: >
        تنظيم وتوزيع وجبات الإفطار للحجاج والعمال والمحتاجين حول المسجد الحرام في رمضان.
        تُنصب آلاف موائد الإفطار يومياً.
      businesses:
      - name: جمعية مكة المكرمة الخيرية (مؤسسة الحرمين)
        area: مكة المكرمة
        url: https://albir-makkah.sa
        notes: تنسق توزيع الإفطار على نطاق واسع؛ متطوعون مطلوبون للإعداد والخدمة والتنظيف
      - name: مشروع إفطار مؤسسة الراجحي
        area: في أنحاء المسجد الحرام والشوارع المحيطة
        url: https://rf.org.sa/en
        notes: من أكبر برامج الإفطار في مكة؛ متطوعون لتوزيع مئات الآلاف من الوجبات ليلياً
      - name: مطابخ خيرية في الفنادق والمساجد المحلية
        area: منطقة الحرم والعزيزية، مكة المكرمة
        notes: كثير من الفنادق والمساجد المحلية تنظم برامج إفطار مجتمعية ترحب بالمتطوعين
      best_season: رمضان (الشهر كاملاً)
      notes: سجّل مبكراً؛ تبدأ الوردية في الغالب قبل ساعتين من المغرب

    - name: خدمة ماء زمزم (السبيل)
      description: >
        توزيع كؤوس ماء زمزم على الحجاج داخل المسجد الحرام — عمل خدمي عميق القيمة (السبيل)
        يُؤدى بلا انقطاع منذ عهد صحابة النبي صلى الله عليه وسلم.
      location:
        name: نقاط توزيع ماء زمزم — المسجد الحرام
        area: في أنحاء المسجد (مستوى المطاف والممرات والأفنية)
      notes: >
        مجموعات المتطوعين (في الغالب عائلات) تُقيم نقاط خدمة زمزم بالتنسيق مع إدارة المسجد؛
        الخدمة الفردية غير الرسمية للمجاورين لا تحتاج إذناً رسمياً

    - name: التنظيف البيئي (صون طهارة الحرم)
      description: >
        المشاركة في مبادرات نظافة المسجد الطوعية — رفع النفايات وتنظيم الأحذية عند مداخل المسجد
        والمحافظة على نظافة مناطق الصلاة. تنظم الرئاسة العامة لشؤون المسجد الحرام برامج منهجية.
      businesses:
      - name: الرئاسة العامة لشؤون المسجد الحرام — قسم التطوع
        area: المسجد الحرام، مكة المكرمة
        notes: الجهة الرسمية المشرفة على عمليات المسجد؛ تنسيق المتطوعين في المواسم الكبرى
      notes: حتى الجهود الفردية غير الرسمية في نظافة المسجد ذات قيمة عظيمة؛ رفع القمامة أثناء المشي عمل صغير ذو أثر كبير

    - name: تعليم القرآن ودعم محو الأمية (تطوع المدرسة)
      description: >
        تعليم القرآن الكريم والعربية أو محو الأمية الأساسية للأطفال والمسلمين الجدد في المدارس
        والمراكز الإسلامية المجتمعية في أحياء مكة السكنية.
      businesses:
      - name: أكاديمية النور الإسلامية للأطفال
        area: حي العزيزية، مكة المكرمة
        notes: ترحب بمعلمين متطوعين مؤهلين لبرامج القرآن ومحو الأمية العربية
      - name: دار الأرقم الإسلامي
        area: حي العدل، مكة المكرمة
        notes: مركز لمحو الأمية الإسلامية للبالغين ودعم المسلمين الجدد؛ مدرّسون متطوعون بالإنجليزية والأردية والعربية أهلاً
      - name: برنامج التواصل المجتمعي — جامعة أم القرى
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: يربط المتطوعين ببرامج محو الأمية المجتمعية في أحياء مكة
      notes: يُفضل الخبرة التدريسية ذات الصلة أو المؤهل الإسلامي؛ حتى ساعة واحدة أسبوعياً ذات أثر مجتمعي عميق

    - name: خدمة المفقودين في الحج والعمرة
      description: >
        مساعدة الحجاج المفقودين — وبخاصة كبار السن غير المعتادين على مكة — في تحديد موقع فنادقهم
        ومسؤولي مجموعاتهم أو ذويهم. خدمة حيوية كثيرة الطلب في أوقات الذروة.
      businesses:
      - name: مركز خدمة الحجاج المفقودين — وزارة الحج
        area: أبواب رئيسية للمسجد الحرام (مواقع متناوبة)
        url: https://www.nusuk.sa
        notes: خدمة حكومية رسمية؛ متطوعون متعددو اللغات مطلوبون بشدة؛ المناصب عبر بوابة نسك
      - name: فرق متطوعة متنقلة (تنظيم مجتمعي)
        area: منى وعرفات ومنطقة الحرم
        notes: مجموعات متطوعة مستقلة عبر شبكات واتساب؛ تنسق مع ضباط اتصال وزارة الحج على أرض الواقع
      notes: مهارات اللغة الأثمن في هذا الدور؛ الملايوية والأردية والبنغالية والتركية والإندونيسية والهوسا والسواحيلية مطلوبة

    - name: مساعدة كبار السن وذوي الإعاقة
      description: >
        تقديم الدعم البدني واللوجستي المباشر لكبار السن وذوي الإعاقة الحركية أثناء الطواف
        والسعي والتنقل بين المشاعر — دفع الكراسي المتحركة وإرشاد الخطى وحمل الأمتعة وتقديم الرفقة.
      businesses:
      - name: خدمة الكراسي المتحركة — وزارة الحج
        area: المسجد الحرام — محطات الكراسي عند الأبواب الرئيسية
        notes: المتطوعون المسجلون ينضمون للخدمة الرسمية في موسمي الحج والعمرة
      - name: الإغاثة الإسلامية (عمليات مكة)
        area: منطقة الحرم، مكة المكرمة
        notes: منظمة خيرية دولية لها متطوعو دعم حج؛ التواصل مسبقاً بوقت كافٍ
      notes: مجزٍ بعمق؛ لا تشترط تدريباً طبياً رسمياً؛ اللياقة البدنية ضرورية؛ إتقان لغة الحاج يضاعف الأثر

    - name: التبرع بمشاريع توزيع المصحف الشريف
      description: >
        المساهمة في أو التطوع مع المنظمات التي توزع نسخاً مجانية من المصحف على الحجاج
        بعشرات اللغات — عمل من أعمال الصدقة الجارية.
      businesses:
      - name: مجمع الملك فهد لطباعة المصحف الشريف
        area: المدينة المنورة (70 كم — رحلة يومية أو تبرع بالتحويل)
        url: https://qurancomplex.gov.sa
        notes: أكبر منشأة لطباعة المصحف في العالم؛ وزعت أكثر من 300 مليون نسخة حتى الآن
      - name: موائد المصاحف في نقاط المعلومات بالمسجد الحرام
        area: في أنحاء المسجد الحرام
        notes: مصاحف مجانية بلغات متعددة؛ المتطوعون يساعدون في التوزيع وإدارة المخزون
      notes: صدقة جارية عميقة الأثر

    - name: الصدقة في نقاط توزيع ماء زمزم
      description: >
        التبرع لمبادرات توزيع ماء زمزم المجاني التي توفر الماء البارد على مدار الساعة للحجاج
        في أنحاء المسجد — تمويل البنية التحتية للتبريد والتوزيع.
      location:
        name: نقاط جمع التبرعات — مؤسسة الراجحي الخيرية
        area: مداخل المسجد الحرام ومحطات الممرات
      url: https://rf.org.sa/en
      notes: صناديق التبرع موجودة بالقرب من برادات الزمزم ومداخل المسجد

    - name: الإسعافات الأولية ودعم سلامة الحشود في الحج
      description: >
        متطوعون طبيون ومسعفون لدعم الحجاج في موسم الحج — مساعدة في حالات ضربة الحرارة والحجاج
        المفقودين والدعم الحركي وتنسيق الطوارئ. تشترط خلفية صحية أو سلامية ذات صلة.
      how_to_join: >
        تقدم عبر برنامج متطوعي الهلال الأحمر السعودي (SRCA) للحج؛ تُتحقق المؤهلات الطبية عند التقديم؛
        تدريب قبل الحج
      url: https://srca.org.sa/en
      location:
        name: منى وعرفات ومزدلفة والمسجد الحرام
        area: دائرة الحج، محافظة مكة المكرمة
      notes: شاق جسدياً لكنه عميق المعنى؛ تُمنح شهادة تطوع الهلال الأحمر عند الانتهاء
