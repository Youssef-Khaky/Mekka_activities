# المواقع التاريخية والتعليم والفنون والحرف التقليدية

activities:
  historical_sites:
    description: المعالم التاريخية والدينية البارزة في مكة المكرمة وما حولها
    items:
    - name: جبل النور
      description: الجبل الذي يضم غار حراء حيث نزل الوحي القرآني الكريم لأول مرة
      location:
        name: جبل النور
        area: حي النور، على بُعد نحو 4 كم شمال شرق المسجد الحرام
        coordinates: 21.4572° N, 39.8586° E
        address: طريق جبل النور، مكة المكرمة
      duration: ساعة ونصف إلى ساعتين (صعوداً وهبوطاً)
      notes: 1294 درجة حتى القمة؛ يُنصح بالزيارة في الصباح الباكر تجنباً للحرارة

    - name: جبل ثور
      description: الجبل الذي يضم الغار الذي لجأ إليه النبي صلى الله عليه وسلم أثناء الهجرة
      location:
        name: جبل ثور
        area: على بُعد نحو 4.7 كم جنوب المسجد الحرام
        coordinates: 21.3856° N, 39.8192° E
      duration: ساعتان إلى ثلاث ساعات
      notes: أشد وعورةً من جبل النور؛ يُنصح بارتداء حذاء متين

    - name: مسجد الجن
      description: المسجد الذي يُعلِّم الموضع الذي بايع فيه نفر من الجن الإسلامَ
      location:
        name: مسجد الجن
        area: حي المعلا، بالقرب من مقبرة جنة المعلا
        coordinates: 21.4317° N, 39.8314° E
        address: شارع الجن، المعلا، مكة المكرمة
      notes: مذكور في سورة الجن (72)؛ صغير الحجم لكنه بالغ الأثر التاريخي

    - name: مسجد السيدة عائشة (التنعيم)
      description: المسجد الذي يُحرم منه الحجاج لأداء عمرة إضافية
      location:
        name: مسجد السيدة عائشة
        area: التنعيم، على بُعد نحو 7.5 كم من المسجد الحرام
        coordinates: 21.4629° N, 39.8200° E
        address: طريق الهجرة، التنعيم، مكة المكرمة
      notes: يمكن الوصول إليه بالتاكسي أو الحافلة (مترو مكة خط 2) أو كريم وأوبر

    - name: مقبرة جنة المعلا
      description: مقبرة أثرية قديمة تضم رفات عدد من أقارب النبي وصحابته الكرام
      location:
        name: جنة المعلا (مقبرة الحجون)
        area: حي المعلا، على بُعد بضع مئات من الأمتار من المسجد الحرام
        coordinates: 21.4331° N, 39.8283° E
        address: شارع المعلا، مكة المكرمة
      notes: تضم قبور السيدة خديجة رضي الله عنها وأبي طالب وآخرين من أسرة النبي

    - name: جولة معمارية في المسجد الحرام
      description: استكشاف مآذن المسجد وأبوابه وساعاته وأقسامه التاريخية
      location:
        name: المسجد الحرام (مداخل متعددة)
        key_gates:
        - باب الملك عبدالعزيز (باب 1) — المدخل الرسمي الرئيسي
        - باب الملك فهد (باب 79) — المطل على أبراج البيت
        - باب السلام
        - باب العمرة
      duration: ساعة إلى ساعتين
      notes: جولات إرشادية متاحة عبر وكالات مرخصة؛ يُفضل إجراؤها خارج أوقات الذروة

    - name: متحف مكة المكرمة (قصر الزاهر)
      description: قصر ملكي تحول إلى متحف يؤرخ لمكة المكرمة وموسم الحج
      location:
        name: متحف قصر الزاهر
        area: حي الزاهر، مكة المكرمة
        address: طريق الزاهر، مكة المكرمة
      notes: يعرض آثاراً عثمانية وخرائط قديمة ووثائق تاريخية تتعلق بالحج

  educational_cultural:
    description: أنشطة تعليمية وإثرائية للنمو الروحي والفكري
    items:
    - name: محاضرات التاريخ الإسلامي
      description: حضور المحاضرات العلمية التي تُقام بانتظام في المسجد الحرام
      location:
        name: قاعات المحاضرات ومناطق الأبواب في المسجد الحرام
        area: منطقة الحرم
      businesses:
      - name: دار الحديث الخيرية
        area: بالقرب من المسجد الحرام، مكة المكرمة
        notes: مؤسسة تعليمية إسلامية عريقة تقدم دورات متخصصة
      - name: كلية الدراسات الإسلامية بجامعة أم القرى
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: محاضرات عامة مفتوحة للحجاج في بعض الأحيان
      notes: تشمل الموضوعات السيرة والعقيدة والفقه؛ المواعيد منشورة عند مداخل المسجد

    - name: حلقات تحفيظ القرآن الكريم
      description: الانضمام إلى حلقات تعلم القرآن الكريم داخل المسجد الحرام
      location:
        name: المسجد الحرام — قسم التوسعة الملكية الفهدية
        area: منطقة الحرم
      notes: متاحة لجميع المستويات؛ يقودها قراء متقنون معتمدون؛ مجانية

    - name: معرض بئر زمزم
      description: التعرف على تاريخ بئر زمزم المباركة وخصائصها الهيدرولوجية
      location:
        name: منطقة بئر زمزم
        area: بدروم المسجد الحرام (يُدخل من مستوى المطاف)
        coordinates: 21.4227° N, 39.8264° E
      notes: البئر محاطة بسياج زجاجي لكن المنطقة المحيطة بها تحتوي على لوحات توضيحية

  arts_and_culture:
    description: >
      الفنون العربية الأصيلة والمعاصرة — الخط والموسيقى والشعر والحكواتية، جذورها ضاربة في الحضارة الإسلامية.
      كثير من الورش متاحة في مكة المكرمة والطائف وجدة.
    items:
    - name: الخط العربي (الخط العربي الإسلامي)
      description: >
        فن الكتابة العربية الجميلة — يُعدّ أرقى الفنون البصرية الإسلامية. تشمل الأنماط النسخ والثلث والديواني
        والكوفي والرقعة. مدرج في قائمة اليونسكو للتراث الثقافي غير المادي.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      styles:
      - النسخ (الأكثر وضوحاً؛ مثالي للمبتدئين)
      - الثلث (كتابات المساجد الكلاسيكية؛ متوسط)
      - الديواني (النمط العثماني الزخرفي؛ متقدم)
      - الكوفي (النمط الهندسي الزاوي؛ متقدم)
      - الرقعة (خط الكتابة اليومية؛ سهل للمبتدئين)
      businesses:
      - name: دار الخط الإسلامي
        area: حي العزيزية، مكة المكرمة
        notes: مدرسة خط متخصصة تقدم دورات مكثفة وطويلة بعلم ومستلزمات مرفقة
      - name: المركز الثقافي بمكة (دار الثقافة)
        area: حي العدل، مكة المكرمة
        address: طريق الملك فهد، العدل، مكة المكرمة
        notes: ورش خط دورية يقدمها خطاطون متمرسون؛ مجانية أو رمزية التكلفة
      - name: استوديو الخط في البلد
        area: البلد التاريخي، جدة
        notes: دورات تتراوح بين يوم واحد و12 أسبوعاً؛ شهادات من جمعية الخط السعودية
      - name: كلية الفنون بجامعة أم القرى (ورش مفتوحة)
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: ورش عامة عرضية تنظمها قسم الفنون بالجامعة
      duration: ساعتان إلى ثلاث ساعات للجلسة (الدورات من يوم إلى 12 أسبوعاً)
      supplies_needed:
      - قلم قصبة أو خيزران
      - حبر الخط (هبر)
      - ورق تمرين أملس غير ماص
      - مسطرة وزاوية
      notes: مناسب لجميع الأعمار؛ القراءة العربية ليست شرطاً للمبتدئين

    - name: العزف على العود
      description: >
        العود هو ملك الآلات الموسيقية العربية — عود ذو رنين دافئ في صميم الموسيقى العربية الكلاسيكية.
        تعلم أساسيات المقامات يفتح عالماً من التراث الموسيقي الإسلامي الممتد لأكثر من ألف عام.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      arabic_maqamat_covered:
      - راست (الأساسي؛ الأكثر شيوعاً للمبتدئين)
      - بياتي (عاطفي؛ تعبيري)
      - حجاز (شرقي؛ مرتبط بشبه الجزيرة العربية)
      - نهاوند (يشبه السلم الغربي الصغير)
      - صبا (عميق الإحساس؛ يُستخدم في الموسيقى الدينية)
      businesses:
      - name: معهد مكة للموسيقى والفنون
        area: حي النسيم، مكة المكرمة
        notes: دروس فردية وجماعية للعود؛ أعواد للإيجار أثناء الدروس
      - name: أكاديمية الأندلس للموسيقى
        area: حي الحمراء، جدة
        notes: مدرسة موسيقية رائدة؛ الدورات المبتدئة تشمل الوضعية والإيقاع والمقامات الأساسية
      - name: مركز الطائف للفنون
        area: وسط مدينة الطائف
        notes: ورش عود وأمسيات موسيقية ثقافية في بيئة حميمة
      duration: 45–60 دقيقة للحصة الواحدة
      notes: عيدان للطلاب متاحة للشراء في محلات الآلات الموسيقية قرب مكة

    - name: الشعر العربي
      description: >
        الجزيرة العربية مهد أحد أعظم التقاليد الشعرية في التاريخ. من معلقات ما قبل الإسلام إلى الشعر
        النبطي البدوي والشعر المعاصر، يُشحذ الشعر اللغة ويرسّخ الروحانية.
      genres:
      - الفصحى (الشعر العربي الفصيح — الأدبي الرسمي)
      - النبطي (الشعر الشعبي البدوي — الموروث الشفهي)
      - الزجل (الشعر العامي — يُؤدى في التجمعات)
      - القصيدة (النموذج المطول الكلاسيكي)
      - الشعر العربي الحديث
      businesses:
      - name: نادي الأدباء والكتاب السعوديين (فرع مكة)
        area: وسط مكة المكرمة
        notes: أمسيات شعرية أسبوعية مفتوحة للجمهور؛ في الشعر الفصيح والنبطي
      - name: القصر الثقافي بالطائف
        area: وسط مدينة الطائف
        notes: أمسيات أدبية منتظمة تضم الشعر النبطي؛ مشاركة الجمهور مرحب بها
      - name: نادي جدة الأدبي
        area: حي الروضة، جدة
        url: https://adabijeddah.com
        notes: من أنشط الأندية الأدبية في المملكة؛ ورش للمبتدئين الراغبين في نظم قصيدتهم الأولى
      duration: ساعة إلى ثلاث ساعات للجلسة
      notes: الشعر النبطي شفهي — لا يشترط إتقان الكتابة للمشاركة

    - name: فن الحكواتية العربية
      description: >
        الحكواتي هو الراوي الشعبي العربي التقليدي الذي كان يُجلس في المقاهي والميادين.
        تجمع الجلسات بين الفولكلور والتاريخ الإسلامي والأساطير البدوية والسرد التلقائي. تراث حي يُحيا من جديد.
      businesses:
      - name: أمسيات الحكي — هيئة التراث السعودية
        area: مراكز التراث في مكة وجدة البلد
        url: https://heritage.moc.gov.sa/en
        notes: أمسيات قصص منظمة باللغة العربية؛ موضوعاتها من التاريخ الإسلامي وألف ليلة والفولكلور
      - name: فعاليات كورنيش جدة الثقافية
        area: الكورنيش، جدة
        notes: عروض حكي خارجية في المهرجانات الوطنية وأمسيات رمضان
      - name: مخيمات جبل الهدا (الطائف)
        area: الهدا، الطائف
        notes: أمسيات بدوية بقصص تقليدية حول نار المخيم
      duration: ساعة إلى ساعتين للجلسة
      notes: يُفيد الفهم الأساسي للعربية؛ بعض الجلسات تتوفر فيها ملخصات بالإنجليزية

    - name: الفن الإسلامي الهندسي وتصميم البلاط
      description: >
        الأنماط الهندسية المعقدة التي تزين المساجد والقصور والمخطوطات في العالم الإسلامي.
        تعلم رسم نجمة الأنماط والزليج العربي والأرابيسك باستخدام البرجل والمسطرة — الطريقة الإسلامية الكلاسيكية.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: المركز الثقافي بمكة (دار الثقافة)
        area: حي العدل، مكة المكرمة
        notes: ورش فن هندسي؛ المواد مرفقة؛ لا يشترط الخبرة في الرسم
      - name: ورش هيئة التراث السعودي للتصميم
        area: مكة المكرمة وجدة
        url: https://heritage.moc.gov.sa/en
        notes: جلسات تغطي الأنماط المملوكية والعثمانية والأندلسية؛ المشاركون يأخذون أعمالهم معهم
      - name: استوديوهات البلد للفنون (جدة التاريخية)
        area: البلد (مدرج يونسكو)، جدة
        notes: ورش داخل مبانٍ مرجانية مرممة؛ تُقرن بجولة مشاة في البلد التاريخي
      duration: ساعتان إلى أربع ساعات للجلسة
      materials_provided: true
      notes: البرجل والمسطرة وأقلام الرسم والورق مرفقة؛ الأعمال المنجزة صالحة للتأطير

    - name: الإيقاع العربي — الطبلة والرق
      description: >
        تعلم الإيقاعات الأساسية للموسيقى العربية (الإيقاعات) على الطبلة (الدربكة) أو الرق.
        الدوارات الإيقاعية كالمقسوم والسماعي والوحدة تُشكّل أساس الموسيقى العربية الكلاسيكية والشعبية.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: معهد مكة للموسيقى والفنون
        area: حي النسيم، مكة المكرمة
        notes: دروس إيقاع جماعية؛ إيجار طبلة متاح
      - name: أكاديمية الأندلس للموسيقى
        area: حي الحمراء، جدة
        notes: تدريب فردي وجماعي؛ يشمل الطبلة والرق والدف
      duration: 45–60 دقيقة للحصة الواحدة
      notes: الرق أرفق للمبتدئين التامين؛ الطبلة تتطلب تكييف الأصابع لكن التقدم سريع

    - name: الأناشيد الإسلامية التقليدية (النشيد السعودي)
      description: >
        النشيد موسيقى إسلامية صوتية — إنشاد بلا مصاحبة أو مع إيقاع خفيف. تعلم تقنية الصوت المبنية على المقامات
        والتحكم في التنفس والنصوص العربية الكلاسيكية المقطّعة على الأنماط اللحنية التقليدية.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: معهد الفنون الإسلامية بمكة
        area: منطقة الحرم، مكة المكرمة
        notes: ورش صوتية جماعية تركز على نبرة التجويد القرآني والنشيد الكلاسيكي؛ جلسات منفصلة للرجال والنساء
      - name: ورش الصوت بمركز الطائف للفنون
        area: وسط مدينة الطائف
        notes: دورات في الإنتاج الصوتي العربي الصحيح والوعي بالمقامات وأداء النشيد الجماعي
      duration: ساعة واحدة للجلسة
      notes: لا تشترط الخبرة الموسيقية المسبقة؛ النشيد يربط النية الروحية بالفن الصوتي

  skills_craft:
    description: >
      ورش عملية في الحرف التقليدية والمعاصرة — الخزف والنجارة والتصوير والمنسوجات. متاحة في مراكز ثقافية
      بمكة مع استوديوهات متخصصة في الطائف وجدة. معظم الجلسات ترحب بالمبتدئين.
    items:
    - name: جولات التصوير الفوتوغرافي والورش
      description: >
        جولات تصوير إرشادية في أجمل مواقع مكة المكرمة — المسجد الحرام عند الساعة الذهبية وأزقة سوق الزل
        ومعمار المدينة الحجازية القديمة. تشمل التكوين والإضاءة الطبيعية وتقنيات الهاتف والكاميرا.
      skill_levels:
      - مبتدئ
      - متوسط
      - متقدم
      businesses:
      - name: نادي مكة للتصوير
        area: منطقة الحرم، مكة المكرمة
        notes: مجموعة مجتمعية تنظم جلسات تصوير فجرية أسبوعية؛ ترحب بالمصورين الزائرين
      - name: نادي التصوير السعودي (فرع مكة)
        area: حي العزيزية، مكة المكرمة
        notes: رحلات النادي وورش الاستوديو وجلسات البورتريه؛ إعارة معدات متاحة
      - name: ورشة فيجوال مكة (مقرها جدة، رحلات يومية إلى مكة)
        area: البلد، جدة / رحلات يومية إلى مكة
        notes: مصورون محترفون يقودون جلسات تصوير وثائقي لمجموعات صغيرة؛ عربي وإنجليزي
      duration: ساعتان إلى أربع ساعات للجلسة
      notes: أحضر كاميرتك أو هاتفك الذكي؛ العدسة الواسعة الزاوية مثالية للمعمار

    - name: الفخار والسيراميك
      description: >
        الفخار العربي التقليدي — الدوّارة واليدوية والتزجيج الزخرفي. للحجاز تقليد عريق في صنع أواني الماء
        الخزفية (الزير) والحلي الترّاكوتية. الورش الحديثة تمزج الأشكال التراثية مع التصميم المعاصر.
      skill_levels:
      - مبتدئ
      - متوسط
      businesses:
      - name: مركز مكة الثقافي (دار الثقافة) — ورشة الفخار
        area: حي العدل، مكة المكرمة
        notes: جلسات على الدوّارة الطينية؛ تشمل الحرق بالفرن؛ تأخذ قطعك في الزيارة الثانية
      - name: استوديو الفخار الفني
        area: حي الروضة، جدة (80 كم)
        notes: استوديو يضم 12 دوّارة؛ دورات تعليمية ابتدائية؛ ورش تزجيج متاحة
      - name: ورش الحرف التراثية — هيئة التراث السعودي
        area: مركز التراث بمكة
        url: https://heritage.moc.gov.sa/en
