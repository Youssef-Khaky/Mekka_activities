    - name: النسيج التقليدي والسدو
      description: >
        السدو هو فن النسيج البدوي الهندسي لشبه الجزيرة العربية — أنماط جريئة تُنسج على أنوال أرضية بالصوف
        والأصباغ الطبيعية. مدرج في قائمة اليونسكو للتراث غير المادي. تعلم إعداد السدى وتقنية المكوك وعد الأنماط.
      skill_levels:
