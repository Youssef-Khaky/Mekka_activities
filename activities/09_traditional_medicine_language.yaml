# الطب النبوي والتراث الصحي الإسلامي — تعلم اللغة العربية والتبادل الثقافي

activities:
  tibb_al_nabawi:
    description: >
      الطب النبوي والتراث الصحي الإسلامي — ممارسات علاجية موصى بها في السنة النبوية الشريفة،
      تشمل الحجامة والعسل والحبة السوداء والأعشاب الطبية. مكة المكرمة موطن أسواق الأعشاب التقليدية
      والممارسين المتخصصين في هذا الإرث العلاجي العريق.
    items:
    - name: الحجامة (العلاج بالكؤوس)
      description: >
        الحجامة علاج وقائي وعلاجي يُوصى به في السنة النبوية الشريفة — تقنية سحب تُعزز الدورة الدموية
        وتطرح الفضلات وتُخفف التعب الجسدي من مشقة الشعائر. الحجامة الجافة والرطبة (مع خدوش صغيرة)
        كلتاهما متاحتان في مراكز متخصصة قرب الحرم.
      businesses:
      - name: مركز الحجامة النبوية
        area: حي العزيزية، مكة المكرمة
        notes: ممارسون معتمدون؛ جلسات فردية وجماعية؛ نظافة وعقامة طبية صارمة
      - name: مركز الشفاء بالطب النبوي
        area: شارع أجياد، منطقة الحرم، مكة المكرمة
        notes: قريب من المسجد الحرام؛ يُعالج حجاجاً من دول متعددة يومياً؛ نتائج مكتوبة
      - name: مراكز الحجامة — الطائف
        area: المنطقة التجارية بمدينة الطائف (75 كم من مكة)
        notes: أجواء أكثر هدوءاً؛ أسعار أقل؛ ممارسون ذوو خبرة بالسياح الدوليين
      best_time: >
        الاثنين والخميس أو الأيام 7 و17 و27 من الشهر الهجري (الأوقات النبوية الموصى بها)
      duration: 30–60 دقيقة
      notes: لا تُجرى على معدة ممتلئة؛ أبلغ الممارس عن أي أدوية أو أمراض مزمنة قبل الجلسة

    - name: العسل العلاجي وأسواقه
      description: >
        "في العسل شفاء للناس" (القرآن 16:69). العسل السعودي — عسل سدر حائل وعسل الطائف وعسل السمر
        والعسل الجبلي — من أجود عسل العالم بخصائص علاجية موثقة. متاجر التذوق والإرشاد تساعد
        في اختيار النوع الأمثل لكل غرض.
      businesses:
      - name: معارض عسل الطائف
        area: السوق المركزي، الطائف (75 كم من مكة)
        notes: عسل طازج من مناحل الجبال؛ التذوق مرحب به؛ شهادات مختبر متاحة عند الطلب
      - name: محلات العسل الأصيل — سوق الزل
        area: حي المعلا، مكة المكرمة
        notes: أنواع متعددة بأسعار متفاوتة؛ اطلب اختبار التبلور للتحقق من الجودة
      - name: باتيل — قسم منتجات العسل
        area: مجمع أبراج البيت، مكة المكرمة
        url: https://bateel.com/en_sa
        notes: عسل فاخر ذو تغليف مميز؛ مناسب للهدايا الراقية
      honey_varieties:
      - عسل السدر (الأعلى قيمة علاجية؛ يُستخرج من نبات السدر)
      - عسل الطائف (ذو نكهة فريدة من تنوع جبال الحجاز)
      - عسل السمر (خشن القوام؛ قوي المناعة)
      - عسل المانوكا المستورد (متاح في المحلات الصحية)
      price_range: 50–800 ريال للكيلوغرام حسب النوع والجودة
      notes: >
        عسل السدر الأعلى قيمة علاجية؛ التبلور علامة الجودة لا العيب؛ تجنب العسل السائل
        الرخيص جداً — احتمال التغشيش مرتفع

    - name: الحبة السوداء (حبة البركة)
      description: >
        "في الحبة السوداء شفاء من كل داء إلا الموت" (صحيح البخاري). الحبة السوداء (Nigella sativa)
        علاج نبوي ذو دراسات علمية حديثة موثقة. متاحة في الأسواق بصيغ متعددة — حبوب خام وزيت
        بارد الضغط وكبسولات ومستحضرات تجميل. الشراء من مكة يُضفي رمزية روحية خاصة.
      businesses:
      - name: عطارو شارع أجياد
        area: شارع أجياد، بالقرب من المسجد الحرام، مكة المكرمة
        notes: حبة سوداء طازجة وزيت؛ أسعار تنافسية؛ يُوجّهون للاستخدام والجرعات الصحيحة
      - name: صيدليات الأعشاب الطبية — سوق الزل
        area: حي المعلا، مكة المكرمة
        notes: تشكيلة واسعة من الصيغ؛ زيوت بارد الضغط المعتمدة متاحة
      - name: صيدليات الدواء والمتحدة
        area: منطقة الحرم، مكة المكرمة
        notes: مستحضرات حبة سوداء معتمدة من هيئة الغذاء والدواء السعودية
      forms_available:
      - حبوب كاملة (للطحن الطازج المنزلي)
      - زيت بارد الضغط (الأعلى تركيزاً وفعالية)
      - كبسولات جيلاتينية (للمسافرين)
      - عسل مُعزز بالحبة السوداء (مزيج شائع)
      notes: احفظ في مكان بارد جاف بعيداً عن الشمس؛ الزيت الداكن الرائحة الأعتق أجود

    - name: أسواق الأعشاب الطبية والعطارون التقليديون
      description: >
        أسواق مكة القديمة تضم عطارين (تجار أعشاب) يبيعون مئات الأعشاب والتوابل الطبية المستخدمة
        في الطب الإسلامي التقليدي — من الزعتر والحلبة والكركم إلى المريمية وجذور العرعر وزيوت
        التدليك العربية. معرفة العطار الجيد كنز حقيقي.
      businesses:
      - name: سوق العطارين (حي المعلا)
        area: المنطقة المحيطة بسوق الزل، حي المعلا، مكة المكرمة
        notes: عطاريون متخصصون بعلم عميق؛ توصيف ثنائي اللغة للأعشاب الشائعة متاح
      - name: عطارو شارع أجياد
        area: شارع أجياد، بالقرب من المسجد الحرام
        notes: مناسب للحجاج؛ مستحضرات جاهزة للشرب والتدليك؛ كميات صغيرة متاحة
      - name: سوق عطارين الطائف
        area: السوق المركزي، الطائف
        notes: أعشاب جبلية طازجة نادرة؛ نباتات الطائف الطبية بأسعار تنافسية وجودة أعلى
      common_herbs:
      - الحلبة (للتعافي بعد الولادة وتعزيز المناعة)
      - الزعتر (لصحة الجهاز التنفسي في ازدحام الحشود)
      - المريمية (لتهضيم وجبات الكبسة والأطعمة الدسمة)
      - الكركم (مضاد التهاب؛ مفيد لأوجاع الطواف)
      - الزنجبيل المجفف (للغثيان والتعب الجسدي)
      - جذر السنا (مُلين طبيعي مذكور في الطب النبوي)
      - حبوب اللقاح (من مناحل الطائف؛ مُعزز طاقة طبيعي)
      notes: >
        العطار الجيد يسألك عن حالتك قبل التوصية؛ لا تخلط الأعشاب مع الأدوية الموصوفة
        دون مراجعة طبية

    - name: الزيوت العطرية والعلاج بالبخور الإسلامي
      description: >
        البخور والزيوت العطرية راسخة في الثقافة الإسلامية — العود والمسك والعنبر وعصا السندل
        وورد الطائف استُخدمت لتنقية الأجواء وتعزيز التركيز الروحي وتطييب الجسد والروح.
        تُقدم المتاجر المتخصصة استشارة الاختيار وورش تركيب العطور الخاصة.
      businesses:
      - name: عبدالصمد القرشي
        area: مجمع أبراج البيت وشارع أجياد، مكة المكرمة
        url: https://sa.abdulsamadalqurashi.com
        notes: من أرقى دور العطور؛ متخصصون يرشدون لاختيار الزيت المناسب؛ عطور مخصصة عند الطلب
      - name: الحرمين للعطور
        area: محلات متعددة قرب المسجد الحرام
        url: https://shop.alharamainperfumes.com
        notes: مناسب للميزانية؛ تشكيلة واسعة من الزيوت والبخور؛ هدايا رمضانية وعيدية جاهزة
      - name: ورش بخور هيئة التراث السعودي
        area: مركز التراث بمكة
        url: https://heritage.moc.gov.sa/en
        notes: جلسات تراثية لفن المجمر وتركيبات البخور العربي التقليدي
      aromatic_types:
      - عود (أغلى خشب عطري في العالم؛ عُنصر الكرم العربي)
      - مسك (عطر نبوي؛ مذكور بإيجاب في الأحاديث الشريفة)
      - عنبر (عطر بحري نادر؛ موصوف في كتب الطب الإسلامي الكلاسيكي)
      - ورد الطائف (زيت ورد دمشقي؛ خصوصية سعودية عالمية)
      - دهن العود (تركيزات عالية لإطالة البقاء)
      notes: >
        اختر الزيوت الخالصة (خالية من الكحول) دائماً للاستخدام الروحي؛ العطر يُعزز التركيز
        في الصلاة والطواف وفق التراث الإسلامي العريق

    - name: الرقية الشرعية (العلاج القرآني)
      description: >
        العلاج الروحي الإسلامي بتلاوة الآيات القرآنية الكريمة وأدعية السنة النبوية. الرقية
        ممارسة وقائية وعلاجية موصى بها شرعاً لشفاء الجسد والروح، وتبلغ أعمق تأثيرها في
        رحاب المسجد الحرام. الرقية الذاتية والجماعية كلتاهما جائزتان.
      businesses:
      - name: مكتب الإرشاد الشرعي — المسجد الحرام
        area: داخل المسجد الحرام (مكاتب عند الأبواب الرئيسية)
        notes: علماء معتمدون؛ رقية شرعية مضبوطة؛ دعم نفسي وروحي متكامل
      - name: مكتب رابطة العالم الإسلامي (لجنة الرقية)
        area: مقر الرابطة، منطقة الحرم، مكة المكرمة
        url: https://www.themwl.org/en
        notes: خدمة للحجاج والمقيمين؛ راقون معتمدون متعددو اللغات
      key_ayat_for_self_ruqyah:
      - سورة الفاتحة (أم الكتاب — شفاء عالمي)
      - آية الكرسي (البقرة 255 — الحماية)
      - سورة الإخلاص والمعوذتان (سور الإخلاص والفلق والناس)
      - الآيتان 117–122 من سورة الأعراف (لرفع الأذى)
      notes: >
        تجنب كل من يدّعي علم الغيب أو يشترط مبالغ كبيرة؛ الراقي الشرعي لا يخترق الخصوصية
        ولا يطلب ملابس أو صور الشخص؛ الرقية الذاتية قرآناً وسنةً الأسلم والأكمل

  arabic_language_learning:
    description: >
      تعلم اللغة العربية خلال الإقامة في مكة المكرمة — أبلغ وسيلة للتعمق في فهم القرآن الكريم
      والحديث النبوي والتفاعل مع المجتمع الإسلامي العالمي. مكة بيئة انغماس لغوية لا مثيل لها.
    items:
    - name: دورات العربية للحجاج والزائرين
      description: >
        دورات مكثفة قصيرة الأمد تُصمم خصيصاً للحجاج والمسلمين الزائرين — تُغطي العربية اليومية
        لأداء الشعائر والحياة اليومية في مكة، مع تركيز على النطق الصحيح لأذكار العبادة
        والتعامل مع أهل مكة والعمال والحجاج من شتى الأجناس.
      skill_levels:
      - مبتدئ تام
      - مبتدئ
      - متوسط
      businesses:
      - name: معهد اللغة العربية — جامعة أم القرى
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: من أعرق معاهد تعليم العربية للأجانب؛ دورات مكثفة صيفية وموسمية بشهادات معتمدة
      - name: مركز تعليم اللغة العربية للناطقين بغيرها (CALA)
        area: جامعة أم القرى، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: برامج شهرية وفصلية؛ طلاب من أكثر من 100 دولة؛ سكن جامعي متاح
      - name: دار الحديث الخيرية — دروس العربية
        area: بالقرب من المسجد الحرام، مكة المكرمة
        notes: دروس عربية مجانية أو رمزية التكلفة مع تركيز على عربية الحديث النبوي
      duration: >
        يوم واحد (ورشة تعريفية) إلى 12 أسبوعاً (دورة مكثفة)
      notes: >
        الانغماس في مكة يُضاعف سرعة الاستيعاب؛ الصلاة اليومية في المسجد الحرام تُعزز
        حفظ المفردات القرآنية بشكل ذاتي

    - name: جلسات التبادل اللغوي مع حجاج العالم
      description: >
        تبادل لغوي تفاعلي — العربية مقابل لغتك الأم — مع حجاج من دول أخرى في أفنية المسجد
        وردهات الفنادق. مكة المكرمة الأغنى بالتنوع اللغوي الإسلامي في العالم في مكان واحد.
      where_to_meet:
      - أفنية المسجد الحرام وغرف انتظار الطوابق العلوية بعد الصلوات
      - ردهات الفنادق ذات التجمعات الدولية (فيرمونت وسويسوتيل ولو ميريديان)
      - المركز الثقافي بمكة (دار الثقافة) في أمسيات الأنشطة
      languages_commonly_exchanged:
      - الأردية والبنغالية (حجاج جنوب آسيا — الأكثر عدداً)
      - الملاوية والإندونيسية (أكبر دول المسلمين سكاناً)
      - التركية (تراث حضاري عثماني ثري)
      - الهوسا والسواحيلية (حجاج أفريقيا جنوب الصحراء)
      - الفارسية (حجاج إيران وأفغانستان وطاجيكستان)
      - الفرنسية (حجاج غرب أفريقيا والمغرب العربي)
      tips:
      - احمل كراساً صغيراً للكلمات المتبادلة
      - استخدم المصحف وسيلة تواصل أولية
      - تطبيق جوجل للترجمة يُعين على كسر جدار الصمت الأول
      notes: >
        الإيمان المشترك يختصر عوائق اللغة بشكل معجز؛ تجربة التواصل مع مسلم لا تعرف لغته
        إحدى أجمل تجارب مكة ولا تُنسى

    - name: تعلم تجويد القرآن الكريم
      description: >
        التجويد علم يضبط النطق الصحيح لكل حرف ومخرج وصفة ومقدار المد. تعلم التجويد
        في مكة وتطبيقه فوراً في صلوات المسجد الحرام — سماع القراء أثناء التراويح ثم تطبيق
        ما تعلمته — يُعجّل الإتقان بشكل استثنائي لا يتاح في أي مكان آخر.
      skill_levels:
      - مبتدئ (أحكام المخارج والصفات — أول خطوة)
      - متوسط (النون الساكنة والتنوين والمد والقصر)
      - متقدم (التجويد الكامل مع ضبط الأداء والصوت)
      businesses:
      - name: حلقات التجويد — المسجد الحرام
        area: المسجد الحرام (الأروقة المخصصة)، مكة المكرمة
        notes: حلقات يومية مجانية للرجال والنساء بشكل منفصل؛ مُقسّمة بحسب المستوى
      - name: معهد القرآن الكريم — جامعة أم القرى
        area: حي العابدية، مكة المكرمة
        url: https://uqu.edu.sa/en
        notes: شهادات تجويد معتمدة دولياً؛ دورات مكثفة ومنتظمة للراغبين الجادين
      - name: مركز قرأ لتعليم القرآن الكريم
        area: حي العزيزية، مكة المكرمة
        notes: دروس فردية وجماعية؛ تسجيلات صوتية لمتابعة التحسين الذاتي
      online_supplement:
      - name: تطبيق تجويد قرآن
        notes: تمارين نطق تفاعلية تتقاطع مع ما تسمعه في المسجد
      duration: ساعة إلى ساعتين للحلقة
      notes: >
        الصوت الجميل ليس شرطاً للتجويد — الإتقان شرط والاستمرارية مفتاحه؛
        سماع قراء المسجد الحرام يومياً يُرسّخ الأذن الموسيقية القرآنية

    - name: تدبر القرآن الكريم والقراءة التأملية
      description: >
        التدبر قراءة تأملية فاهمة للقرآن — تعلم معاني الآيات أثناء تلاوتها. جلسات التدبر
        في المسجد الحرام ذات طعم روحي استثنائي — الكعبة أمامك وقلبك مفتوح وأثر المكان يُغير
        علاقتك بالقرآن إلى الأبد.
      businesses:
      - name: جلسات التدبر القرآني — المسجد الحرام
        area: الأروقة المخصصة للحلقات، المسجد الحرام
        notes: جلسات أسبوعية تأملية مجانية؛ تجمع عربية وإنجليزية وأردية
      - name: البيّنة للتعليم القرآني
        url: https://bayyinahq.com
        notes: موارد تدبر مسجّلة بالعربية والإنجليزية؛ يُعزز تجربة الإقامة في مكة
      - name: تطبيق quran.com
        url: https://quran.com
        notes: ترجمات معتمدة لأكثر من 50 لغة؛ تطابق مع الجزء الذي يُتلى في صلاة التراويح
      recommended_surahs_for_mekka_reflection:
      - سورة البقرة (الحج وشعائر إبراهيم عليه السلام)
      - سورة الحج (22) — ذات صلة مباشرة بالبيت الحرام
      - سورة قريش (106) — تاريخ مكة وريادتها التجارية
      - سورة الفيل (105) — معجزة البيت الحرام
      - سورة الفتح (48) — فتح مكة المكرمة
      duration: 30 دقيقة إلى ساعتين للجلسة
      notes: >
        المكان المقدس يُضاعف تأثير آيات التدبر؛ دوّن اللحظات المؤثرة في مذكرات الرحلة
        لتكون مرجعاً روحياً مدى الحياة

    - name: تعلم الخط العربي من القرآن الكريم
      description: >
        مزج تعلم الخط العربي مع حفظ الآيات — كتابة الآيات القرآنية بخط جميل عبادة وفن في
