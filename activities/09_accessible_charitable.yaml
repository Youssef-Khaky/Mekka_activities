# إمكانية الوصول للحجاج والأنشطة الخيرية

activities:
  accessible_pilgrimage:
    description: >
      خدمات التيسير وأدوات التنقل والبرامج الداعمة للحجاج المسنين ومستخدمي الكراسي المتحركة
      وذوي الإعاقات الجسدية والحسية. أجرى المسجد الحرام استثمارات ضخمة في البنية التحتية الشاملة
      لضمان أداء فريضة الحج والعمرة لجميع المسلمين.
    items:
    - name: طواف ذوي الاحتياجات الخاصة (الطابق الأرضي والطوابق العلوية)
      description: >
        ممرات مخصصة لكراسي المتحركة تُحيط بالكعبة المشرفة في الطابق الأرضي للمطاف وفي الطابقين
        الأول والثاني لمن يتعذر عليهم الطواف سيراً على الأقدام. يُسمح للمدفوعين (سواء كانوا من
        الأسرة أو مأجورين) بمرافقة مستخدمي الكراسي المتحركة؛ كما يُتاح استخدام سكوترات الكراسي
        المتحركة ذات الطاقة الكهربائية في المناطق المخصصة خارج أوقات الذروة.
      location:
        name: المسجد الحرام — المطاف (الطابق الأرضي) والطابقان الأول والثاني
        area: منطقة الحرم، مكة المكرمة 24231
        coordinates: 21.4225° N, 39.8262° E
      notes: >
        تبكّر قبل صلاة الفجر أو خلال ساعات الهدوء بعيداً عن الذروة؛ تصاريح السكوترات الكهربائية
        متاحة من مكاتب وزارة الحج داخل المسجد

    - name: استئجار الكراسي المتحركة ووسائل مساعدة التنقل
      description: >
        تتوفر للإيجار كراسي متحركة يدوية وكهربائية ومشّايات وعكازات في نقاط متعددة داخل
        المسجد الحرام وحوله. كما يمكن استعارة الكراسي المتحركة مجاناً من محطات الهلال
        الأحمر السعودي خلال مواسم الذروة.
      businesses:
      - name: أكشاك تأجير الكراسي المتحركة — الأبواب الرئيسية للمسجد
        area: أبواب الملك فهد وعبدالله وأجياد وأم القرى، المسجد الحرام
        notes: متاحة على مدار الساعة خلال الحج ورمضان؛ رسوم يومية بسيطة؛ يُشترط دفع تأمين
      - name: نقاط إعارة الهلال الأحمر السعودي
        area: محطات متعددة حول محيط المسجد الحرام
        notes: إعارة كرسي متحرك مجانية قصيرة الأمد؛ تستلزم بطاقة هوية؛ الإعادة في اليوم ذاته
      notes: يجب الإفصاح عن السكوترات الكهربائية عند نقاط تفتيش المسجد؛ أنواع البطاريات محددة بلوائح خاصة

    - name: إمكانية أداء السعي (عربات كهربائية ومصاعد)
      description: >
        يضم المسعى عربات كهربائية على غرار عربات الجولف للحجاج العاجزين عن قطع مسافة الـ 450 م
        سبعة أشواط مشياً. كما تربط مصاعد وسلالم كهربائية الطوابق الثلاثة، مع ممرات واسعة
        محجوزة لوسائل التنقل المساعدة.
      location:
        name: المسعى، المسجد الحرام
        area: داخل المسجد الحرام — الطابق الأرضي حتى الطابق الثاني
        coordinates: 21.4234° N, 39.8271° E
      notes: >
        خدمة العربات مجانية؛ اطلبها عند طرفَي الصفا أو المروة؛ الطاقة الاستيعابية محدودة
        وقد تضطر للانتظار في أوقات الذروة — يُنصح بالمجيء قبل الفجر أو بعد العشاء

    - name: خدمات النقل بالعربات في منى (موسم الحج)
      description: >
        خلال موسم الحج، تنقل عربات الجولف الكهربائية الحجاجَ ذوي الإعاقات الحركية بين
        خيام منى وجسر الجمرات، مما يوفر عليهم قطع مسافة 1–4 كم مشياً. وتسير هذه العربات
        في ممرات منفصلة عن طرق المشاة.
      location:
        name: مدينة خيام منى — ممرات النقل إلى الجمرات
        area: منى، على بُعد نحو 5 كم من المسجد الحرام
        coordinates: 21.4133° N, 39.8924° E
      date: 10–13 ذو الحجة
      notes: >
        رتّب أمر النقل مع مزود خدمة الحج قبل الوصول؛ تخصص وزارة الحج نوافذ زمنية خاصة
        للحجاج ذوي الإعاقات الحركية عند الجمرات للحد من مخاطر الازدحام

    - name: مكتب المساعدة الخاصة — وزارة الحج والعمرة
      description: >
        نوافذ مخصصة لخدمة الحجاج المسنين وذوي الإعاقات داخل المسجد الحرام وفي منى،
        تتولى معالجة طلبات تصاريح المرافقين والدخول المعجّل وتخصيص أماكن إقامة في
        خيام الاحتياجات الخاصة وترتيبات المرافقين الطبيين.
      location:
        name: مراكز خدمات وزارة الحج
        area: أبواب رئيسية بالمسجد الحرام ومدخل مخيمات منى
      url: https://www.nusuk.sa
      notes: >
        سجّل احتياجاتك الخاصة عند الحجز عبر منصة نسك؛ تُصدر شارة مساعدة تتيح التخليص
        السريع عند نقاط التفتيش

    - name: دعم ضعاف البصر وضعاف السمع
      description: >
        وُضعت أشرطة إرشاد لمسية في مسارات رئيسية داخل المسجد الحرام لمرشدة ضعاف البصر.
        وتتوفر مرشدات صوتية صوتية (بالعربية والإنجليزية والأردية والفرنسية والإندونيسية
        وغيرها) للتنزيل عبر تطبيق نسك أو للاستعارة كأجهزة صوتية مخصصة. كما يمكن الترتيب
        مسبقاً لمترجمي لغة الإشارة في المحاضرات الرسمية.
      businesses:
      - name: تطبيق نسك — وضع إمكانية الوصول الصوتي
        platforms: [iOS, Android]
        url: https://www.nusuk.sa
        notes: توجيه صوتي خطوة بخطوة داخل المسجد الحرام؛ متاح بعشر لغات
      - name: خدمات الضيافة بالمسجد الحرام (الباب 79 — باب الملك عبدالعزيز)
        area: مدخل الملك عبدالعزيز، المسجد الحرام
        notes: طلب المرشدات الصوتية ومترجمي لغة الإشارة؛ مفتوح من 06:00 حتى 22:00

    - name: برامج الحجاج المسنين (كبار السن)
      description: >
        تُشغّل وزارة الحج السعودية مجموعات حج مخصصة للحجاج فوق سن الخامسة والستين، تشمل
        أماكن خيام أقرب للمشاعر، ومسارات سير مخففة، وحافلات مباشرة للجمرات، وأولوية في
        الرعاية الطبية. كما تتوفر في كثير من بعثات الحج الوطنية مسارات خاصة لكبار السن.
      notes: >
        سجّل عبر بعثة الحج الوطنية الرسمية في بلدك عند تقديم طلب الحصة؛ تُرافق مجموعاتِ
        كبار السن عادةً كوادرُ طبية إضافية طوال أداء المناسك

  charitable_giving:
    description: >
      تتضاعف أجور الصدقة والزكاة في مكة المكرمة تضاعفاً عظيماً. تضم المدينة شبكة كثيفة
      من القنوات الخيرية الرسمية وبرامج توزيع الطعام والمنظمات الدولية، وتبلغ أوجها
      خلال موسمَي الحج ورمضان.
    items:
    - name: أداء الزكاة عبر هيئة الزكاة السعودية
      description: >
        يمكن للمسلمين أداء فريضة الزكاة السنوية عبر هيئة الزكاة والضريبة والجمارك السعودية
        (زاتكا) خلال زيارتهم لمكة المكرمة، إذ تُوزَّع الأموال على الأصناف الثمانية الواردة
        في القرآن الكريم داخل المملكة وخارجها.
      url: https://zatca.gov.sa/en
      payment_methods:
      - البوابة الإلكترونية لزاتكا (بطاقة ائتمان أو تحويل بنكي)
      - نوافذ خدمة فعلية في مواقع محددة بمكة خلال موسم الحج
      notes: >
        يجب أداء زكاة الفطر قبل صلاة عيد الفطر؛ والمعدل المعتمد نحو 2.5 كجم من الغذاء
        الأساسي أو ما يعادله نقداً عن كل فرد في الأسرة

    - name: صناديق الصدقات في المسجد الحرام
      description: >
        صناديق تبرع مخصصة للصدقة موزعة في أرجاء المسجد الحرام — عند الأبواب وعلى
        أعمدة الممرات وبالقرب من محطات ماء زمزم. تذهب الأموال لخدمات المسجد والدعوة
        الإسلامية وبرامج الرعاية الاجتماعية المحلية.
      location:
        name: المسجد الحرام
        area: في أرجاء المسجد — الأبواب والممرات ومحطات زمزم
      notes: جميع التبرعات معتمدة ضريبياً في المملكة؛ لا حد أدنى للمبلغ

    - name: توزيع الطعام وكفالة الإفطار
      description: >
        كفالة وجبات الإفطار للمصلين في المسجد الحرام من أحب أعمال الصدقة في مكة المكرمة.
        تنسّق المنظمات موائد الإفطار الجماعية طوال رمضان، وتتوفر باقات كفالة فردية بتكلفة
        ميسورة.
      businesses:
      - name: برنامج توزيع الإفطار — مجمع الملك عبدالعزيز
        area: المسجد الحرام — الأفنية الرئيسية والممرات
        notes: >
          يقبل البرنامج الرسمي تبرعات كفالة وجبات الإفطار؛ تواصل مع إدارة المسجد (الباب 1 —
          باب الفهد) أو عبر تطبيق الحرمين الرسمي للحجز
      - name: البنك الإسلامي للتنمية — صندوق الأمن الغذائي
        area: المقر في جدة + توزيع في مكة خلال الحج
        url: https://isdb.org
        notes: يقبل الصدقات الفردية والمتكررة؛ سلال غذائية لموسم الحج لصالح الحجاج المحتاجين
      - name: جمعية البر الخيرية (مكة المكرمة)
        area: حي العزيزية، مكة المكرمة
        notes: >
          منظمة غير حكومية محلية توزع وجبات ساخنة وماء زمزم وملابس على الحجاج الفقراء
          والأسر المحتاجة على مدار العام؛ تُرحّب بالمتطوعين خلال رمضان والحج
      notes: تتراوح تكلفة كفالة وجبة إفطار واحدة بين 15–30 ريالاً سعودياً (4–8 دولارات تقريباً)

    - name: التطوع في توزيع ماء زمزم
      description: >
        التطوع في المنظمات التي تنقل ماء زمزم وتوزعه على الحجاج القادمين والعاجزين
        عن الوصول إلى المسجد — إحياءً لسنة نبوية شريفة محبّبة.
      businesses:
      - name: برنامج توزيع ماء زمزم — رئاسة شؤون المسجد الحرام
        area: المسجد الحرام والمسجد النبوي (المدينة المنورة)
        notes: >
          يقبل التبرعات لتعبئة ماء زمزم وشحنه للمجتمعات المحتاجة؛ يمكن للمتطوعين المساعدة
          في عربات التوزيع داخل المسجد بالتسجيل في مكتب إدارة المسجد
      - name: مؤسسة الحرمين الخيرية
        area: مكة المكرمة والمدينة المنورة
        url: https://haramain.org
        notes: تشمل مشاريعها صيانة برادات زمزم وتوفير الماء مجاناً للحجاج ذوي الدخل المحدود
      notes: >
        حمل ماء زمزم وتقديمه للمصلين العطاش في المسجد صدقة جارية حتى دون الانتماء
        لأي منظمة رسمية

    - name: الإنفاق على الحجاج المعسرين (مساعدة المساكين)
      description: >
        يصل كل عام آلاف الحجاج إلى مكة بأموال لا تكفي لسد نفقات الطعام أو النقل أو
        العودة إلى بلدانهم. الإنفاق مباشرةً على المحتاجين، أو عبر قنوات رسمية تتحقق من
        حالاتهم، من أكثر أعمال الصدقة استحباباً.
      businesses:
      - name: مكتب رعاية الحجاج — وزارة الحج
        area: المسجد الحرام، الباب 79 ومراكز المساعدة في منى
        url: https://www.nusuk.sa
        notes: يستقبل البلاغات عن الحجاج العالقين أو المعسرين؛ ينسق عمليات الترحيل والمساعدة الطارئة
      - name: لجان الرعاية في البعثات الوطنية
        area: منى والعزيزية (يتفاوت حسب الدولة)
        notes: >
          تحتفظ معظم البعثات الوطنية بصندوق رعاية صغير؛ تواصل مع ممثل البعثة إذا أردت
          المشاركة أو الإبلاغ عن حالة
      notes: >
        تجنب إعطاء مبالغ نقدية كبيرة مباشرة للأفراد في الأماكن المزدحمة؛ يُفضّل اللجوء
        إلى القنوات الرسمية أو المنظمات المحلية الموثوقة لضمان وصول المساعدة لمستحقيها

    - name: الأضحية الإضافية (التطوع)
      description: >
        أداء أضحية إضافية تطوعاً فوق هدي الحج الواجب — مع توزيع لحومها على المحتاجين
        عبر المسلخ الرسمي. يُعدّ برنامج الأضحية التابع للبنك الإسلامي للتنمية من أكثر
        المنصات استخداماً لتسهيل الأضحية عن بُعد.
      businesses:
      - name: البنك الإسلامي للتنمية — برنامج الأضحية وتوزيع اللحوم
        area: مسلخ منى الرسمي
        url: https://isdb.org/sacrifice
        notes: >
          يقبل الحجز الإلكتروني الأضاحي من الحجاج وغيرهم حول العالم؛ تُذبح الذبائح
          وتُبرَّد وتُوزَّع على الأسر ذات الدخل المحدود حول العالم
      - name: برنامج أضاحي — شركة نقل وتذبيح المواشي السعودية (الطاحية)
        area: منطقة المسالخ في منى ومكة المكرمة
        url: https://www.adahi.com
        notes: المنصة السعودية الرسمية لأضاحي الحج؛ دفع إلكتروني؛ إشعار تأكيد برسالة نصية
      notes: >
        الأضحية الإضافية سنة مستحبة مؤكدة؛ يجوز أداؤها خلال الأيام الثلاثة عشر الأولى
        من ذي الحجة أو تحديداً يوم عيد الأضحى المبارك (العاشر من ذي الحجة)
