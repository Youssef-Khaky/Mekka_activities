# شعائر الحج والعبادة — العبادة الأساسية، الحج، والعمرة

activities:
  spiritual_worship:
    description: شعائر العبادة الأساسية في المسجد الحرام وما حوله
    items:
    - name: الطواف
      description: الطواف حول الكعبة المشرفة سبعة أشواط عكس اتجاه عقارب الساعة
      location:
        name: المسجد الحرام
        area: منطقة الحرم، مكة المكرمة 24231
        coordinates: 21.4225° N, 39.8262° E
      duration: 30–60 دقيقة
      notes: ركن من أركان الحج والعمرة؛ ويجوز أداؤه تطوعاً (طواف النافلة)

    - name: السعي
      description: السعي سبعة أشواط بين الصفا والمروة
      location:
        name: المسعى
        area: داخل المسجد الحرام، الطوابق الأرضية والعلوية
        coordinates: 21.4234° N, 39.8271° E
      duration: 30–45 دقيقة
      notes: إحياءً لذكرى بحث السيدة هاجر عن الماء لابنها إسماعيل عليه السلام

    - name: الصلاة في المسجد الحرام
      description: أداء الصلوات الخمس داخل المسجد الحرام
      location:
        name: المسجد الحرام
        area: منطقة الحرم، مكة المكرمة 24231
        coordinates: 21.4225° N, 39.8262° E
      duration: 10–20 دقيقة لكل صلاة
      notes: الصلاة في المسجد الحرام تعادل مئة ألف صلاة في غيره (كما ورد في الحديث الشريف)

    - name: شرب ماء زمزم
      description: الشرب من بئر زمزم المباركة
      location:
        name: محطات ماء زمزم
        area: في أرجاء المسجد الحرام (البدروم، الطابق المطاف، الممرات)
      notes: متاح مجاناً على مدار الساعة طوال أيام الأسبوع

    - name: استلام الحجر الأسود
      description: تقبيل الحجر الأسود أو الإشارة إليه في ركن الكعبة المشرفة
      location:
        name: الركن الشرقي للكعبة المشرفة
        area: المطاف، المسجد الحرام
        coordinates: 21.4225° N, 39.8262° E
      notes: سنة مؤكدة؛ يجوز الإشارة إليه من بُعد عند الازدحام

    - name: الوقوف عند مقام إبراهيم
      description: صلاة ركعتين خلف مقام إبراهيم عليه السلام بعد الطواف
      location:
        name: مقام إبراهيم عليه السلام
        area: داخل المسجد الحرام، على بُعد أمتار من الكعبة المشرفة
      notes: أمر قرآني كريم (سورة البقرة، آية 125)

    - name: صلاة التهجد (قيام الليل)
      description: صلاة تطوعية في الثلث الأخير من الليل
      location:
        name: المسجد الحرام أو غرفة الصلاة في الفندق
        area: منطقة الحرم
      duration: متغير
      notes: مضاعف الأجر في رمضان؛ والمسجد مفتوح على مدار الساعة

    - name: الذكر والدعاء عند الملتزم
      description: التشبث بالجدار بين باب الكعبة والحجر الأسود والتضرع بالدعاء
      location:
        name: الملتزم
        area: جدار الكعبة المشرفة، المسجد الحرام
      notes: من أفضل البقاع للدعاء الخاشع وتفريج الكروب

  hajj_rites:
    description: شعائر الحج المؤداة حصراً في موسم الحج (8–13 ذو الحجة)
    items:
    - name: الإحرام من الميقات
      description: ارتداء ثوب الإحرام الأبيض والنية لأداء فريضة الحج
      location:
        name: مواقيت الإحرام (تختلف باختلاف المنطقة)
        landmarks:
        - ذو الحليفة (آبار علي) — للقادمين من المدينة المنورة
        - الجحفة (رابغ) — للقادمين من الشام ومصر
        - قرن المنازل — للقادمين من نجد والخليج
        - يلملم — للقادمين من اليمن وجنوب آسيا
        - ذات عرق — للقادمين من العراق
      notes: يُعلن بداية الحج؛ وتسري عليه أحكام وآداب خاصة

    - name: الوقوف بعرفات
      description: الوقوف والدعاء في صحراء عرفات
      location:
        name: صحراء عرفات
        area: على بُعد نحو 20 كم شرق المسجد الحرام
        coordinates: 21.3549° N, 39.9845° E
        landmark: جبل الرحمة هو التل المركزي في الصحراء
      date: التاسع من ذي الحجة (بعد الزوال حتى الغروب)
      duration: عدة ساعات
      notes: ركن الحج الأعظم؛ من فاته بطل حجه

    - name: المبيت بمزدلفة
      description: المبيت تحت السماء المفتوحة والتقاط الحصى
      location:
        name: مزدلفة
        area: بين عرفات ومنى، على بُعد نحو 9 كم من مكة المكرمة
        coordinates: 21.3797° N, 39.9358° E
        landmark: المسجد المشعر الحرام هو المسجد الرئيسي في المنطقة
      date: ليلة التاسع إلى العاشر من ذي الحجة
      notes: يُلتقط الحصى هنا لرمي الجمرات؛ يجوز للشيوخ والمرضى الدفع بعد منتصف الليل

    - name: رمي الجمرات
      description: رمي الحصى على الجمرات الثلاث رمزاً لرد إبليس
      location:
        name: جسر الجمرات
        area: منى، على بُعد نحو 5 كم من المسجد الحرام
        coordinates: 21.3926° N, 39.8731° E
        address: طريق الملك فهد، منى، مكة المكرمة
      date: 10–13 ذو الحجة
      notes: جسر متعدد الطوابق لإدارة الحشود؛ التزم بالفترات الزمنية المحددة من الجهات المختصة

    - name: النحر (الأضحية)
      description: ذبح الهدي قرباناً لله عز وجل
      location:
        name: مسلخ البنك الإسلامي للتنمية (الرسمي)
        area: منطقة المسالخ بمنى، مكة المكرمة
      date: العاشر من ذي الحجة (يوم عيد الأضحى المبارك)
      notes: يمكن الترتيب عبر البوابة الإلكترونية لوزارة الحج والعمرة؛ يوزَّع اللحم على الفقراء

    - name: الحلق أو التقصير
      description: حلق الرأس (للرجال) أو قص جزء من الشعر (للنساء)
      location:
        name: خيام الحلاقين بمنى أو محلات الحلاقة بمكة
        area: منى وحي العزيزية
      date: بعد النحر في العاشر من ذي الحجة
      notes: يُعدّ التحللَ الأول من الإحرام

    - name: المبيت بمنى
      description: قضاء ليالي التشريق في مدينة الخيام بمنى
      location:
        name: مدينة خيام منى
        area: منى، مكة المكرمة — أكبر مدينة خيام في العالم
        coordinates: 21.4133° N, 39.8924° E
      date: 11–13 ذو الحجة
      notes: يُخصص لكل حاج مكان محدد في الخيام حسب الجنسية والوفد

  umrah_rites:
    description: شعائر العمرة (الحج الأصغر) التي يمكن أداؤها على مدار العام
    items:
    - name: الإحرام من الميقات
      description: ارتداء ثوب الإحرام والنية لأداء العمرة
      location:
        name: مسجد السيدة عائشة (التنعيم) — أقرب ميقات لمن كان في مكة
        area: التنعيم، على بُعد نحو 7.5 كم من المسجد الحرام
        coordinates: 21.4629° N, 39.8200° E
        address: طريق الهجرة، التنعيم، مكة المكرمة
      notes: يُستحب الاغتسال وصلاة ركعتي الإحرام قبل النية

    - name: طواف العمرة
      description: الطواف حول الكعبة المشرفة سبعة أشواط
      location:
        name: المطاف، المسجد الحرام
        area: منطقة الحرم، مكة المكرمة
      notes: يبدأ من الحجر الأسود؛ يُستحب الرمل في الأشواط الثلاثة الأولى للرجال

    - name: سعي العمرة
      description: السعي سبعة أشواط بين الصفا والمروة
      location:
        name: المسعى
        area: داخل المسجد الحرام
      notes: يبدأ من الصفا وينتهي عند المروة؛ مصاعد كهربائية متاحة في الطوابق العلوية

    - name: الحلق أو التقصير
      description: قص الشعر أو حلقه للتحلل من الإحرام
      location:
        name: أي محل حلاقة في مكة المكرمة
        businesses:
        - name: محلات الحلاقة في شارع أجياد
          area: أجياد، بالقرب من المسجد الحرام
        - name: محلات الحلاقة النور
          area: حي العزيزية
      notes: يُتمم العمرة؛ محلات الحلاقة متوفرة بكثرة بالقرب من المسجد الحرام
